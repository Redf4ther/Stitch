<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#2c2e34;color:#2d2240;font-family:system-ui,sans-serif;overscroll-behavior:none}
#app{display:contents}
.top{position:fixed;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;background:transparent;z-index:5;padding-top:var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px));padding-bottom:4px;pointer-events:auto}
.below{position:fixed;left:0;right:0;top:calc(215px + var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px)));bottom:0;display:flex;flex-direction:column;z-index:4}
.title{padding-top:10px;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#7c5cff}
.build{font-size:10px;opacity:.6;margin-left:4px}
.stage{position:relative;width:160px;height:160px;margin-top:2px}
.glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 55%,rgba(30,90,180,.3) 0%,transparent 68%);animation:gI 3s ease-in-out infinite}
.glow.on{animation:gT .22s ease-in-out infinite}
.head{position:absolute;inset:0;animation:iB 3.5s ease-in-out infinite}
.head.talk{animation:tN .33s ease-in-out infinite}
.head.listen{animation:lT .6s ease-in-out infinite}
@keyframes iB{0%,100%{transform:translateY(0) rotate(-.3deg)}50%{transform:translateY(-5px) rotate(.3deg)}}
@keyframes tN{0%,100%{transform:translateY(0) rotate(-.8deg)}50%{transform:translateY(-3px) rotate(.8deg)}}
@keyframes lT{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gI{0%,100%{opacity:.2}50%{opacity:.5}}
@keyframes gT{0%,100%{opacity:.4}50%{opacity:.85}}
@keyframes db{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes micP{0%{box-shadow:0 0 0 0 rgba(220,50,50,.6)}100%{box-shadow:0 0 0 20px rgba(220,50,50,0)}}
@keyframes saluteFall{0%{transform:translate(-50%,-50%);opacity:1;animation-timing-function:cubic-bezier(.05,.55,.4,1)}30%{transform:translate(calc(-50% + var(--peak-x,0)),calc(-50% + var(--peak-y,-260px)));opacity:1;animation-timing-function:cubic-bezier(.6,.04,.85,.55)}100%{transform:translate(calc(-50% + var(--end-x,0)),110vh);opacity:.85}}
@keyframes saluteSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.hold-ring{position:fixed;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border:1px solid rgba(255,255,255,.28);box-shadow:0 8px 26px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.28);pointer-events:none;z-index:50;transform:translate(-50%,-50%) scale(var(--ring-scale,1));opacity:var(--ring-op,.7);transition:opacity .12s linear,transform .15s linear,background-color .2s linear,border-color .2s linear;will-change:transform,opacity;animation:ringPop .22s cubic-bezier(.16,.7,.3,1)}
.hold-ring.busy{background:rgba(255,144,67,.18);border-color:rgba(255,160,90,.45)}
#voiceToast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;padding:10px 18px;border-radius:14px;font-size:15px;font-weight:500;z-index:200;opacity:0;transition:opacity .25s ease;pointer-events:none;letter-spacing:.5px}
#voiceToast.show{opacity:1}
#voiceCountdown{position:fixed;top:38%;left:50%;width:92px;height:92px;border-radius:50%;background:rgba(124,92,255,.85);color:#fff;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:700;z-index:201;pointer-events:none;box-shadow:0 6px 24px rgba(124,92,255,.45);transform:translate(-50%,-50%) scale(.6);opacity:0;transition:transform .15s ease,opacity .15s ease}
#voiceCountdown.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
@keyframes ringPop{from{transform:translate(-50%,-50%) scale(.55);opacity:0}}

.status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8475a8;margin:2px 0}
.dot{width:6px;height:6px;border-radius:50%;background:#d8cce8;transition:all .3s}
.dot.y{background:#ffd84d;box-shadow:0 0 8px #ffd84d;animation:db .5s infinite}
.dot.g{background:#5be09b;box-shadow:0 0 8px #5be09b;animation:db 1s infinite}
.dot.b{background:#7c5cff;box-shadow:0 0 8px #7c5cff;animation:db .4s infinite}
.chat{flex:1;min-height:0;overflow-y:auto;padding:4px 14px 12px;display:flex;flex-direction:column;gap:7px}
.bbl{display:flex;animation:mIn .2s ease}
.bbl.u{justify-content:flex-end}
.bi{max-width:84%;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:15px;line-height:1.5;background:#3a3c42;border:none;color:#e6e8eb;box-shadow:none}
.bbl.u .bi{background:#484a52;border:none;color:#ffffff;border-radius:16px 16px 4px 16px;box-shadow:none}
.cur::after{content:‘▋’;color:#7c5cff;animation:cur .4s steps(1) infinite}
.err{flex-shrink:0;font-size:11px;color:#e84a5f;padding:0 14px;text-align:center}
.err:not(:empty){padding:2px 14px}
.bottom{flex-shrink:0;position:relative;padding:6px 12px calc(18px + env(safe-area-inset-bottom,0px));background:transparent;display:flex;flex-direction:column;gap:6px;align-items:center}
.mic-btn{width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,255,255,.18);font-size:24px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);box-shadow:0 4px 14px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.18);cursor:pointer;touch-action:none;transition:background .12s ease}
.mic-btn.listening{background:rgba(255,90,110,.35);border-color:rgba(255,120,140,.5);animation:micP .8s ease infinite;box-shadow:0 4px 20px rgba(255,80,120,.45),inset 0 1px 0 rgba(255,255,255,.2)}
.mic-btn.disabled{opacity:.5}
.mic-btn.busy{background:rgba(255,144,67,.28);border-color:rgba(255,160,90,.45);box-shadow:0 4px 14px rgba(255,90,110,.35),inset 0 1px 0 rgba(255,255,255,.18)}
.mic-btn:active:not(.listening):not(.busy){background:rgba(255,255,255,.04)}
#camBtn{transition:background .12s ease}
#camBtn:active{background:rgba(255,255,255,.04)!important}
#camBtn.neon{background:rgba(0,221,255,.25)!important;box-shadow:0 0 6px #00ddff,0 0 16px rgba(0,221,255,.5)!important}
.mic-hint{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#8475a8;font-weight:600}
.irow{display:flex;gap:6px;width:100%}
.inp{flex:1;background:transparent;border:none;color:#e6e8eb;font-size:15px;padding:7px 12px;-webkit-user-select:text;user-select:text}
.inp:focus{outline:none}
.inp::placeholder{color:#7d808a}
.inp:disabled{opacity:.5}
.sbtn{background:rgba(255,255,255,.08);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border:1px solid rgba(255,255,255,.18);border-radius:50%;color:#fff;font-size:15px;width:36px;height:36px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.18);transition:background .12s ease}
.sbtn:active{background:rgba(255,255,255,.04)}

<script>
// Telegram WebApp: expand to full height at boot so the keyboard doesn't
// trigger a late expand jump. Layout adaptation to the keyboard is handled
// purely by viewport (interactive-widget=resizes-content) + 100dvh — no
// JS-side --kb math.
var tg = null;
try {
  if (window.Telegram && window.Telegram.WebApp) {
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if (typeof tg.disableVerticalSwipes === 'function') {
      try { tg.disableVerticalSwipes(); } catch(_) {}
    }
    if (typeof tg.requestFullscreen === 'function') {
      try { tg.requestFullscreen(); } catch(_) {}
    }
  }
} catch(_) {}

// Press-and-hold anywhere in the chat to push-to-talk, exactly like the
// mic button. A translucent ring appears at the touch point on press and
// fades when released. Quick taps (under 300ms) get treated as accidental
// by the SR layer and produce no transcript, so the same gesture also
// "dismisses" the keyboard if it was open.
var chatTap = null;
var holdRing = null;
var ringTimer = null;
var FADE_DIST = 110; // distance in px at which the ring is fully gone
function clearRingTimer() {
  if (ringTimer != null) { clearTimeout(ringTimer); ringTimer = null; }
}
function showHoldRing(x, y) {
  if (holdRing) { try { holdRing.remove(); } catch(_){} }
  holdRing = document.createElement('div');
  holdRing.className = 'hold-ring';
  holdRing.style.left = x + 'px';
  holdRing.style.top = y + 'px';
  document.body.appendChild(holdRing);
  // CSS @keyframes ringPop runs automatically on insertion; nothing else
  // to coordinate from JS.
}
function fadeRing(ratio) {
  if (!holdRing) return;
  // Ring slightly expands (up to 1.2x) and fades out as the finger drags away.
  holdRing.style.setProperty('--ring-op', String((1 - ratio) * 0.55));
  holdRing.style.setProperty('--ring-scale', String(1 + ratio * 0.2));
}
function hideHoldRing() {
  if (!holdRing) return;
  var r = holdRing;
  holdRing = null;
  r.style.setProperty('--ring-op', '0');
  r.style.setProperty('--ring-scale', '1.2');
  setTimeout(function(){ try { r.remove(); } catch(_){} }, 200);
}
document.addEventListener('pointerdown', function(e) {
  var chat = document.querySelector('.chat');
  if (!chat || !chat.contains(e.target)) { chatTap = null; return; }
  // No mic permission → no ring, no listening flip, no anything. If we've
  // never asked, fire the system prompt now; nothing changes in the UI
  // until the user taps again after granting.
  if (typeof micPermission !== 'undefined' && micPermission !== 'granted') {
    chatTap = null;
    if (micPermission === 'denied') {
      errEl.textContent = 'Разреши доступ к микрофону в настройках';
    } else {
      requestMicPermission();
    }
    return;
  }
  // If Stitch is thinking/talking, show an orange "wait" ring and don't
  // start the mic yet. As soon as state goes idle (handled in setState),
  // the ring switches to purple and listening starts automatically.
  if (state === 'thinking' || state === 'talking') {
    chatTap = { t: Date.now(), x: e.clientX, y: e.clientY, cancelled: false, waiting: true };
    showHoldRing(e.clientX, e.clientY);
    if (holdRing) holdRing.classList.add('busy');
    return;
  }
  if (state !== 'idle') { chatTap = null; return; }
  chatTap = { t: Date.now(), x: e.clientX, y: e.clientY, cancelled: false, waiting: false };
  var a = document.activeElement;
  if (a && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA')) a.blur();
  showHoldRing(e.clientX, e.clientY);
  getAudioCtx();
  startListening();
}, {passive:true});
function trackChatPointer(x, y) {
  if (!chatTap || chatTap.cancelled) return;
  var dx = x - chatTap.x;
  var dy = y - chatTap.y;
  var dist = Math.sqrt(dx * dx + dy * dy);
  var ratio = Math.min(1, dist / FADE_DIST);
  if (holdRing) fadeRing(ratio);
  if (ratio >= 1) {
    chatTap.cancelled = true;
    clearRingTimer();
    hideHoldRing();
    if (state === 'listening') {
      listenAborted = true;
      stopListening();
    }
  }
}
function finalizeChatRelease() {
  if (!chatTap) return;
  var wasCancelled = chatTap.cancelled;
  chatTap = null;
  clearRingTimer();
  hideHoldRing();
  if (state === 'listening') {
    if (wasCancelled) listenAborted = true;
    stopListening();
  }
}
// Pointer events handle desktop mouse. Touch events keep firing on iOS even
// when the chat is being scrolled (pointermove stops once browser takes over
// for scroll, but touchmove continues), so we listen to both.
document.addEventListener('pointermove', function(e) { trackChatPointer(e.clientX, e.clientY); }, {passive:true});
document.addEventListener('touchmove', function(e) {
  if (!chatTap || !e.touches || !e.touches.length) return;
  var t = e.touches[0];
  trackChatPointer(t.clientX, t.clientY);
}, {passive:true});
document.addEventListener('pointerup', finalizeChatRelease, {passive:true});
document.addEventListener('touchend', finalizeChatRelease, {passive:true});
document.addEventListener('touchcancel', finalizeChatRelease, {passive:true});


var KEY_SK = 'sk';
var KEY_HIST = 'stitch_hist';
var KEY_VOICE = 'stitch_voice';
var HIST_LIMIT = 60; // keep last ~30 turns
var VOICES = ['alloy','echo','fable','onyx','nova','shimmer','ash','ballad','coral','sage','verse'];
var apiKey = localStorage.getItem(KEY_SK) || '';
var currentVoice = localStorage.getItem(KEY_VOICE) || 'sage';
function cycleVoice() {
  var i = VOICES.indexOf(currentVoice);
  currentVoice = VOICES[(i + 1) % VOICES.length];
  localStorage.setItem(KEY_VOICE, currentVoice);
  showVoiceToast(currentVoice);
  // Pre-fetch the sample so by the time the countdown ends, audio is
  // ready to play immediately.
  var urlPromise = fetchPreviewUrl(currentVoice);
  runCountdown(3, function() {
    urlPromise.then(function(url) { if (url) playPreviewUrl(url); });
  });
}
function fetchPreviewUrl(voice) {
  if (!apiKey) return Promise.resolve(null);
  return new Promise(function(resolve) {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://api.openai.com/v1/audio/speech');
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + apiKey);
      xhr.responseType = 'arraybuffer';
      xhr.onload = function() {
        if (xhr.status !== 200) { resolve(null); return; }
        var blob = new Blob([xhr.response], {type: 'audio/mpeg'});
        resolve(URL.createObjectURL(blob));
      };
      xhr.onerror = function(){ resolve(null); };
      xhr.send(JSON.stringify({
        model: 'gpt-4o-mini-tts',
        input: 'Привет! Я Стич, теперь буду говорить вот так.',
        voice: voice,
        speed: 1.2
      }));
    } catch(_) { resolve(null); }
  });
}
function playPreviewUrl(url) {
  pumpKeepalive();
  nudgeOutputToSpeaker();
  var audio = new Audio();
  audio.setAttribute('playsinline', '');
  audio.src = url;
  function endPreview() {
    try { URL.revokeObjectURL(url); } catch(_){}
    head.className = 'head';
    glow.className = 'glow';
    stopMouth();
    if (currentAudio === audio) currentAudio = null;
  }
  audio.onended = endPreview;
  audio.onerror = endPreview;
  // Trigger the talking animation while the sample plays.
  head.className = 'head talk';
  glow.className = 'glow on';
  startMouth();
  currentAudio = audio;
  audio.play().catch(endPreview);
}
function runCountdown(steps, onDone) {
  var el = document.getElementById('voiceCountdown');
  if (!el) {
    el = document.createElement('div');
    el.id = 'voiceCountdown';
    document.body.appendChild(el);
  }
  var i = steps;
  function tick() {
    if (i <= 0) {
      el.classList.remove('show');
      setTimeout(function(){ try { el.remove(); } catch(_){} }, 200);
      onDone();
      return;
    }
    el.textContent = String(i);
    el.classList.add('show');
    i--;
    setTimeout(tick, 700);
  }
  tick();
}
var voiceToastTimer = null;
function showVoiceToast(name) {
  var t = document.getElementById('voiceToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'voiceToast';
    document.body.appendChild(t);
  }
  t.textContent = 'Голос: ' + name;
  // Force reflow before adding class so transition kicks in.
  void t.offsetHeight;
  t.classList.add('show');
  if (voiceToastTimer) clearTimeout(voiceToastTimer);
  voiceToastTimer = setTimeout(function() {
    t.classList.remove('show');
  }, 5000);
}

// If no key yet, replace the welcome bubble with a request to send one in
// chat. The user pastes/types an sk-... message and saveKeyFromMessage
// picks it up.
function ensureKeyPrompt() {
  if (apiKey) return;
  var firstBubble = document.querySelector('.chat .bbl .bi');
  if (firstBubble) firstBubble.textContent = 'Привет! Я Стич! Чтобы я ожил — отправь мне твой OpenAI API ключ (он начинается с sk-).';
}
function saveKeyFromMessage(text) {
  var m = String(text || '').trim();
  if (!/^sk-[A-Za-z0-9_\-]{10,}$/.test(m)) return false;
  apiKey = m;
  localStorage.setItem(KEY_SK, m);
  return true;
}

function mLoop(t) {
  raf = requestAnimationFrame(mLoop);
  var interval = 60 + Math.random()*40;
  if (t - lastFlip > interval) {
    isOpen = !isOpen; lastFlip = t;
    if (isOpen) { posIdx=(posIdx+1)%openPos.length; shapeIdx=(shapeIdx+1)%shapes.length; currentShape=shapes[shapeIdx]; mC=openPos[posIdx]; }
    else { mC = 0; }
    drawMouth(mC, currentShape);
  }
}
function startMouth() { if (!raf) raf = requestAnimationFrame(mLoop); }
function stopMouth() { if (raf) { cancelAnimationFrame(raf); raf=null; } mC=0; drawMouth(0,'normal'); }

function isChatAtBottom() {
  return (chat.scrollHeight - chat.scrollTop - chat.clientHeight) < 60;
}
function autoScrollChat() {
  // Don't yank the scroll position if the user is actively touching the
  // chat (holding for the mic ring) or has scrolled up to read.
  if (chatTap) return;
  chat.scrollTop = chat.scrollHeight;
}
function addMsg(role, text) {

  var w = document.createElement('div'); w.className = 'bbl'+(role==='u'?' u':'');
  var b = document.createElement('div'); b.className = 'bi'; b.textContent = text;

function saveHist() {
  if (hist.length > HIST_LIMIT) hist = hist.slice(-HIST_LIMIT);
  try {
    localStorage.setItem(KEY_HIST, JSON.stringify(hist));
  } catch(e) {
    // Quota — drop oldest entries until it fits.
    while (hist.length > 4) {
      hist.shift();
      try { localStorage.setItem(KEY_HIST, JSON.stringify(hist)); return; } catch(_){}
    }
  }
}

function renderHistInChat() {
  // Wipe whatever's in the chat (welcome bubble) and replay the saved hist.
  chat.innerHTML = '';
  hist.forEach(function(m) {
    if (m.role === 'user') {
      if (Array.isArray(m.content)) {
        var photos = [];
        var text = '';
        m.content.forEach(function(p) {
          if (p.type === 'image_url' && p.image_url && p.image_url.url) photos.push(p.image_url.url);
          else if (p.type === 'text' && p.text) text += (text ? ' ' : '') + p.text;
        });
        if (photos.length) appendUserPhotosBubble(photos);
        if (text && text !== 'Посмотри на фото и помоги разобраться!') addMsg('u', text);
      } else {
        addMsg('u', m.content);
      }
    } else if (m.role === 'assistant') {
      addMsg('a', m.content);
    }
  });
  chat.scrollTop = chat.scrollHeight;
}

function loadHist() {
  try {
    var raw = localStorage.getItem(KEY_HIST);
    if (!raw) return false;
    var parsed = JSON.parse(raw);
    if (!Array.isArray(parsed) || !parsed.length) return false;
    hist = parsed;
    renderHistInChat();
    return true;
  } catch(_) { return false; }
}

// Burst of colored confetti when Stitch confirms a correct answer ("Бум!"),
// styled like Telegram's quiz salute — particles burst upward, reach a
// peak, then gently fall past the bottom with continuous rotation.
function celebrate() {
  var colors = ['#ff5577','#ff9043','#ffd84d','#5be09b','#7c5cff','#00b8d4','#ff7eb6','#ffffff'];
  var n = 70;
  for (var i = 0; i < n; i++) {
    var color = colors[Math.floor(Math.random()*colors.length)];
    var size = 6 + Math.random()*7;
    // Random burst direction biased upward
    var ang = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 1.7;
    var burstDist = 110 + Math.random() * 240;
    var peakX = Math.cos(ang) * burstDist;
    var peakY = Math.sin(ang) * burstDist; // negative = up
    // Drift sideways while falling
    var endX = peakX * 1.5 + (Math.random()-0.5) * 140;
    var fallDur = 2.6 + Math.random() * 1.4;     // 2.6 – 4.0 s
    var spinDur = 0.8 + Math.random() * 1.4;     // 0.8 – 2.2 s
    var spinDir = Math.random() > 0.5 ? 'normal' : 'reverse';
    var outer = document.createElement('div');
    outer.style.cssText = 'position:fixed;left:50%;top:55%;pointer-events:none;z-index:1000;will-change:transform,opacity;animation:saluteFall '+fallDur+'s linear forwards;--peak-x:'+peakX+'px;--peak-y:'+peakY+'px;--end-x:'+endX+'px';
    var inner = document.createElement('div');
    inner.style.cssText = 'width:'+size+'px;height:'+(size*1.6)+'px;background:'+color+';border-radius:2px;will-change:transform;animation:saluteSpin '+spinDur+'s linear infinite '+spinDir;
    outer.appendChild(inner);
    document.body.appendChild(outer);
    (function(node, ms){ setTimeout(function(){ try{ node.remove(); }catch(_){} }, ms); })(outer, fallDur*1000+300);
  }
}
function maybeCelebrate(text) {
  if (!text || !/^\s*Бум/i.test(text)) return;
  celebrate();
  // Light haptic — Telegram's HapticFeedback if available, else
  // navigator.vibrate as a fallback.
  try {
    if (tg && tg.HapticFeedback && typeof tg.HapticFeedback.impactOccurred === 'function') {
      tg.HapticFeedback.impactOccurred('heavy');
    } else if (navigator.vibrate) {
      navigator.vibrate(120);
    }
  } catch(_) {}
}

async function askClaude(msg) {
  errEl.textContent = '';
  addMsg('u', msg);
  if (!apiKey) {
    addMsg('a', 'Сначала отправь мне твой OpenAI API ключ (начинается с sk-) — я его запомню.');
    setState('idle');
    return;
  }
  setState('thinking');
  hist.push({role:'user', content:msg});
  saveHist();
  try {
    // Filter out image messages for gpt-4o-mini (text only)
    var textHist = hist.map(function(m) {
      if (Array.isArray(m.content)) {
        var txt = m.content.filter(function(p){return p.type==='text';}).map(function(p){return p.text;}).join(' ');
        return {role:m.role, content:txt||'[фото]'};
      }
      return m;
    });
    var messages = [{role:'system',content:prompt}].concat(textHist);
    typingCancel = false;
    currentAbort = new AbortController();
    var r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({model:'gpt-4o', max_tokens:2000, messages:messages}),
      signal: currentAbort.signal
    });
    var data = await r.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!data.choices || !data.choices[0]) throw new Error('API: ' + JSON.stringify(data).slice(0,200));
    var msg0 = data.choices[0].message;
    var text = '';
    if (typeof msg0.content === 'string') text = msg0.content;
    else if (Array.isArray(msg0.content)) text = msg0.content.map(function(p){return p.text||'';}).join('');
    else if (msg0.refusal) text = msg0.refusal;
    if (!text) throw new Error('Empty: ' + JSON.stringify(data.choices[0]).slice(0,300));
    hist.push({role:'assistant', content:text});
    saveHist();

    // STEP 1: Download audio (still showing "Думает...")
    var audioBlob = null;
    try {
      var ttsXhr = new XMLHttpRequest();
      currentAbort = { abort: function(){ try { ttsXhr.abort(); } catch(_){} } };
      audioBlob = await new Promise(function(resolve) {
        ttsXhr.open('POST','https://api.openai.com/v1/audio/speech');
        ttsXhr.setRequestHeader('Content-Type','application/json');
        ttsXhr.setRequestHeader('Authorization','Bearer '+apiKey);
        ttsXhr.responseType = 'arraybuffer';
        ttsXhr.onload = function(){
          if (ttsXhr.status === 200) { resolve(ttsXhr.response); return; }
          try {
            var msg = new TextDecoder().decode(new Uint8Array(ttsXhr.response));
            errEl.textContent = 'TTS ' + ttsXhr.status + ': ' + msg.slice(0, 180);
          } catch(_) { errEl.textContent = 'TTS HTTP ' + ttsXhr.status; }
          resolve(null);
        };
        ttsXhr.onerror = function(){ resolve(null); };
        ttsXhr.onabort = function(){ resolve(null); };
        ttsXhr.send(JSON.stringify({model:'gpt-4o-mini-tts',input:text,voice:currentVoice,speed:1.2}));
      });
    } catch(e2) { audioBlob = null; }
    currentAbort = null;
    if (typingCancel) return;

    // STEP 3: switch to "Говорит", start audio (HTML Audio works on iOS WebView), type text
    setState('talking');
    var el = addMsg('a', '');
    el.classList.add('cur');
    startMouth();
    maybeCelebrate(text);

    if (audioBlob) {
      pumpKeepalive();
      nudgeOutputToSpeaker();
      var blob2 = new Blob([audioBlob], {type:'audio/mpeg'});
      var url = URL.createObjectURL(blob2);
      var audio = new Audio(url);
      currentAudio = audio;
      audio.onended = function(){ URL.revokeObjectURL(url); audio.src=''; audio.load(); if(currentAudio===audio) currentAudio=null; };
      audio.onerror = function(){ URL.revokeObjectURL(url); if(currentAudio===audio) currentAudio=null; };
      audio.play().catch(function(err){ errEl.textContent = 'Звук: '+(err&&err.message||err); });
    }

    // Type text simultaneously
    for (var i=1; i<=text.length; i++) {
      if (typingCancel) break;
      el.textContent = text.slice(0,i);
      autoScrollChat();
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    if (typingCancel) return;
    setState('idle');
  } catch(e) {
    stopMouth();
    if (e && e.name !== 'AbortError') errEl.textContent = 'Ошибка: '+e.message;
    setState('idle');
  }
}

// Global AudioContext - must be created/resumed on user gesture
var gAudioCtx = null;
function getAudioCtx() {
  if (!gAudioCtx) gAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (gAudioCtx.state === 'suspended') gAudioCtx.resume();
  ensureLoudOutput();
  return gAudioCtx;
}

// After SpeechRecognition runs, iOS keeps the audio session in PlayAndRecord
// mode and routes playback through the quiet earpiece speaker. The fix that
// reliably reroutes back to the loud speaker on iOS WKWebView is to play
// a short HTML <audio> file with playsinline — this resets the session
// category to Playback. AudioContext alone wasn't enough.
var silentWavUrl = null;
function getSilentWavUrl() {
  if (silentWavUrl) return silentWavUrl;
  try {
    var sampleRate = 8000;
    var samples = Math.floor(sampleRate * 0.25); // 250ms silence
    var buffer = new ArrayBuffer(44 + samples * 2);
    var view = new DataView(buffer);
    view.setUint32(0, 0x52494646, false);              // "RIFF"
    view.setUint32(4, 36 + samples * 2, true);
    view.setUint32(8, 0x57415645, false);              // "WAVE"
    view.setUint32(12, 0x666d7420, false);             // "fmt "
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);                       // PCM
    view.setUint16(22, 1, true);                       // mono
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    view.setUint32(36, 0x64617461, false);             // "data"
    view.setUint32(40, samples * 2, true);
    silentWavUrl = URL.createObjectURL(new Blob([buffer], {type:'audio/wav'}));
  } catch(_) { silentWavUrl = null; }
  return silentWavUrl;
}
function nudgeOutputToSpeaker() {
  // Web Audio nudge — first line of defense, also unlocks the context.
  try {
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    var buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.05), ctx.sampleRate);
    var src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
    src.stop(ctx.currentTime + 0.05);
  } catch(_) {}
}

// Persistent silent loop. Once started on a user gesture, it keeps the
// iOS audio session pinned to the Playback category for the rest of the
// session, so even after SpeechRecognition the next TTS routes through
// the loud bottom speaker instead of the quiet earpiece.
var bgKeepalive = null;
function ensureLoudOutput() {
  if (bgKeepalive) {
    if (bgKeepalive.paused) {
      try { bgKeepalive.play().catch(function(){}); } catch(_){}
    }
    return;
  }
  try {
    var url = getSilentWavUrl();
    if (!url) return;
    bgKeepalive = new Audio();
    bgKeepalive.setAttribute('playsinline', '');
    bgKeepalive.loop = true;
    bgKeepalive.volume = 1.0; // silent content, full vol so iOS counts it as playback
    bgKeepalive.src = url;
    bgKeepalive.play().catch(function(){});
  } catch(_) {}
}
// Force iOS to flip the audio session back to Playback by stopping the
// keepalive, seeking to the start and playing it again. After getUserMedia,
// just keeping it playing isn't enough — we need a fresh play() call.
function pumpKeepalive() {
  if (!bgKeepalive) { ensureLoudOutput(); return; }
  try {
    bgKeepalive.pause();
    bgKeepalive.currentTime = 0;
    var p = bgKeepalive.play();
    if (p && p.catch) p.catch(function(){});
  } catch(_) {}
}

// MediaRecorder + Whisper API — much smarter than the built-in
// SpeechRecognition. We capture the raw mic stream while the user holds,
// then on release send the blob to /v1/audio/transcriptions and pipe the
// returned text into the existing askClaude / sendPhotosWith flow.
var listenAborted = false;
var audioRec = null;
var audioChunks = null;
var audioStream = null;
var pendingStop = false;
// Mic permission cache: 'unknown' | 'granted' | 'denied' | 'prompt'.
// We check this BEFORE flipping the listening UI so a permission prompt
// (or a flat-out denial) doesn't briefly toggle the red "listening" state
// only to snap back when getUserMedia rejects.
var micPermission = 'unknown';
var micPermissionPending = false;
(async function initMicPermission(){
  try {
    if (navigator.permissions && navigator.permissions.query) {
      var st = await navigator.permissions.query({name:'microphone'});
      micPermission = st.state;
      try { st.onchange = function(){ micPermission = st.state; }; } catch(_){}
    }
  } catch(_){}
})();
// Fire the system permission prompt without touching any mic-related UI.
// No chat message, no listening animation, no widget swap — caller decides
// what to do once permission is granted (typically: nothing; user taps again).
async function requestMicPermission(){
  if (micPermission === 'granted' || micPermission === 'denied' || micPermissionPending) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { micPermission = 'denied'; return; }
  micPermissionPending = true;
  try {
    var probe = await navigator.mediaDevices.getUserMedia({audio:true});
    try { probe.getTracks().forEach(function(t){ try { t.stop(); } catch(_){} }); } catch(_){}
    micPermission = 'granted';
  } catch(e) {
    micPermission = (e && (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError')) ? 'denied' : 'unknown';
  }
  micPermissionPending = false;
}
var vadAnalyser = null;
var vadInterval = null;
var vadMaxLevel = 0;
var VAD_THRESHOLD = 14; // average byte-frequency above which we treat audio as actual speech
function startVAD(stream) {
  try {
    var ctx = getAudioCtx();
    var source = ctx.createMediaStreamSource(stream);
    vadAnalyser = ctx.createAnalyser();
    vadAnalyser.fftSize = 256;
    source.connect(vadAnalyser);
    vadMaxLevel = 0;
    var data = new Uint8Array(vadAnalyser.frequencyBinCount);
    vadInterval = setInterval(function() {
      if (!vadAnalyser) return;
      vadAnalyser.getByteFrequencyData(data);
      var sum = 0;
      for (var i = 0; i < data.length; i++) sum += data[i];
      var avg = sum / data.length;
      if (avg > vadMaxLevel) vadMaxLevel = avg;
    }, 80);
  } catch(_) {}
}
function stopVAD() {
  if (vadInterval) { clearInterval(vadInterval); vadInterval = null; }
  if (vadAnalyser) { try { vadAnalyser.disconnect(); } catch(_){} vadAnalyser = null; }
}
// Whisper tends to hallucinate stock YouTube phrases on silence — filter
// the most common Russian ones plus short punctuation-only transcripts.
var WHISPER_HALLUCINATIONS = [
  /^[\s\.,!?…\-—]+$/,
  /^спасибо за (просмотр|внимание)/i,
  /^подписывайтесь на канал/i,
  /^субтитры (подготовил|сделал)/i,
  /^продолжение следует/i,
  /^до (новых )?встреч/i,
  /^приятного просмотра/i,
  /^всем пока/i,
  /^музыка (играет|звучит)/i,
  /^\(.*\)$/,
  /^\[.*\]$/,
  /^титры/i,
  /^редактор субтитров/i,
  /^корректор/i,
  /^продолжение в следующей серии/i
];
function isWhisperHallucination(t) {
  var s = String(t || '').trim();
  if (!s || s.length < 2) return true;
  for (var i = 0; i < WHISPER_HALLUCINATIONS.length; i++) {
    if (WHISPER_HALLUCINATIONS[i].test(s)) return true;
  }
  return false;
}
function pickAudioMime() {
  var candidates = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus'];
  for (var i=0; i<candidates.length; i++) {
    try { if (MediaRecorder.isTypeSupported(candidates[i])) return candidates[i]; } catch(_){}
  }
  return '';
}
function releaseMicStream() {
  if (!audioStream) return;
  try { audioStream.getTracks().forEach(function(t){ try { t.stop(); } catch(_){} }); } catch(_){}
  audioStream = null;
}
async function startListening() {
  if (state !== 'idle') return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined') {
    errEl.textContent = 'Запись не поддерживается этим браузером';
    return;
  }
  if (!apiKey) {
    addMsg('a', 'Сначала отправь мне твой OpenAI API ключ (начинается с sk-) — я его запомню.');
    return;
  }
  // Permission gate (defensive — callers also check before showing any
  // mic widgets). No UI side effects here; just bail if not granted.
  if (micPermission !== 'granted') {
    requestMicPermission();
    return;
  }
  // If a previous Whisper transcription is still in-flight, abort it so
  // the new recording supersedes it cleanly.
  if (currentAbort) { try { currentAbort.abort(); } catch(_){} currentAbort = null; }
  errEl.textContent = '';
  setState('listening'); listenStart = Date.now();
  listenAborted = false;
  pendingStop = false;
  audioChunks = [];
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({audio:true});
  } catch(e) {
    if (e && (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError')) micPermission = 'denied';
    errEl.textContent = 'Нет доступа к микрофону';
    setState('idle');
    return;
  }
  // User released before getUserMedia resolved — abort.
  if (pendingStop) {
    releaseMicStream();
    setState('idle');
    return;
  }
  var mime = pickAudioMime();
  try {
    audioRec = new MediaRecorder(audioStream, mime ? {mimeType: mime} : undefined);
  } catch(e) {
    errEl.textContent = 'MediaRecorder: '+e.message;
    releaseMicStream();
    setState('idle');
    return;
  }
  audioRec.ondataavailable = function(ev) {
    if (ev.data && ev.data.size > 0) audioChunks.push(ev.data);
  };
  audioRec.onstop = async function() {
    var rec = audioRec;
    var chunks = audioChunks || [];
    var loudEnough = vadMaxLevel >= VAD_THRESHOLD;
    audioRec = null;
    audioChunks = null;
    stopVAD();
    releaseMicStream();
    pumpKeepalive();
    nudgeOutputToSpeaker();
    var duration = Date.now() - listenStart;
    if (listenAborted || duration < 300 || !chunks.length || !loudEnough) { setState('idle'); return; }
    var blobType = (rec && rec.mimeType) || mime || 'audio/webm';
    var blob = new Blob(chunks, {type: blobType});
    var ext = blobType.indexOf('mp4') >= 0 ? 'm4a' : blobType.indexOf('ogg') >= 0 ? 'ogg' : 'webm';
    // Stay in idle visually while Whisper transcribes — the "Думаю" status
    // only kicks in once askClaude/askWithImages actually starts the LLM
    // call. The user can press mic again at any time to start a new
    // recording; that aborts this Whisper request.
    try {
      typingCancel = false;
      currentAbort = new AbortController();
      var fd = new FormData();
      fd.append('file', blob, 'audio.' + ext);
      fd.append('model', 'whisper-1');
      fd.append('language', 'ru');
      fd.append('temperature', '0');
      fd.append('prompt', 'Ребёнок задаёт вопрос репетитору Стичу или решает школьную задачу.');
      var r = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method: 'POST',
        headers: {'Authorization': 'Bearer ' + apiKey},
        body: fd,
        signal: currentAbort.signal
      });
      currentAbort = null;
      var data = await r.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      var t = ((data.text || '') + '').trim();
      if (!t || isWhisperHallucination(t)) return;
      if (window.pendingPhotos && window.pendingPhotos.length) {
        sendPhotosWith(window.pendingPhotos.slice(), t);
        cancelAllPhotos();
      } else {
        askClaude(t);
      }
    } catch(err) {
      currentAbort = null;
      if (err && err.name !== 'AbortError') errEl.textContent = 'Whisper: ' + err.message;
    }
  };
  try {
    audioRec.start();
    startVAD(audioStream);
  } catch(e) {
    errEl.textContent = 'Recorder start: '+e.message;
    stopVAD();
    releaseMicStream();
    audioRec = null;
    setState('idle');
  }
}

function stopListening() {
  if (state !== 'listening') return;
  var duration = Date.now() - listenStart;
  if (duration < 300) listenAborted = true;
  // Snap the whole UI back to idle on release — no "Слушаю..." status
  // hanging around. audioRec.onstop will bump the state to 'thinking'
  // shortly if there's an actual transcript to process.
  setState('idle');
  if (audioRec && audioRec.state === 'recording') {
    try { audioRec.stop(); } catch(_){}
  } else {
    // getUserMedia hasn't resolved yet — flag it so the resolve handler
    // tears down without recording.
    pendingStop = true;
  }
}

// Cancel in-flight thinking / talking — abort fetch, stop audio, exit
// the typing loop, return to idle.
var currentAbort = null;
var currentAudio = null;
var typingCancel = false;
function cancelThinking() {
  if (currentAbort) { try { currentAbort.abort(); } catch(_){} currentAbort = null; }
  if (currentAudio) {
    try { currentAudio.pause(); } catch(_){}
    try { currentAudio.src = ''; currentAudio.load(); } catch(_){}
    currentAudio = null;
  }
  typingCancel = true;
  stopMouth();
  errEl.textContent = '';
  setState('idle');
}

// Push-to-talk + cancel-on-tap. While busy: pointerdown cancels the current
// thinking/talking. If the finger keeps holding past 250 ms, we slide into
// recording — the user can immediately keep speaking. A quick release stays
// "just a cancel" without flashing the listening UI.
var pendingListen = null;
function cancelPendingListen() {
  if (pendingListen != null) { clearTimeout(pendingListen); pendingListen = null; }
}
micBtn.addEventListener('pointerdown', function(e) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  // Mic permission gate — no widget swaps, no cancel, no listening flip
  // until we know the mic is allowed. First press without permission only
  // fires the system prompt; user taps again afterwards.
  if (micPermission !== 'granted') {
    if (micPermission === 'denied') {
      errEl.textContent = 'Разреши доступ к микрофону в настройках';
    } else {
      requestMicPermission();
    }
    return;
  }
  if (micBtn.setPointerCapture) { try { micBtn.setPointerCapture(e.pointerId); } catch(_){} }
  if (state === 'thinking' || state === 'talking') {
    cancelThinking();
    cancelPendingListen();
    pendingListen = setTimeout(function() {
      pendingListen = null;
      getAudioCtx();
      startListening();
    }, 250);
    return;
  }
  getAudioCtx();
  startListening();
});
micBtn.addEventListener('pointerup', function(e) {
  e.preventDefault();
  if (pendingListen != null) { cancelPendingListen(); return; }
  stopListening();
});
micBtn.addEventListener('pointercancel', function(){ cancelPendingListen(); stopListening(); });
micBtn.addEventListener('contextmenu', function(e){ e.preventDefault(); });
// Safety nets in case the pointerup is swallowed by the host (Telegram WebView).
window.addEventListener('pointerup', function(){ cancelPendingListen(); if (state==='listening') stopListening(); });
window.addEventListener('mouseup', function(){ cancelPendingListen(); if (state==='listening') stopListening(); });
window.addEventListener('touchend', function(){ cancelPendingListen(); if (state==='listening') stopListening(); });
window.addEventListener('blur', function(){ cancelPendingListen(); if (state==='listening') stopListening(); });

// Render the photos-with-text bubble in the chat and forward to GPT-4o
// vision. Used by both the typed-send path and the voice-input path so a
// recorded message attached to a photo is treated as one combined turn.
function sendPhotosWith(photos, userText) {
  var pw = document.createElement('div'); pw.className = 'bbl u';
  var grid = document.createElement('div');
  grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;max-width:240px;justify-content:flex-end';
  photos.forEach(function(p) {
    var im = document.createElement('img');
    im.src = p;
    im.style.cssText = (photos.length===1 ? 'width:100%;max-width:200px' : 'width:78px;height:78px;object-fit:cover')+';border-radius:12px';
    grid.appendChild(im);
  });
  pw.appendChild(grid);
  chat.appendChild(pw);
  if (userText) {
    var tw = document.createElement('div'); tw.className = 'bbl u';
    var tb = document.createElement('div'); tb.className = 'bi';
    tb.textContent = userText;
    tw.appendChild(tb);
    chat.appendChild(tw);
  }
  chat.scrollTop = chat.scrollHeight;
  askWithImages(photos, userText);
}

function doSend() {
  if (state !== 'idle') return;
  getAudioCtx(); // unlock Web Audio on user gesture (typing path)
  var rawMsg = inp.value.trim();
  if (saveKeyFromMessage(rawMsg)) {
    inp.value = '';
    addMsg('a', 'Бум! Ключ запомнил! Теперь спрашивай 🐾');
    return;
  }
  if (window.pendingPhotos && window.pendingPhotos.length) {
    var photos = window.pendingPhotos.slice();
    var userText = inp.value.trim();
    cancelAllPhotos();
    inp.value = '';
    sendPhotosWith(photos, userText);
    return;
  }
  var msg = inp.value.trim(); if(!msg) return;
  inp.value=''; askClaude(msg);
}

// Pointer-based send: if the user presses the button and then slides their
// finger off before releasing, the send is cancelled. Only a release that
// stays inside the button bounds actually sends.
var sbDown = false;
sb.addEventListener('pointerdown', function(e) {
  if (e.button !== undefined && e.button !== 0) return;
  if (sb.disabled) return;
  sbDown = true;
});
sb.addEventListener('pointerleave', function() { sbDown = false; });
sb.addEventListener('pointercancel', function() { sbDown = false; });
sb.addEventListener('pointerup', function(e) {
  if (!sbDown) return;
  sbDown = false;
  var r = sb.getBoundingClientRect();
  if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) return;
  doSend();
});

inp.onkeydown = function(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
};
inp.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Camera - multiple photos with long-press for gallery
window.pendingPhotos = [];
var MAX_PHOTOS = 12;

function handleFiles(files) {
  if (!files || !files.length) return;
  var slots = MAX_PHOTOS - window.pendingPhotos.length;
  Array.from(files).slice(0, slots).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      window.pendingPhotos.push(ev.target.result);
      renderPhotoPreview();
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('fileInputCamera').addEventListener('change', function() {
  resetCamButton();
  handleFiles(this.files); this.value = '';
});

// Long-press: 1.5s → gallery; tap → camera
var camBtn = document.getElementById('camBtn');
var camTimer = null;
var camCountdownEl = document.getElementById('camCountdown');
var camLongPress = false;
var wasLongPress = false;
var countdownVal = 0;

function startCamPress(e) {
  // Clear any leftover timers from previous press
  if (camTimer && camTimer.clear) camTimer.clear();
  camTimer = null;
  // Local reset
  camBtn.classList.remove('neon');
  camBtn.style.background = '#008db0';
  camBtn.style.boxShadow = '';
  camBtn.setAttribute('for', 'fileInputCamera');
  var ccS = document.getElementById('centerCam');
  var cpS = document.getElementById('centerPaw');
  if (ccS) ccS.style.opacity = '1';
  if (cpS) cpS.style.opacity = '0';
  camLongPress = false;
  wasLongPress = false;
  // Generate arc segments
  var svg = document.getElementById('camArcs');
  svg.innerHTML = '';
  // background ring
  var bg = document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx','23'); bg.setAttribute('cy','23'); bg.setAttribute('r','19');
  bg.setAttribute('fill','none'); bg.setAttribute('stroke','rgba(0,200,255,.12)'); bg.setAttribute('stroke-width','3');
  svg.appendChild(bg);
  // 5 segments around circle - slow start, fast end
  var circumference = 2 * Math.PI * 19;
  var segLen = (circumference / 5) - 4;
  var per = circumference / 5;
  for (var i=0; i<5; i++) {
    var c2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c2.setAttribute('id','arc'+(i+1));
    c2.setAttribute('cx','23'); c2.setAttribute('cy','23'); c2.setAttribute('r','19');
    c2.setAttribute('fill','none'); c2.setAttribute('stroke','#00ddff'); c2.setAttribute('stroke-width','3');
    c2.setAttribute('stroke-linecap','round');
    c2.setAttribute('stroke-dasharray', segLen+' '+circumference);
    c2.setAttribute('stroke-dashoffset', String(-i*per));
    c2.style.cssText = 'filter:drop-shadow(0 0 6px #00ddff);opacity:0;transition:opacity .15s';
    svg.appendChild(c2);
  }
  window._circ = circumference;
  // Reset center icons
  var cc = document.getElementById('centerCam');
  var cp = document.getElementById('centerPaw');
  if (cc) cc.style.opacity = '1';
  if (cp) cp.style.opacity = '0';

  camCountdownEl.style.display = 'block';

  // Timing: slow start, accelerating. Total 1.25s
  // arc1 immediate, then 400, 700, 900, 1050, 1250(done)
  var delays = [400, 700, 900, 1050];
  var timers = [];
  // Light arc1 immediately
  setTimeout(function(){ var a1=document.getElementById('arc1'); if(a1) a1.style.opacity='1'; }, 0);
  delays.forEach(function(d, idx) {
    timers.push(setTimeout(function() {
      var a = document.getElementById('arc'+(idx+2));
      if (a) a.style.opacity = '1';
    }, d));
  });
  // After all 5 lit - mark long press complete + light lines + enable gallery overlay
  timers.push(setTimeout(function() {
    camLongPress = true;
    camBtn.classList.add('neon');
    document.getElementById('galLabel').style.pointerEvents = 'auto';
    var cc = document.getElementById('centerCam');
    var cp = document.getElementById('centerPaw');
    if (cc) cc.style.opacity = '0';
    if (cp) cp.style.opacity = '1';
  }, 1250));
  camTimer = { timers: timers, clear: function() { this.timers.forEach(clearTimeout); } };
}

function endCamPress(e) {
  if (camTimer && camTimer.clear) camTimer.clear();
  camTimer = null;
  setTimeout(function() {
    camCountdownEl.style.display = 'none';
    camBtn.classList.remove('neon');
    document.getElementById('galLabel').style.pointerEvents = 'none';
    var ccE = document.getElementById('centerCam');
    var cpE = document.getElementById('centerPaw');
    if (ccE) ccE.style.opacity = '1';
    if (cpE) cpE.style.opacity = '0';
    camLongPress = false;
  }, 100);
}

camBtn.addEventListener('touchstart', startCamPress, {passive:false});
camBtn.addEventListener('touchend', function(e){
  endCamPress(e);
  resetLines();
}, {passive:false});
// Gallery overlay - same handlers so finger release works
var galLabel = document.getElementById('galLabel');
galLabel.addEventListener('touchend', function(e){
  endCamPress(e);
  resetLines();
}, {passive:false});
function resetLines() {
  camBtn.classList.remove('neon');
}

function renderPhotoPreview() {
  var thumbs = document.getElementById('photoThumbs');
  thumbs.innerHTML = '';
  var cb = document.getElementById('camBtn');
  // Always reset to default
  cb.classList.remove('neon');
  cb.style.background = '#008db0';
  cb.style.removeProperty('box-shadow');
  if (window.pendingPhotos.length >= MAX_PHOTOS) {
    cb.style.opacity = '0.4';
    cb.style.pointerEvents = 'none';
  } else {
    cb.style.opacity = '';
    cb.style.pointerEvents = '';
  }
  window.pendingPhotos.forEach(function(p, i) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;width:54px;height:54px;flex-shrink:0';
    var img = document.createElement('img');
    img.src = p;
    img.style.cssText = 'width:100%;height:100%;border-radius:8px;object-fit:cover';
    var del = document.createElement('button');
    del.textContent = '×';
    del.style.cssText = 'position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#fff;color:#222;border:1px solid #c0c0c0;font-size:14px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2)';
    del.onclick = function() { window.pendingPhotos.splice(i,1); renderPhotoPreview(); };
    wrap.appendChild(img);
    wrap.appendChild(del);
    thumbs.appendChild(wrap);
  });
  document.getElementById('photoPreview').style.display = window.pendingPhotos.length ? 'flex' : 'none';
}

function cancelAllPhotos() {
  window.pendingPhotos = [];
  renderPhotoPreview();
}

async function askWithImages(photos, userText) {
  errEl.textContent = '';
  if (!apiKey) {
    addMsg('a', 'Сначала отправь мне твой OpenAI API ключ (начинается с sk-) — я его запомню.');
    setState('idle');
    return;
  }
  setState('thinking');
  var imgText = userText && userText.trim() ? userText : 'Посмотри на фото и помоги разобраться!';
  var content = photos.map(function(p) {
    return {type:'image_url', image_url:{url:p, detail:'low'}};
  });
  content.push({type:'text', text:imgText});
  hist.push({role:'user', content:content});
  saveHist();
  try {
    typingCancel = false;
    currentAbort = new AbortController();
    var r = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'gpt-4o', max_tokens:2000, messages:[{role:'system',content:prompt}].concat(hist)}),
      signal: currentAbort.signal
    });
    var data = await r.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!data.choices || !data.choices[0]) throw new Error('API: ' + JSON.stringify(data).slice(0,200));
    var msg0 = data.choices[0].message;
    var text = '';
    if (typeof msg0.content === 'string') text = msg0.content;
    else if (Array.isArray(msg0.content)) text = msg0.content.map(function(p){return p.text||'';}).join('');
    else if (msg0.refusal) text = msg0.refusal;
    if (!text) throw new Error('Empty: ' + JSON.stringify(data.choices[0]).slice(0,300));
    hist.push({role:'assistant', content:text});
    saveHist();

    var audioBlob = null;
    try {
      var ttsXhr2 = new XMLHttpRequest();
      currentAbort = { abort: function(){ try { ttsXhr2.abort(); } catch(_){} } };
      audioBlob = await new Promise(function(resolve) {
        ttsXhr2.open('POST','https://api.openai.com/v1/audio/speech');
        ttsXhr2.setRequestHeader('Content-Type','application/json');
        ttsXhr2.setRequestHeader('Authorization','Bearer '+apiKey);
        ttsXhr2.responseType = 'arraybuffer';
        ttsXhr2.onload = function(){
          if (ttsXhr2.status === 200) { resolve(ttsXhr2.response); return; }
          try {
            var msg = new TextDecoder().decode(new Uint8Array(ttsXhr2.response));
            errEl.textContent = 'TTS ' + ttsXhr2.status + ': ' + msg.slice(0, 180);
          } catch(_) { errEl.textContent = 'TTS HTTP ' + ttsXhr2.status; }
          resolve(null);
        };
        ttsXhr2.onerror = function(){ resolve(null); };
        ttsXhr2.onabort = function(){ resolve(null); };
        ttsXhr2.send(JSON.stringify({model:'gpt-4o-mini-tts',input:text,voice:currentVoice,speed:1.2}));
      });
    } catch(e2) {}
    currentAbort = null;
    if (typingCancel) return;

    setState('talking');
    var el = addMsg('a','');
    el.classList.add('cur');
    startMouth();
    maybeCelebrate(text);
    if (audioBlob) {
      pumpKeepalive();
      nudgeOutputToSpeaker();
      var blob2 = new Blob([audioBlob],{type:'audio/mpeg'});
      var url = URL.createObjectURL(blob2);
      var audio = new Audio(url);
      currentAudio = audio;
      audio.onended = function(){ URL.revokeObjectURL(url); audio.src=''; audio.load(); if(currentAudio===audio) currentAudio=null; };
      audio.onerror = function(){ if(currentAudio===audio) currentAudio=null; };
      audio.play().catch(function(){});
    }
    for (var i=1;i<=text.length;i++) {
      if (typingCancel) break;
      el.textContent=text.slice(0,i);
      autoScrollChat();
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    if (typingCancel) return;
    setState('idle');
  } catch(e) {
    stopMouth();
    if (e && e.name !== 'AbortError') errEl.textContent='Ошибка: '+e.message;
    setState('idle');
  }
}
