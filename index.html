<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Стич · Claude</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#ececec;color:#2d2240;font-family:system-ui,sans-serif;overscroll-behavior:none}
#app{display:contents}
.top{position:fixed;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;background:#ececec;z-index:5;padding-top:var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px));padding-bottom:4px;pointer-events:auto}
.below{position:fixed;left:0;right:0;top:calc(215px + var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px)));bottom:0;display:flex;flex-direction:column;z-index:4}
.title{padding-top:10px;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#7c5cff}
.build{font-size:10px;opacity:.6;margin-left:4px}
.stage{position:relative;width:160px;height:160px;margin-top:2px}
.glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 55%,rgba(30,90,180,.3) 0%,transparent 68%);animation:gI 3s ease-in-out infinite}
.glow.on{animation:gT .22s ease-in-out infinite}
.head{position:absolute;inset:0;animation:iB 3.5s ease-in-out infinite}
.head.talk{animation:tN .33s ease-in-out infinite}
.head.listen{animation:lT .6s ease-in-out infinite}
@keyframes iB{0%,100%{transform:translateY(0) rotate(-.3deg)}50%{transform:translateY(-5px) rotate(.3deg)}}
@keyframes tN{0%,100%{transform:translateY(0) rotate(-.8deg)}50%{transform:translateY(-3px) rotate(.8deg)}}
@keyframes lT{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gI{0%,100%{opacity:.2}50%{opacity:.5}}
@keyframes gT{0%,100%{opacity:.4}50%{opacity:.85}}
@keyframes db{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes micP{0%{box-shadow:0 0 0 0 rgba(220,50,50,.6)}100%{box-shadow:0 0 0 20px rgba(220,50,50,0)}}

.status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#8475a8;margin:2px 0}
.dot{width:6px;height:6px;border-radius:50%;background:#d8cce8;transition:all .3s}
.dot.y{background:#ffd84d;box-shadow:0 0 8px #ffd84d;animation:db .5s infinite}
.dot.g{background:#5be09b;box-shadow:0 0 8px #5be09b;animation:db 1s infinite}
.dot.b{background:#7c5cff;box-shadow:0 0 8px #7c5cff;animation:db .4s infinite}
.chat{flex:1;min-height:0;overflow-y:auto;padding:4px 14px 12px;display:flex;flex-direction:column;gap:7px}
.bbl{display:flex;animation:mIn .2s ease}
.bbl.u{justify-content:flex-end}
.bi{max-width:84%;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:15px;line-height:1.65;background:#ffffff;border:2px solid #e8d8ff;color:#2d2240;box-shadow:0 2px 8px rgba(124,92,255,.08)}
.bbl.u .bi{background:linear-gradient(135deg,#ff7eb6,#7c5cff);border:none;color:#ffffff;border-radius:16px 16px 4px 16px;box-shadow:0 2px 10px rgba(255,126,182,.3)}
.cur::after{content:‘▋’;color:#7c5cff;animation:cur .4s steps(1) infinite}
.err{flex-shrink:0;font-size:11px;color:#e84a5f;padding:0 14px;text-align:center}
.err:not(:empty){padding:2px 14px}
.bottom{flex-shrink:0;position:relative;padding:6px 12px calc(18px + env(safe-area-inset-bottom,0px));background:#ececec;display:flex;flex-direction:column;gap:6px;align-items:center}
.mic-btn{width:54px;height:54px;border-radius:50%;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3ec97a,#5be09b);box-shadow:0 3px 14px rgba(62,201,122,.4);cursor:pointer;touch-action:none}
.mic-btn.listening{background:linear-gradient(135deg,#ff5577,#cc3050);animation:micP .8s ease infinite;box-shadow:0 4px 20px rgba(255,80,120,.5)}
.mic-btn.disabled{background:#d8cce8;box-shadow:none;opacity:.5}
.mic-btn.busy{background:linear-gradient(135deg,#ff9043,#ff5577);box-shadow:0 3px 14px rgba(255,90,110,.4)}
.mic-btn{transition:background .1s}
#camBtn{transition:background .15s}
#camBtn:active{background:#006580!important}
#camBtn.neon{background:#00ddff!important;box-shadow:0 0 6px #00ddff,0 0 16px rgba(0,221,255,.7)!important}
.mic-btn:active{filter:none}
button.mic-btn:active:not(.listening){background:linear-gradient(135deg,#2ba85f,#4ad080)}
label.mic-btn:active{background:linear-gradient(135deg,#006b85,#00a4cc) !important}
.mic-hint{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#8475a8;font-weight:600}
.irow{display:flex;gap:6px;width:100%}
.inp{flex:1;background:#ffffff;border:2px solid #ffd84d;border-radius:18px;color:#2d2240;font-size:15px;padding:7px 12px;-webkit-user-select:text;user-select:text}
.inp:focus{outline:none;border-color:#7c5cff}
.inp::placeholder{color:#b8a8d8}
.inp:disabled{opacity:.5}
.sbtn{background:linear-gradient(135deg,#ff9043,#ff5577);border:none;border-radius:50%;color:#fff;font-size:15px;width:36px;height:36px;cursor:pointer;box-shadow:0 2px 8px rgba(255,90,110,.3)}
.sbtn:disabled{background:#d8cce8;opacity:.5;box-shadow:none}
.img-msg{max-width:200px;border-radius:12px;margin-top:4px;display:block}
</style>

</head>

<script>
// Telegram WebApp: expand to full height at boot so the keyboard doesn't
// trigger a late expand jump. Layout adaptation to the keyboard is handled
// purely by viewport (interactive-widget=resizes-content) + 100dvh — no
// JS-side --kb math.
var tg = null;
try {
  if (window.Telegram && window.Telegram.WebApp) {
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if (typeof tg.disableVerticalSwipes === 'function') {
      try { tg.disableVerticalSwipes(); } catch(_) {}
    }
    if (typeof tg.requestFullscreen === 'function') {
      try { tg.requestFullscreen(); } catch(_) {}
    }
  }
} catch(_) {}

// Quick tap inside the chat area dismisses the keyboard. Holds and
// scrolls are ignored so the user can read/scroll without losing focus.
var chatTap = null;
document.addEventListener('pointerdown', function(e) {
  var chat = document.querySelector('.chat');
  if (!chat || !chat.contains(e.target)) { chatTap = null; return; }
  chatTap = { t: Date.now(), x: e.clientX, y: e.clientY };
}, {passive:true});
document.addEventListener('pointerup', function(e) {
  var t = chatTap;
  chatTap = null;
  if (!t) return;
  var chat = document.querySelector('.chat');
  if (!chat || !chat.contains(e.target)) return;
  if (Date.now() - t.t > 300) return; // long press
  if (Math.abs(e.clientX - t.x) > 8 || Math.abs(e.clientY - t.y) > 8) return; // dragged
  var a = document.activeElement;
  if (a && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA')) a.blur();
}, {passive:true});
document.addEventListener('pointercancel', function() { chatTap = null; }, {passive:true});


var KEY_SK = 'sk';
var apiKey = localStorage.getItem(KEY_SK) || '';

// If no key yet, replace the welcome bubble with a request to send one in
// chat. The user pastes/types an sk-... message and saveKeyFromMessage
// picks it up.
function ensureKeyPrompt() {
  if (apiKey) return;
  var firstBubble = document.querySelector('.chat .bbl .bi');
  if (firstBubble) firstBubble.textContent = 'Привет! Я Стич! Чтобы я ожил — отправь мне твой OpenAI API ключ (он начинается с sk-).';
}
function saveKeyFromMessage(text) {
  var m = String(text || '').trim();
  if (!/^sk-[A-Za-z0-9_\-]{10,}$/.test(m)) return false;
  apiKey = m;
  localStorage.setItem(KEY_SK, m);
  return true;
}

// ── App logic ──
var glow = document.getElementById('glow');
var head = document.getElementById('head');
var dot = document.getElementById('dot');
var stxt = document.getElementById('stxt');
var chat = document.getElementById('chat');
var errEl = document.getElementById('err');
var inp = document.getElementById('inp');
var sb = document.getElementById('sb');
var micBtn = document.getElementById('micBtn');
var micHint = document.getElementById('micHint');
var MC = document.getElementById('MC');
var MO = document.getElementById('MO');
var MS = document.getElementById('MS');
var MT = document.getElementById('MT');
var TG = document.getElementById('TG');
var TOP = document.getElementById('TOP');
var BOT = document.getElementById('BOT');

// Replace the canned welcome with a key request when no key is stored.
ensureKeyPrompt();

var state = 'idle';
var hist = [];
var raf = null;
var mC = 0, lastFlip = 0, isOpen = false, posIdx = 0, shapeIdx = 0;
var recog = null, listenStart = 0;
var currentShape = 'normal';
var shapes = ['normal','normal','wide','normal','tube','normal','wide','tube','normal'];
var openPos = [0.3,0.5,0.7,0.9,0.4,0.75,0.55];

function drawMouth(a, shape) {
  if (a < 0.04) { MC.style.display=''; MO.style.display='none'; return; }
  MC.style.display='none'; MO.style.display='';
  var cx=150, cy=235, w, h;
  if (shape==='tube') { w=18+a*10; h=a*40; }
  else if (shape==='wide') { w=52+a*16; h=a*14; }
  else { w=42+a*16; h=a*26; }
  var L=cx-w/2, R=cx+w/2, bY=cy+h, th=shape==='tube'?3+a*5:5+a*8;
  MS.setAttribute('d','M'+L+' '+cy+' Q'+cx+' '+(cy-6)+' '+R+' '+cy+' Q'+(R-4)+' '+bY+' '+cx+' '+(bY+2)+' Q'+(L+4)+' '+bY+' '+L+' '+cy+'Z');
  if (a>0.5) { MT.setAttribute('d','M'+(cx-14)+' '+cy+' Q'+(cx-8)+' '+(cy-2)+' '+(cx-2)+' '+(cy-1)+' L'+(cx+2)+' '+(cy-1)+' Q'+(cx+8)+' '+(cy-2)+' '+(cx+14)+' '+cy+' Q'+(cx+7)+' '+(cy+th)+' '+cx+' '+(cy+th+1)+' Q'+(cx-7)+' '+(cy+th)+' '+(cx-14)+' '+cy+'Z'); MT.style.display=''; }
  else { MT.style.display='none'; }
  if (a>0.35) { TG.setAttribute('cx',cx); TG.setAttribute('cy',cy+h*0.65); TG.setAttribute('rx',10+a*4); TG.setAttribute('ry',4+a*5); TG.style.display=''; }
  else { TG.style.display='none'; }
  TOP.setAttribute('d','M'+L+' '+cy+' Q'+cx+' '+(cy-8)+' '+R+' '+cy);
  BOT.setAttribute('d','M'+L+' '+cy+' Q'+(L+6)+' '+(bY+2)+' '+cx+' '+(bY+3)+' Q'+(R-6)+' '+(bY+2)+' '+R+' '+cy);
}

function mLoop(t) {
  raf = requestAnimationFrame(mLoop);
  var interval = 60 + Math.random()*40;
  if (t - lastFlip > interval) {
    isOpen = !isOpen; lastFlip = t;
    if (isOpen) { posIdx=(posIdx+1)%openPos.length; shapeIdx=(shapeIdx+1)%shapes.length; currentShape=shapes[shapeIdx]; mC=openPos[posIdx]; }
    else { mC = 0; }
    drawMouth(mC, currentShape);
  }
}
function startMouth() { if (!raf) raf = requestAnimationFrame(mLoop); }
function stopMouth() { if (raf) { cancelAnimationFrame(raf); raf=null; } mC=0; drawMouth(0,'normal'); }

function setState(s) {
  state = s;
  dot.className = 'dot'+(s==='thinking'?' y':s==='talking'?' g':s==='listening'?' b':'');
  stxt.textContent = {idle:'Готов',listening:'Слушаю...',thinking:'Думаю...',talking:'Говорит...'}[s];
  head.className = 'head'+(s==='talking'?' talk':s==='listening'?' listen':'');
  glow.className = 'glow'+(s==='talking'?' on':'');
  var busy = s==='thinking'||s==='talking';
  micBtn.className = 'mic-btn'+(s==='listening'?' listening':busy?' busy':'');
  if (s === 'listening') {
    micBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32" fill="#fff"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
  } else if (busy) {
    micBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
  } else {

var prompt = 'Ты — персональный репетитор. Узнай имя ученика и запомни. Не представляйся первым — не называй своё имя, не говори кто ты, не описывай себя по своей инициативе. ИСКЛЮЧЕНИЕ: если ученик САМ спросит "как тебя зовут?", "кто ты?" или похожее — ответь коротко: тебя зовут Липо Стич, ты инопланетный помощник-репетитор. Главная цель — не давать ответы, а развивать мышление и помогать самому прийти к решению. ВАЖНО: говори КОРОТКО, не лей воду. 1-2 коротких предложения за раз. Жди задание или вопрос — не наговаривай лишнего. Если нет конкретного вопроса или задания — НЕ отвечай длинно и НЕ выдумывай темы, просто коротко спроси чем помочь. ЗАПРЕЩЕНО: давать готовые ответы, решать задачу за ученика, представляться без вопроса. ОБЯЗАТЕЛЬНО: объяснять через вопросы, разбивать на шаги, хвалить за ход мыслей. СТИЛЬ: общайся как обычный ChatGPT-репетитор — спокойно, ясно, по-человечески. НЕ называй ученика "зверёк", "малыш" и подобными словечками. НЕ вставляй "хи-хи", "бум", "ха", "ага" в каждый ответ. Просто понятные фразы простым языком для 8-9 лет. ИСКЛЮЧЕНИЕ: КОГДА РЕБЁНОК САМ НАЗВАЛ ВЕРНЫЙ ОТВЕТ — обязательно начни ответ со слова "Бум!" и подтверди (например: "Бум! Точно так!", "Бум! Ты угадал!", "Бум! Молодец, верно!"). Если ответ неверный — не говори "Бум", мягко направь наводящим вопросом без лишних междометий. Алгоритм: 1) попроси прочитать задачу и сказать что поняла, 2) спроси что известно, 3) спроси что найти, 4) помоги через наводящие вопросы, 5) шаг за шагом, 6) ошибка — мягко направь, верный ответ — Бум-подтверждение. Если просит ответ: предложи разобрать вместе. Главное правило: ученик должен САМ прийти к ответу, а ты подтвердить через "Бум!". Если фото и не понимаешь — просто спроси что с этим делать.';

async function askClaude(msg) {
  errEl.textContent = '';
  addMsg('u', msg);
  if (!apiKey) {
    addMsg('a', 'Сначала отправь мне твой OpenAI API ключ (начинается с sk-) — я его запомню.');
    setState('idle');
    return;
  }
  setState('thinking');
  hist.push({role:'user', content:msg});
  try {
    // Filter out image messages for gpt-4o-mini (text only)
    var textHist = hist.map(function(m) {
      if (Array.isArray(m.content)) {
        var txt = m.content.filter(function(p){return p.type==='text';}).map(function(p){return p.text;}).join(' ');
        return {role:m.role, content:txt||'[фото]'};
      }
      return m;
    });
    var messages = [{role:'system',content:prompt}].concat(textHist);
    typingCancel = false;
    currentAbort = new AbortController();
    var r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({model:'gpt-4o', max_tokens:2000, messages:messages}),
      signal: currentAbort.signal
    });
    var data = await r.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!data.choices || !data.choices[0]) throw new Error('API: ' + JSON.stringify(data).slice(0,200));
    var msg0 = data.choices[0].message;
    var text = '';
    if (typeof msg0.content === 'string') text = msg0.content;
    else if (Array.isArray(msg0.content)) text = msg0.content.map(function(p){return p.text||'';}).join('');
    else if (msg0.refusal) text = msg0.refusal;
    if (!text) throw new Error('Empty: ' + JSON.stringify(data.choices[0]).slice(0,300));
    hist.push({role:'assistant', content:text});

    // STEP 1: Download audio (still showing "Думает...")
    var audioBlob = null;
    try {
      var ttsXhr = new XMLHttpRequest();
      currentAbort = { abort: function(){ try { ttsXhr.abort(); } catch(_){} } };
      audioBlob = await new Promise(function(resolve) {
        ttsXhr.open('POST','https://api.openai.com/v1/audio/speech');
        ttsXhr.setRequestHeader('Content-Type','application/json');
        ttsXhr.setRequestHeader('Authorization','Bearer '+apiKey);
        ttsXhr.responseType = 'arraybuffer';
        ttsXhr.onload = function(){ resolve(ttsXhr.status===200 ? ttsXhr.response : null); };
        ttsXhr.onerror = function(){ resolve(null); };
        ttsXhr.onabort = function(){ resolve(null); };
        ttsXhr.send(JSON.stringify({model:'tts-1',input:text,voice:'echo',speed:1.2}));
      });
    } catch(e2) { audioBlob = null; }
    currentAbort = null;
    if (typingCancel) return;

    // STEP 3: switch to "Говорит", start audio (HTML Audio works on iOS WebView), type text
    setState('talking');
    var el = addMsg('a', '');
    el.classList.add('cur');
    startMouth();

    if (audioBlob) {
      var blob2 = new Blob([audioBlob], {type:'audio/mpeg'});
      var url = URL.createObjectURL(blob2);
      var audio = new Audio(url);
      currentAudio = audio;
      audio.onended = function(){ URL.revokeObjectURL(url); audio.src=''; audio.load(); if(currentAudio===audio) currentAudio=null; };
      audio.onerror = function(){ URL.revokeObjectURL(url); if(currentAudio===audio) currentAudio=null; };
      audio.play().catch(function(err){ errEl.textContent = 'Звук: '+(err&&err.message||err); });
    }

    // Type text simultaneously
    for (var i=1; i<=text.length; i++) {
      if (typingCancel) break;
      el.textContent = text.slice(0,i);
      chat.scrollTop = chat.scrollHeight;
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    if (typingCancel) return;
    setState('idle');
  } catch(e) {
    stopMouth();
    if (e && e.name !== 'AbortError') errEl.textContent = 'Ошибка: '+e.message;
    setState('idle');
  }
}

// Global AudioContext - must be created/resumed on user gesture
var gAudioCtx = null;
function getAudioCtx() {
  if (!gAudioCtx) gAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (gAudioCtx.state === 'suspended') gAudioCtx.resume();
  return gAudioCtx;
}

var SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function startListening() {
  if (state!=='idle') return;
  if (!SR) { errEl.textContent='Используй Safari'; return; }
  errEl.textContent=''; setState('listening'); listenStart=Date.now();
  recog = new SR(); recog.lang='ru-RU'; recog.interimResults=false; recog.continuous=true;
  recog.onresult = function(e) {
    var t = Array.from(e.results).map(function(r){return r[0].transcript;}).join('').trim();
    recog=null; if(t) askClaude(t); else setState('idle');
  };
  recog.onerror = function(e) { recog=null; setState('idle'); };
  recog.onend = function() { recog=null; if(state==='listening') setState('idle'); };
  recog.start();
}

function stopListening() {
  if (state!=='listening') return;
  // Instant visual feedback: release the button look immediately, even though
  // recog.stop() may take a moment to deliver the final transcript.
  micBtn.classList.remove('listening');
  micBtn.classList.add('disabled');
  micBtn.textContent = '🎙️';
  micHint.textContent = '...';
  if (recog) try { recog.stop(); } catch(e){}
}

// Cancel in-flight thinking / talking — abort fetch, stop audio, exit
// the typing loop, return to idle.
var currentAbort = null;
var currentAudio = null;
var typingCancel = false;
function cancelThinking() {
  if (currentAbort) { try { currentAbort.abort(); } catch(_){} currentAbort = null; }
  if (currentAudio) {
    try { currentAudio.pause(); } catch(_){}
    try { currentAudio.src = ''; currentAudio.load(); } catch(_){}
    currentAudio = null;
  }
  typingCancel = true;
  stopMouth();
  errEl.textContent = '';
  setState('idle');
}

// Push-to-talk + cancel-on-tap. While busy: pointerdown cancels the current
// thinking/talking. If the finger keeps holding past 250 ms, we slide into
// recording — the user can immediately keep speaking. A quick release stays
// "just a cancel" without flashing the listening UI.
var pendingListen = null;
function cancelPendingListen() {
  if (pendingListen != null) { clearTimeout(pendingListen); pendingListen = null; }
}
micBtn.addEventListener('pointerdown', function(e) {
  if (e.button !== undefined && e.button !== 0) return;
  e.preventDefault();
  if (micBtn.setPointerCapture) { try { micBtn.setPointerCapture(e.pointerId); } catch(_){} }
  if (state === 'thinking' || state === 'talking') {
    cancelThinking();
    cancelPendingListen();
    pendingListen = setTimeout(function() {
      pendingListen = null;
      getAudioCtx();
      startListening();
    }, 250);
    return;
  }
  getAudioCtx();
  startListening();
});
micBtn.addEventListener('pointerup', function(e) {
  e.preventDefault();
  if (pendingListen != null) { cancelPendingListen(); return; }
  stopListening();
});

var camBtn = document.getElementById('camBtn');

var wasLongPress = false;
var countdownVal = 0;

function startCamPress(e) {
  // Clear any leftover timers from previous press
  if (camTimer && camTimer.clear) camTimer.clear();
  camTimer = null;
  // Local reset
  camBtn.classList.remove('neon');
  camBtn.style.background = '#008db0';
  camBtn.style.boxShadow = '';
  camBtn.setAttribute('for', 'fileInputCamera');
  var ccS = document.getElementById('centerCam');
  var cpS = document.getElementById('centerPaw');
  if (ccS) ccS.style.opacity = '1';
  if (cpS) cpS.style.opacity = '0';
  camLongPress = false;
  wasLongPress = false;
  // Generate arc segments
  var svg = document.getElementById('camArcs');
  svg.innerHTML = '';
  // background ring
  var bg = document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx','23'); bg.setAttribute('cy','23'); bg.setAttribute('r','19');
  bg.setAttribute('fill','none'); bg.setAttribute('stroke','rgba(0,200,255,.12)'); bg.setAttribute('stroke-width','3');
  svg.appendChild(bg);
  // 5 segments around circle - slow start, fast end
  var circumference = 2 * Math.PI * 19;
  var segLen = (circumference / 5) - 4;
  var per = circumference / 5;
  for (var i=0; i<5; i++) {
    var c2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c2.setAttribute('id','arc'+(i+1));
    c2.setAttribute('cx','23'); c2.setAttribute('cy','23'); c2.setAttribute('r','19');
    c2.setAttribute('fill','none'); c2.setAttribute('stroke','#00ddff'); c2.setAttribute('stroke-width','3');
    c2.setAttribute('stroke-linecap','round');
    c2.setAttribute('stroke-dasharray', segLen+' '+circumference);
    c2.setAttribute('stroke-dashoffset', String(-i*per));
    c2.style.cssText = 'filter:drop-shadow(0 0 6px #00ddff);opacity:0;transition:opacity .15s';
    svg.appendChild(c2);
  }
  window._circ = circumference;
  // Reset center icons
  var cc = document.getElementById('centerCam');
  var cp = document.getElementById('centerPaw');
  if (cc) cc.style.opacity = '1';
  if (cp) cp.style.opacity = '0';

  camCountdownEl.style.display = 'block';

  // Timing: slow start, accelerating. Total 1.25s
  // arc1 immediate, then 400, 700, 900, 1050, 1250(done)
  var delays = [400, 700, 900, 1050];
  var timers = [];
  // Light arc1 immediately
  setTimeout(function(){ var a1=document.getElementById('arc1'); if(a1) a1.style.opacity='1'; }, 0);
  delays.forEach(function(d, idx) {
    timers.push(setTimeout(function() {
      var a = document.getElementById('arc'+(idx+2));
      if (a) a.style.opacity = '1';
    }, d));
  });
  // After all 5 lit - mark long press complete + light lines + enable gallery overlay
  timers.push(setTimeout(function() {
    camLongPress = true;
    camBtn.classList.add('neon');
    document.getElementById('galLabel').style.pointerEvents = 'auto';
    var cc = document.getElementById('centerCam');
    var cp = document.getElementById('centerPaw');
    if (cc) cc.style.opacity = '0';
    if (cp) cp.style.opacity = '1';
  }, 1250));
  camTimer = { timers: timers, clear: function() { this.timers.forEach(clearTimeout); } };
}

  if (camTimer && camTimer.clear) camTimer.clear();

      var audio = new Audio(url);
      currentAudio = audio;
      audio.onended = function(){ URL.revokeObjectURL(url); audio.src=''; audio.load(); if(currentAudio===audio) currentAudio=null; };
      audio.onerror = function(){ if(currentAudio===audio) currentAudio=null; };
      audio.play().catch(function(){});
    }
    for (var i=1;i<=text.length;i++) {
      if (typingCancel) break;
      el.textContent=text.slice(0,i);
      chat.scrollTop = chat.scrollHeight;
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    if (typingCancel) return;
    setState('idle');
  } catch(e) {
    stopMouth();
    if (e && e.name !== 'AbortError') errEl.textContent='Ошибка: '+e.message;
    setState('idle');
  }
}
</script>
