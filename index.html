<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Стич · Claude</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e16;color:#d0e8ff;font-family:system-ui,sans-serif}

#keyScreen{position:fixed;inset:0;background:#0a0e16;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:12px;z-index:999}
#keyScreen h2{font-size:22px;color:#a0c8f0;text-align:center}
#keyScreen p{font-size:13px;color:#4a7090;text-align:center;line-height:1.6}
.key-inp{width:100%;background:#060c14;border:1px solid rgba(40,90,180,.4);border-radius:14px;color:#b0d0f0;font-size:15px;padding:12px 16px;-webkit-user-select:text;user-select:text}
.key-inp:focus{outline:none;border-color:rgba(60,140,240,.6)}
.key-inp::placeholder{color:#1a3050;font-size:13px}
.key-lbl{font-size:11px;color:#3a6090;align-self:flex-start;letter-spacing:1px;text-transform:uppercase}
.key-btn{width:100%;background:linear-gradient(135deg,#112e6a,#1555b0);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;padding:14px;cursor:pointer;margin-top:4px}

#app{position:fixed;inset:0;display:none;flex-direction:column;align-items:center}
.title{padding-top:10px;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#4a80b0;flex-shrink:0}
.stage{position:relative;width:170px;height:170px;margin-top:4px;flex-shrink:0}
.glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 55%,rgba(30,90,180,.3) 0%,transparent 68%);animation:gI 3s ease-in-out infinite}
.glow.on{animation:gT .22s ease-in-out infinite}
.head{position:absolute;inset:0;animation:iB 3.5s ease-in-out infinite}
.head.talk{animation:tN .33s ease-in-out infinite}
.head.listen{animation:lT .6s ease-in-out infinite}
@keyframes iB{0%,100%{transform:translateY(0) rotate(-.3deg)}50%{transform:translateY(-5px) rotate(.3deg)}}
@keyframes tN{0%,100%{transform:translateY(0) rotate(-.8deg)}50%{transform:translateY(-3px) rotate(.8deg)}}
@keyframes lT{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gI{0%,100%{opacity:.2}50%{opacity:.5}}
@keyframes gT{0%,100%{opacity:.4}50%{opacity:.85}}
@keyframes db{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
@keyframes micP{0%{box-shadow:0 0 0 0 rgba(220,50,50,.6)}100%{box-shadow:0 0 0 20px rgba(220,50,50,0)}}
.status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#1e3050;margin:3px 0;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:#101820;transition:all .3s}
.dot.y{background:#facc15;box-shadow:0 0 6px #facc15;animation:db .5s infinite}
.dot.g{background:#4ade80;box-shadow:0 0 6px #4ade80;animation:db 1s infinite}
.dot.b{background:#60a5fa;box-shadow:0 0 6px #60a5fa;animation:db .4s infinite}
.chat{flex:1;width:100%;max-width:500px;overflow-y:auto;padding:4px 14px;display:flex;flex-direction:column;gap:7px;min-height:0}
.bbl{display:flex;animation:mIn .2s ease}
.bbl.u{justify-content:flex-end}
.bi{max-width:84%;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:15px;line-height:1.65;background:#0a1624;border:1px solid rgba(40,90,180,.2);color:#90b8e0}
.bbl.u .bi{background:linear-gradient(135deg,#112e6a,#1550a0);border:none;color:#e0f0ff;border-radius:16px 16px 4px 16px}
.cur::after{content:‘▋’;color:#60b0ff;animation:cur .6s infinite}
.err{font-size:11px;color:#f87171;padding:2px 14px;text-align:center;flex-shrink:0}
.bottom{flex-shrink:0;padding:8px 14px 28px;background:#0a0e16;border-top:1px solid rgba(40,90,180,.1);width:100%;max-width:500px;display:flex;flex-direction:column;gap:10px;align-items:center}
.mic-btn{width:70px;height:70px;border-radius:50%;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a3a8a,#2060d0);box-shadow:0 4px 20px rgba(30,80,200,.4);cursor:pointer;transition:background .2s;touch-action:none}
.mic-btn.listening{background:linear-gradient(135deg,#8a1a1a,#cc3030);animation:micP .8s ease infinite}
.mic-btn.disabled{background:#111a2e;box-shadow:none;opacity:.4}
.mic-hint{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#2a4060}
.irow{display:flex;gap:8px;width:100%}
.inp{flex:1;background:#060c14;border:1px solid rgba(40,90,180,.3);border-radius:22px;color:#b0d0f0;font-size:16px;padding:10px 16px;-webkit-user-select:text;user-select:text}
.inp:focus{outline:none;border-color:rgba(60,140,240,.55)}
.inp:disabled{opacity:.4}
.inp::placeholder{color:#1a3050}
.sbtn{background:linear-gradient(135deg,#112e6a,#1555b0);border:none;border-radius:50%;color:#fff;font-size:18px;width:46px;height:46px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sbtn:disabled{background:#111a2e;opacity:.35}
</style>

<script>
function $(id){return document.getElementById(id)}
const keyScreen=$('keyScreen'),app=$('app'),
      keyInp=$('keyInp'),keyBtn=$('keyBtn'),
      glow=$('glow'),head=$('head'),dot=$('dot'),stxt=$('stxt'),
      chat=$('chat'),err=$('err'),inp=$('inp'),sb=$('sb'),
      micBtn=$('micBtn'),micHint=$('micHint'),
      MC=$('MC'),MO=$('MO'),MS=$('MS'),MT=$('MT'),TG=$('TG'),ML=$('ML');

let API_KEY = localStorage.getItem('sk') || '';

function showApp(){
  keyScreen.style.display = 'none';
  app.style.display = 'flex';
}

if(API_KEY){ showApp(); }

keyBtn.addEventListener('click', ()=>{
  const k = keyInp.value.trim();
  if(!k) return;
  API_KEY = k; localStorage.setItem('sk', k);
  showApp();
});
keyInp.addEventListener('keydown', e=>{ if(e.key==='Enter') keyBtn.click(); });

let state='idle', hist=[], raf=null, mC=0, mT=0, lastB=0, recog=null, listenStart=0;

function setState(s){
  state=s;
  dot.className='dot'+(s==='thinking'?' y':s==='talking'?' g':s==='listening'?' b':'');
  stxt.textContent={idle:'Готов',listening:'Слушаю...',thinking:'Думаю...',talking:'Говорит...'}[s];
  head.className='head'+(s==='talking'?' talk':s==='listening'?' listen':'');
  glow.className='glow'+(s==='talking'?' on':'');
  const busy=s==='thinking'||s==='talking';
  micBtn.className='mic-btn'+(s==='listening'?' listening':busy?' disabled':'');
  micBtn.textContent=s==='listening'?'⏹':'🎙️';
  micHint.textContent=s==='listening'?'ОТПУСТИ...':busy?'...':'ДЕРЖИ И ГОВОРИ';
  inp.disabled=busy; sb.disabled=busy;
}

function drawMouth(a){
  if(a<0.06){MC.style.display='';MO.style.display='none';return}
  MC.style.display='none';MO.style.display='';
  const cx=200, cy=298, w=84+a*32, h=a*42, L=cx-w/2, R=cx+w/2, bY=cy+h, th=10+a*12;
  MS.setAttribute('d',`M${L} ${cy} Q${cx} ${cy-7} ${R} ${cy} Q${R-7} ${bY} ${cx} ${bY+3} Q${L+7} ${bY} ${L} ${cy}Z`);
  MT.setAttribute('d',`M${cx-22} ${cy} Q${cx-12} ${cy-3} ${cx-4} ${cy-2} L${cx+4} ${cy-2} Q${cx+12} ${cy-3} ${cx+22} ${cy} Q${cx+12} ${cy+th} ${cx} ${cy+th+2} Q${cx-12} ${cy+th} ${cx-22} ${cy}Z`);
  TG.setAttribute('cx',cx); TG.setAttribute('cy',cy+h*0.58);
  TG.setAttribute('rx',18+a*8); TG.setAttribute('ry',8+a*10);
  ML.setAttribute('d',`M${L} ${cy} Q${cx} ${cy-10} ${R} ${cy}`);
}
function mLoop(t){raf=requestAnimationFrame(mLoop);const age=(t-lastB)/1000;if(age>0.08)mT=Math.max(0,mT-0.05);mC+=(mT-mC)*0.22;drawMouth(mC)}
function beat(){lastB=performance.now();mT=0.7+Math.random()*0.3}
function startMouth(){if(!raf)raf=requestAnimationFrame(mLoop)}
function stopMouth(){if(raf){cancelAnimationFrame(raf);raf=null}mC=0;mT=0;drawMouth(0)}

function addMsg(role,text){
  const w=document.createElement('div');w.className='bbl'+(role==='u'?' u':'');
  const b=document.createElement('div');b.className='bi';b.textContent=text;
  w.appendChild(b);chat.appendChild(w);
  setTimeout(()=>chat.scrollTop=chat.scrollHeight, 50);
  return b;
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function typeText(el,text){
  el.textContent='';el.classList.add('cur');
  for(let i=1;i<=text.length;i++){
    el.textContent=text.slice(0,i);
    if(text[i-1]!==' ')beat();
    chat.scrollTop=chat.scrollHeight;
    await sleep(18);
  }
  el.classList.remove('cur');
}


async function askClaude(msg){
  err.textContent='';
  addMsg('u',msg);
  setState('thinking');
  hist.push({role:'user',content:msg});
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'anthropic-version':'2023-06-01',
        'x-api-key':API_KEY,
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:300,
        system:'Ты ИИ-ассистент в образе Стича (эксперимент 626) из Lilo & Stitch. Отвечай коротко (1-2 предложения), весело. Иногда добавляй Ага!, Бум!, Стич знает!. Отвечай на языке пользователя.',
        messages:hist
      })
    });
    const data=await r.json();
    if(data.error) throw new Error(data.error.message);
    const text=data.content[0].text;
    hist.push({role:'assistant',content:text});
    setState('talking');
    const el=addMsg('a','');
    startMouth();
    await typeText(el, text);
    stopMouth();
    setState('idle');
  }catch(e){
    stopMouth();
    err.textContent='Ошибка: '+e.message;
    setState('idle');
  }
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

function startListening(){
  if(state!=='idle') return;
  if(!SR){err.textContent='Используй Safari';return}
  err.textContent='';
  setState('listening');
  listenStart=Date.now();
  recog=new SR();
  recog.lang='ru-RU';
  recog.interimResults=false;
  recog.continuous=true;
  recog.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('').trim();
    recog=null;
    if(t) askClaude(t);
    else setState('idle');
  };
  recog.onerror=e=>{
    recog=null;
    setState('idle');
    if(e.error==='not-allowed') err.textContent='Разреши микрофон в Safari';
    else if(e.error!=='aborted') err.textContent='Ошибка mic: '+e.error;
  };
  recog.onend=()=>{recog=null;if(state==='listening')setState('idle')};
  recog.start();
}

function stopListening(){
  if(state!=='listening') return;
  const elapsed=Date.now()-listenStart;
  const delay=Math.max(0, 600-elapsed);
  setTimeout(()=>{
    if(recog){ try{recog.stop()}catch(e){} }
    else setState('idle');
  }, delay);
}

micBtn.addEventListener('touchstart', e=>{
  e.preventDefault();
  startListening();
},{passive:false});
micBtn.addEventListener('touchend',   e=>{e.preventDefault();stopListening();},{passive:false});
micBtn.addEventListener('touchcancel',()=>stopListening());

async function send(){
  const msg=inp.value.trim();
  if(!msg||state!=='idle') return;
  inp.value='';
  await askClaude(msg);
}
sb.addEventListener('click', send);
inp.addEventListener('keydown', e=>{if(e.key==='Enter') send()});
</script>
