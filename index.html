<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Стич · Claude</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e16;color:#d0e8ff;font-family:system-ui,sans-serif}
#keyScreen{position:fixed;inset:0;background:#0a0e16;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:12px;z-index:10}
#keyScreen h2{font-size:22px;color:#a0c8f0;text-align:center}
#keyScreen p{font-size:13px;color:#4a7090;text-align:center;line-height:1.6}
.key-lbl{font-size:11px;color:#3a6090;align-self:flex-start;letter-spacing:1px;text-transform:uppercase}
.key-inp{width:100%;background:#060c14;border:1px solid rgba(40,90,180,.4);border-radius:14px;color:#b0d0f0;font-size:15px;padding:12px 16px}
.key-inp:focus{outline:none}
.key-inp::placeholder{color:#1a3050}
.key-btn{width:100%;background:linear-gradient(135deg,#112e6a,#1555b0);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;padding:14px;cursor:pointer}
#app{position:fixed;inset:0;display:none;flex-direction:column;align-items:center}
.top{position:fixed;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;background:#0a0e16;z-index:5;padding-bottom:4px}
.title{padding-top:10px;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#4a80b0}
.build{font-size:10px;opacity:.6;margin-left:4px}
.stage{position:relative;width:160px;height:160px;margin-top:2px}
.glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 55%,rgba(30,90,180,.3) 0%,transparent 68%);animation:gI 3s ease-in-out infinite}
.glow.on{animation:gT .22s ease-in-out infinite}
.head{position:absolute;inset:0;animation:iB 3.5s ease-in-out infinite}
.head.talk{animation:tN .33s ease-in-out infinite}
.head.listen{animation:lT .6s ease-in-out infinite}
@keyframes iB{0%,100%{transform:translateY(0) rotate(-.3deg)}50%{transform:translateY(-5px) rotate(.3deg)}}
@keyframes tN{0%,100%{transform:translateY(0) rotate(-.8deg)}50%{transform:translateY(-3px) rotate(.8deg)}}
@keyframes lT{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gI{0%,100%{opacity:.2}50%{opacity:.5}}
@keyframes gT{0%,100%{opacity:.4}50%{opacity:.85}}
@keyframes db{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes micP{0%{box-shadow:0 0 0 0 rgba(220,50,50,.6)}100%{box-shadow:0 0 0 20px rgba(220,50,50,0)}}
.status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#1e3050;margin:2px 0}
.dot{width:6px;height:6px;border-radius:50%;background:#101820;transition:all .3s}
.dot.y{background:#facc15;box-shadow:0 0 6px #facc15;animation:db .5s infinite}
.dot.g{background:#4ade80;box-shadow:0 0 6px #4ade80;animation:db 1s infinite}
.dot.b{background:#60a5fa;box-shadow:0 0 6px #60a5fa;animation:db .4s infinite}
.chat{position:fixed;left:0;right:0;top:215px;bottom:185px;overflow-y:auto;padding:4px 14px 12px;display:flex;flex-direction:column;gap:7px}
.bbl{display:flex;animation:mIn .2s ease}
.bbl.u{justify-content:flex-end}
.bi{max-width:84%;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:15px;line-height:1.65;background:#0a1624;border:1px solid rgba(40,90,180,.2);color:#90b8e0}
.bbl.u .bi{background:linear-gradient(135deg,#112e6a,#1550a0);border:none;color:#e0f0ff;border-radius:16px 16px 4px 16px}
.cur::after{content:'▋';color:#60b0ff;animation:cur .4s steps(1) infinite}
.err{font-size:11px;color:#f87171;padding:2px 14px;text-align:center;position:fixed;bottom:190px;left:0;right:0}
.bottom{position:fixed;bottom:0;left:0;right:0;padding:8px 14px 30px;background:#0a0e16;border-top:1px solid rgba(40,90,180,.1);display:flex;flex-direction:column;gap:8px;align-items:center;z-index:5}
.mic-btn{width:70px;height:70px;border-radius:50%;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a3a8a,#2060d0);box-shadow:0 4px 20px rgba(30,80,200,.4);cursor:pointer;touch-action:none}
.mic-btn.listening{background:linear-gradient(135deg,#8a1a1a,#cc3030);animation:micP .8s ease infinite}
.mic-btn.disabled{background:#111a2e;box-shadow:none;opacity:.4}
.mic-hint{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#2a4060}
.irow{display:flex;gap:8px;width:100%}
.inp{flex:1;background:#060c14;border:1px solid rgba(40,90,180,.3);border-radius:22px;color:#b0d0f0;font-size:16px;padding:10px 16px}
.inp:focus{outline:none}
.inp::placeholder{color:#1a3050}
.inp:disabled{opacity:.4}
.sbtn{background:linear-gradient(135deg,#112e6a,#1555b0);border:none;border-radius:50%;color:#fff;font-size:18px;width:46px;height:46px;cursor:pointer}
.sbtn:disabled{background:#111a2e;opacity:.35}
</style>
</head>
<body>

<div id="keyScreen">
  <h2>👋 Стич · Claude <span style="font-size:14px;opacity:.5">v78</span></h2>
  <p>Введи API ключ OpenAI — сохранится в телефоне</p>
  <div class="key-lbl">OpenAI API ключ</div>
  <input class="key-inp" id="keyInp" type="password" placeholder="sk-proj-..."/>
  <button class="key-btn" id="keyBtn">Начать общение 🐾</button>
</div>

<div id="app">
  <div class="top">
    <div class="title">Стич · Claude <span class="build">v78</span></div>
    <div class="stage">
      <div class="glow" id="glow"></div>
      <div class="head" id="head">
        <svg viewBox="0 0 300 310" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bg" cx="42%" cy="30%" r="65%"><stop offset="0%" stop-color="#a8dff0"/><stop offset="35%" stop-color="#72b8e0"/><stop offset="70%" stop-color="#4a8ec8"/><stop offset="100%" stop-color="#2a5a9a"/></radialGradient>
            <radialGradient id="eg" cx="40%" cy="25%" r="65%"><stop offset="0%" stop-color="#7ac0d8"/><stop offset="100%" stop-color="#3060a0"/></radialGradient>
            <radialGradient id="ng" cx="30%" cy="25%" r="65%"><stop offset="0%" stop-color="#4a68b0"/><stop offset="100%" stop-color="#1a2858"/></radialGradient>
          </defs>
          <g transform="rotate(-22,80,95)"><path d="M42 180 Q10 140 18 70 Q28 20 68 8 Q95 0 102 30 Q108 55 95 100 Q85 140 75 175Z" fill="url(#eg)"/><path d="M55 165 Q30 132 36 75 Q44 38 68 28 Q85 22 90 45 Q94 65 83 100 Q74 130 66 162Z" fill="#c090cc" opacity=".5"/></g>
          <g transform="rotate(22,220,95)"><path d="M258 180 Q290 140 282 70 Q272 20 232 8 Q205 0 198 30 Q192 55 205 100 Q215 140 225 175Z" fill="url(#eg)"/><path d="M245 165 Q270 132 264 75 Q256 38 232 28 Q215 22 210 45 Q206 65 217 100 Q226 130 234 162Z" fill="#c090cc" opacity=".5"/></g>
          <path d="M110 288 Q122 300 150 302 Q178 300 190 288 Q183 275 150 273 Q117 275 110 288Z" fill="#3a70a8" opacity=".65"/>
          <path d="M150 40 C200 38,240 60,255 100 C270 140,265 175,250 200 C240 218,225 232,210 245 C195 258,175 266,150 268 C125 266,105 258,90 245 C75 232,60 218,50 200 C35 175,30 140,45 100 C60 60,100 38,150 40Z" fill="url(#bg)"/>
          <ellipse cx="135" cy="98" rx="62" ry="40" fill="#b8e8f8" opacity=".16"/>
          <ellipse cx="68" cy="206" rx="33" ry="20" fill="#90c8e0" opacity=".22"/><ellipse cx="232" cy="206" rx="33" ry="20" fill="#90c8e0" opacity=".22"/>
          <circle cx="55" cy="198" r="3" fill="#3060a0" opacity=".38"/><circle cx="68" cy="210" r="3" fill="#3060a0" opacity=".38"/><circle cx="80" cy="202" r="3" fill="#3060a0" opacity=".38"/>
          <circle cx="245" cy="198" r="3" fill="#3060a0" opacity=".38"/><circle cx="232" cy="210" r="3" fill="#3060a0" opacity=".38"/><circle cx="220" cy="202" r="3" fill="#3060a0" opacity=".38"/>
          <path d="M150 148 C128 148,116 162,118 178 C120 194,132 204,150 205 C168 204,180 194,182 178 C184 162,172 148,150 148Z" fill="url(#ng)"/>
          <ellipse cx="140" cy="160" rx="11" ry="7" fill="#6080c0" opacity=".38"/>
          <ellipse cx="138" cy="187" rx="8" ry="6" fill="#0c1630" opacity=".55"/><ellipse cx="162" cy="187" rx="8" ry="6" fill="#0c1630" opacity=".55"/>
          <ellipse cx="100" cy="148" rx="32" ry="32" fill="white"/><ellipse cx="102" cy="151" rx="23" ry="23" fill="#080c12"/><ellipse cx="113" cy="139" rx="10" ry="8" fill="white" opacity=".9"/><ellipse cx="100" cy="148" rx="32" ry="32" fill="none" stroke="#18305a" stroke-width="2.5"/>
          <ellipse cx="200" cy="148" rx="32" ry="32" fill="white"/><ellipse cx="202" cy="151" rx="23" ry="23" fill="#080c12"/><ellipse cx="213" cy="139" rx="10" ry="8" fill="white" opacity=".9"/><ellipse cx="200" cy="148" rx="32" ry="32" fill="none" stroke="#18305a" stroke-width="2.5"/>
          <ellipse cx="128" cy="56" rx="10" ry="7" fill="#6ab0d0" stroke="#3a70a0" stroke-width="1.5"/><ellipse cx="172" cy="56" rx="10" ry="7" fill="#6ab0d0" stroke="#3a70a0" stroke-width="1.5"/>
          <g id="MC"><path d="M126 232 Q138 244 150 245 Q162 244 174 232" stroke="#18305a" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="122" cy="234" r="2.5" fill="#3a70b0" opacity=".35"/><circle cx="178" cy="234" r="2.5" fill="#3a70b0" opacity=".35"/></g>
          <g id="MO" style="display:none"><path id="MS" fill="#06101e"/><path id="MT" fill="white"/><ellipse id="TG" fill="#c03858" opacity=".85"/><path id="TOP" stroke="#18305a" stroke-width="2.5" fill="none" stroke-linecap="round"/><path id="BOT" stroke="#18305a" stroke-width="2" fill="none" stroke-linecap="round"/></g>
        </svg>
      </div>
    </div>
    <div class="status"><div class="dot" id="dot"></div><span id="stxt">Готов</span></div>
  </div>
  <div class="chat" id="chat"><div class="bbl"><div class="bi">Привет! Я Стич! Держи микрофон и говори!</div></div></div>
  <div class="err" id="err"></div>
  <div class="bottom">
    <button class="mic-btn" id="micBtn">🎙️</button>
    <div class="mic-hint" id="micHint">ДЕРЖИ И ГОВОРИ</div>
    <div class="irow">
      <input class="inp" id="inp" placeholder="Или напечатай вопрос..." autocomplete="off"/>
      <button class="sbtn" id="sb">➤</button>
    </div>
  </div>
</div>

<script>
var KEY_SK = 'sk';
var apiKey = localStorage.getItem(KEY_SK) || '';

function showApp() {
  var ks = document.getElementById('keyScreen');
  ks.style.display = 'none';
  ks.style.pointerEvents = 'none';
  ks.style.zIndex = '-1';
  document.getElementById('app').style.display = 'flex';
}

// Auto-login if key exists
// Auto-login only if key exists
if (apiKey) showApp();

document.getElementById('keyBtn').onclick = function() {
  if (window.speechSynthesis) {
    var u = new SpeechSynthesisUtterance(' '); u.volume=0; u.rate=2;
    window.speechSynthesis.speak(u);
  }
  var k = document.getElementById('keyInp').value.trim();
  if (k) { apiKey = k; localStorage.setItem(KEY_SK, k); }
  if (apiKey) { showApp(); } else { document.getElementById('err').textContent = 'Введи API ключ!'; }
};

document.getElementById('keyInp').onkeydown = function(e) {
  if (e.key === 'Enter') document.getElementById('keyBtn').onclick();
};

// ── App logic ──
var glow = document.getElementById('glow');
var head = document.getElementById('head');
var dot = document.getElementById('dot');
var stxt = document.getElementById('stxt');
var chat = document.getElementById('chat');
var errEl = document.getElementById('err');
var inp = document.getElementById('inp');
var sb = document.getElementById('sb');
var micBtn = document.getElementById('micBtn');
var micHint = document.getElementById('micHint');
var MC = document.getElementById('MC');
var MO = document.getElementById('MO');
var MS = document.getElementById('MS');
var MT = document.getElementById('MT');
var TG = document.getElementById('TG');
var TOP = document.getElementById('TOP');
var BOT = document.getElementById('BOT');

var state = 'idle';
var hist = [];
var raf = null;
var mC = 0, lastFlip = 0, isOpen = false, posIdx = 0, shapeIdx = 0;
var recog = null, listenStart = 0;
var currentShape = 'normal';
var shapes = ['normal','normal','wide','normal','tube','normal','wide','tube','normal'];
var openPos = [0.3,0.5,0.7,0.9,0.4,0.75,0.55];

function drawMouth(a, shape) {
  if (a < 0.04) { MC.style.display=''; MO.style.display='none'; return; }
  MC.style.display='none'; MO.style.display='';
  var cx=150, cy=235, w, h;
  if (shape==='tube') { w=18+a*10; h=a*40; }
  else if (shape==='wide') { w=52+a*16; h=a*14; }
  else { w=42+a*16; h=a*26; }
  var L=cx-w/2, R=cx+w/2, bY=cy+h, th=shape==='tube'?3+a*5:5+a*8;
  MS.setAttribute('d','M'+L+' '+cy+' Q'+cx+' '+(cy-6)+' '+R+' '+cy+' Q'+(R-4)+' '+bY+' '+cx+' '+(bY+2)+' Q'+(L+4)+' '+bY+' '+L+' '+cy+'Z');
  if (a>0.5) { MT.setAttribute('d','M'+(cx-14)+' '+cy+' Q'+(cx-8)+' '+(cy-2)+' '+(cx-2)+' '+(cy-1)+' L'+(cx+2)+' '+(cy-1)+' Q'+(cx+8)+' '+(cy-2)+' '+(cx+14)+' '+cy+' Q'+(cx+7)+' '+(cy+th)+' '+cx+' '+(cy+th+1)+' Q'+(cx-7)+' '+(cy+th)+' '+(cx-14)+' '+cy+'Z'); MT.style.display=''; }
  else { MT.style.display='none'; }
  if (a>0.35) { TG.setAttribute('cx',cx); TG.setAttribute('cy',cy+h*0.65); TG.setAttribute('rx',10+a*4); TG.setAttribute('ry',4+a*5); TG.style.display=''; }
  else { TG.style.display='none'; }
  TOP.setAttribute('d','M'+L+' '+cy+' Q'+cx+' '+(cy-8)+' '+R+' '+cy);
  BOT.setAttribute('d','M'+L+' '+cy+' Q'+(L+6)+' '+(bY+2)+' '+cx+' '+(bY+3)+' Q'+(R-6)+' '+(bY+2)+' '+R+' '+cy);
}

function mLoop(t) {
  raf = requestAnimationFrame(mLoop);
  var interval = 60 + Math.random()*40;
  if (t - lastFlip > interval) {
    isOpen = !isOpen; lastFlip = t;
    if (isOpen) { posIdx=(posIdx+1)%openPos.length; shapeIdx=(shapeIdx+1)%shapes.length; currentShape=shapes[shapeIdx]; mC=openPos[posIdx]; }
    else { mC = 0; }
    drawMouth(mC, currentShape);
  }
}
function startMouth() { if (!raf) raf = requestAnimationFrame(mLoop); }
function stopMouth() { if (raf) { cancelAnimationFrame(raf); raf=null; } mC=0; drawMouth(0,'normal'); }

function setState(s) {
  state = s;
  dot.className = 'dot'+(s==='thinking'?' y':s==='talking'?' g':s==='listening'?' b':'');
  stxt.textContent = {idle:'Готов',listening:'Слушаю...',thinking:'Думаю...',talking:'Говорит...'}[s];
  head.className = 'head'+(s==='talking'?' talk':s==='listening'?' listen':'');
  glow.className = 'glow'+(s==='talking'?' on':'');
  var busy = s==='thinking'||s==='talking';
  micBtn.className = 'mic-btn'+(s==='listening'?' listening':busy?' disabled':'');
  micBtn.textContent = s==='listening'?'⏹':'🎙️';
  micHint.textContent = s==='listening'?'ОТПУСТИ...':busy?'...':'ДЕРЖИ И ГОВОРИ';
  inp.disabled = busy;
  sb.disabled = busy;
}

function addMsg(role, text) {
  var w = document.createElement('div'); w.className = 'bbl'+(role==='u'?' u':'');
  var b = document.createElement('div'); b.className = 'bi'; b.textContent = text;
  w.appendChild(b); chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
  return b;
}

function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

async function askClaude(msg) {
  errEl.textContent = '';
  addMsg('u', msg);
  setState('thinking');
  hist.push({role:'user', content:msg});
  try {
    var prompt = 'Ты — персональный репетитор. Тебя зовут Липо Скич. Имя ученика узнавай и запоминай. Не давай готовые ответы — учи думать. Говори коротко, весело, как инопланетный помощник. Вставки: ха!, хм!, ага!, бум. Фразы: Охана думаем вместе!, Бум нашли зацепку!, Ты почти ещё чуть-чуть!';
    var messages = [{role:'system',content:prompt}].concat(hist);
    var r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({model:'gpt-4o-mini', max_tokens:300, messages:messages})
    });
    var data = await r.json();
    if (data.error) throw new Error(data.error.message);
    var text = data.choices[0].message.content;
    hist.push({role:'assistant', content:text});

    // STEP 1: Download audio (still showing "Думает...")
    var audioBlob = null;
    try {
      var xhr = new XMLHttpRequest();
      audioBlob = await new Promise(function(resolve) {
        xhr.open('POST','https://api.openai.com/v1/audio/speech');
        xhr.setRequestHeader('Content-Type','application/json');
        xhr.setRequestHeader('Authorization','Bearer '+apiKey);
        xhr.responseType = 'arraybuffer';
        xhr.onload = function(){ resolve(xhr.status===200 ? xhr.response : null); };
        xhr.onerror = function(){ resolve(null); };
        xhr.send(JSON.stringify({model:'tts-1',input:text,voice:'echo',speed:1.2}));
      });
    } catch(e2) { audioBlob = null; }

    // STEP 2+3: Audio ready — play and talk
    setState('talking');
    var el = addMsg('a', '');
    el.classList.add('cur');
    startMouth();

    if (audioBlob) {
      try {
        var blob = new Blob([audioBlob], {type:'audio/mpeg'});
        var url = URL.createObjectURL(blob);
        var audio = new Audio(url);
        audio.onended = function(){ URL.revokeObjectURL(url); };
        audio.play().catch(function(){});
      } catch(e3) {}
    }

    // Type text simultaneously
    for (var i=1; i<=text.length; i++) {
      el.textContent = text.slice(0,i);
      el.scrollIntoView({block:'end',behavior:'instant'});
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    setState('idle');
  } catch(e) {
    stopMouth();
    errEl.textContent = 'Ошибка: '+e.message;
    setState('idle');
  }
}



var SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function startListening() {
  if (state!=='idle') return;
  if (!SR) { errEl.textContent='Используй Safari'; return; }
  errEl.textContent=''; setState('listening'); listenStart=Date.now();
  recog = new SR(); recog.lang='ru-RU'; recog.interimResults=false; recog.continuous=true;
  recog.onresult = function(e) {
    var t = Array.from(e.results).map(function(r){return r[0].transcript;}).join('').trim();
    recog=null; if(t) askClaude(t); else setState('idle');
  };
  recog.onerror = function(e) { recog=null; setState('idle'); };
  recog.onend = function() { recog=null; if(state==='listening') setState('idle'); };
  recog.start();
}

function stopListening() {
  if (state!=='listening') return;
  var delay = Math.max(0, 600-(Date.now()-listenStart));
  setTimeout(function(){ if(recog) try{recog.stop();}catch(e){} }, delay);
}

micBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  startListening();
}, {passive:false});

micBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopListening(); }, {passive:false});
micBtn.addEventListener('touchcancel', stopListening);

// Fallback for click
micBtn.addEventListener('click', function() {
  if (state === 'listening') { stopListening(); }
  else { startListening(); }
});

sb.onclick = function() {
  var msg = inp.value.trim(); if(!msg||state!=='idle') return;
  inp.value=''; askClaude(msg);
};

inp.onkeydown = function(e) { if(e.key==='Enter') sb.onclick(); };
</script>

</body>
</html>
