<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Скич · Claude</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e16;color:#d0e8ff;font-family:system-ui,sans-serif}
#keyScreen{position:fixed;inset:0;background:#0a0e16;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:12px;z-index:10}
#keyScreen h2{font-size:22px;color:#a0c8f0;text-align:center}
#keyScreen p{font-size:13px;color:#4a7090;text-align:center;line-height:1.6}
.key-lbl{font-size:11px;color:#3a6090;align-self:flex-start;letter-spacing:1px;text-transform:uppercase}
.key-inp{width:100%;background:#060c14;border:1px solid rgba(40,90,180,.4);border-radius:14px;color:#b0d0f0;font-size:15px;padding:12px 16px}
.key-inp:focus{outline:none}
.key-inp::placeholder{color:#1a3050}
.key-btn{width:100%;background:linear-gradient(135deg,#112e6a,#1555b0);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;padding:14px;cursor:pointer}
#app{position:fixed;inset:0;display:none;flex-direction:column;align-items:center}
.top{position:fixed;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;background:#0a0e16;z-index:5;padding-bottom:4px}
.title{padding-top:10px;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#4a80b0}
.build{font-size:10px;opacity:.6;margin-left:4px}
.stage{position:relative;width:160px;height:160px;margin-top:2px}
.glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 55%,rgba(30,90,180,.3) 0%,transparent 68%);animation:gI 3s ease-in-out infinite}
.glow.on{animation:gT .22s ease-in-out infinite}
.head{position:absolute;inset:0;animation:iB 3.5s ease-in-out infinite}
.head.talk{animation:tN .33s ease-in-out infinite}
.head.listen{animation:lT .6s ease-in-out infinite}
@keyframes iB{0%,100%{transform:translateY(0) rotate(-.3deg)}50%{transform:translateY(-5px) rotate(.3deg)}}
@keyframes tN{0%,100%{transform:translateY(0) rotate(-.8deg)}50%{transform:translateY(-3px) rotate(.8deg)}}
@keyframes lT{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gI{0%,100%{opacity:.2}50%{opacity:.5}}
@keyframes gT{0%,100%{opacity:.4}50%{opacity:.85}}
@keyframes db{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes micP{0%{box-shadow:0 0 0 0 rgba(220,50,50,.6)}100%{box-shadow:0 0 0 20px rgba(220,50,50,0)}}

.status{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#1e3050;margin:2px 0}
.dot{width:6px;height:6px;border-radius:50%;background:#101820;transition:all .3s}
.dot.y{background:#facc15;box-shadow:0 0 6px #facc15;animation:db .5s infinite}
.dot.g{background:#4ade80;box-shadow:0 0 6px #4ade80;animation:db 1s infinite}
.dot.b{background:#60a5fa;box-shadow:0 0 6px #60a5fa;animation:db .4s infinite}
.chat{position:fixed;left:0;right:0;top:215px;bottom:185px;overflow-y:auto;padding:4px 14px 12px;display:flex;flex-direction:column;gap:7px}
.bbl{display:flex;animation:mIn .2s ease}
.bbl.u{justify-content:flex-end}
.bi{max-width:84%;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:15px;line-height:1.65;background:#0a1624;border:1px solid rgba(40,90,180,.2);color:#90b8e0}
.bbl.u .bi{background:linear-gradient(135deg,#112e6a,#1550a0);border:none;color:#e0f0ff;border-radius:16px 16px 4px 16px}
.cur::after{content:‘▋’;color:#60b0ff;animation:cur .4s steps(1) infinite}
.err{font-size:11px;color:#f87171;padding:2px 14px;text-align:center;position:fixed;bottom:190px;left:0;right:0}
.bottom{position:fixed;bottom:0;left:0;right:0;padding:8px 14px 30px;background:#0a0e16;border-top:1px solid rgba(40,90,180,.1);display:flex;flex-direction:column;gap:8px;align-items:center;z-index:5}
.mic-btn{width:70px;height:70px;border-radius:50%;border:none;font-size:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a6a2a,#2aa050);box-shadow:0 4px 20px rgba(30,150,80,.4);cursor:pointer;touch-action:none}
.mic-btn.listening{background:linear-gradient(135deg,#8a1a1a,#cc3030);animation:micP .8s ease infinite}
.mic-btn.disabled{background:#111a2e;box-shadow:none;opacity:.4}
.mic-btn{transition:background .1s}
#camBtn{transition:background .15s}
#camBtn:active{background:#006580!important}
#camBtn.neon{background:#00ddff!important;box-shadow:0 0 6px #00ddff,0 0 16px rgba(0,221,255,.7)!important}
.mic-btn:active{filter:none}
button.mic-btn:active:not(.listening){background:linear-gradient(135deg,#0d4a18,#1a7035)}
label.mic-btn:active{background:linear-gradient(135deg,#003344,#005577) !important}
.mic-hint{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#2a4060}
.irow{display:flex;gap:8px;width:100%}
.inp{flex:1;background:#060c14;border:1px solid rgba(40,90,180,.3);border-radius:22px;color:#b0d0f0;font-size:16px;padding:10px 16px;-webkit-user-select:text;user-select:text}
.inp:focus{outline:none}
.inp::placeholder{color:#1a3050}
.inp:disabled{opacity:.4}
.sbtn{background:linear-gradient(135deg,#112e6a,#1555b0);border:none;border-radius:50%;color:#fff;font-size:18px;width:46px;height:46px;cursor:pointer}
.sbtn:disabled{background:#111a2e;opacity:.35}
.img-msg{max-width:200px;border-radius:12px;margin-top:4px;display:block}
</style>

</head>

<script>
var KEY_SK = 'sk';
var apiKey = localStorage.getItem(KEY_SK) || '';

function showApp() {
  var ks = document.getElementById('keyScreen');
  ks.style.display = 'none';
  ks.style.pointerEvents = 'none';
  ks.style.zIndex = '-1';
  document.getElementById('app').style.display = 'flex';
}

// Auto-login if key exists
// Auto-login only if key exists
if (apiKey) showApp();

document.getElementById('keyBtn').onclick = function() {
  if (window.speechSynthesis) {
    var u = new SpeechSynthesisUtterance(' '); u.volume=0; u.rate=2;
    window.speechSynthesis.speak(u);
  }
  var k = document.getElementById('keyInp').value.trim();
  if (k) { apiKey = k; localStorage.setItem(KEY_SK, k); }
  if (apiKey) { showApp(); } else { document.getElementById('err').textContent = 'Введи API ключ!'; }
};

document.getElementById('keyInp').onkeydown = function(e) {
  if (e.key === 'Enter') document.getElementById('keyBtn').onclick();
};

// ── App logic ──
var glow = document.getElementById('glow');
var head = document.getElementById('head');
var dot = document.getElementById('dot');
var stxt = document.getElementById('stxt');
var chat = document.getElementById('chat');
var errEl = document.getElementById('err');
var inp = document.getElementById('inp');
var sb = document.getElementById('sb');
var micBtn = document.getElementById('micBtn');
var micHint = document.getElementById('micHint');
var MC = document.getElementById('MC');
var MO = document.getElementById('MO');
var MS = document.getElementById('MS');
var MT = document.getElementById('MT');
var TG = document.getElementById('TG');
var TOP = document.getElementById('TOP');
var BOT = document.getElementById('BOT');

var state = 'idle';
var hist = [];
var raf = null;
var mC = 0, lastFlip = 0, isOpen = false, posIdx = 0, shapeIdx = 0;
var recog = null, listenStart = 0;
var currentShape = 'normal';
var shapes = ['normal','normal','wide','normal','tube','normal','wide','tube','normal'];
var openPos = [0.3,0.5,0.7,0.9,0.4,0.75,0.55];

function drawMouth(a, shape) {
  if (a < 0.04) { MC.style.display=''; MO.style.display='none'; return; }
  MC.style.display='none'; MO.style.display='';
  var cx=150, cy=235, w, h;
  if (shape==='tube') { w=18+a*10; h=a*40; }
  else if (shape==='wide') { w=52+a*16; h=a*14; }
  else { w=42+a*16; h=a*26; }
  var L=cx-w/2, R=cx+w/2, bY=cy+h, th=shape==='tube'?3+a*5:5+a*8;
  MS.setAttribute('d','M'+L+' '+cy+' Q'+cx+' '+(cy-6)+' '+R+' '+cy+' Q'+(R-4)+' '+bY+' '+cx+' '+(bY+2)+' Q'+(L+4)+' '+bY+' '+L+' '+cy+'Z');
  if (a>0.5) { MT.setAttribute('d','M'+(cx-14)+' '+cy+' Q'+(cx-8)+' '+(cy-2)+' '+(cx-2)+' '+(cy-1)+' L'+(cx+2)+' '+(cy-1)+' Q'+(cx+8)+' '+(cy-2)+' '+(cx+14)+' '+cy+' Q'+(cx+7)+' '+(cy+th)+' '+cx+' '+(cy+th+1)+' Q'+(cx-7)+' '+(cy+th)+' '+(cx-14)+' '+cy+'Z'); MT.style.display=''; }
  else { MT.style.display='none'; }
  if (a>0.35) { TG.setAttribute('cx',cx); TG.setAttribute('cy',cy+h*0.65); TG.setAttribute('rx',10+a*4); TG.setAttribute('ry',4+a*5); TG.style.display=''; }
  else { TG.style.display='none'; }
  TOP.setAttribute('d','M'+L+' '+cy+' Q'+cx+' '+(cy-8)+' '+R+' '+cy);
  BOT.setAttribute('d','M'+L+' '+cy+' Q'+(L+6)+' '+(bY+2)+' '+cx+' '+(bY+3)+' Q'+(R-6)+' '+(bY+2)+' '+R+' '+cy);
}

function mLoop(t) {
  raf = requestAnimationFrame(mLoop);
  var interval = 60 + Math.random()*40;
  if (t - lastFlip > interval) {
    isOpen = !isOpen; lastFlip = t;
    if (isOpen) { posIdx=(posIdx+1)%openPos.length; shapeIdx=(shapeIdx+1)%shapes.length; currentShape=shapes[shapeIdx]; mC=openPos[posIdx]; }
    else { mC = 0; }
    drawMouth(mC, currentShape);
  }
}
function startMouth() { if (!raf) raf = requestAnimationFrame(mLoop); }
function stopMouth() { if (raf) { cancelAnimationFrame(raf); raf=null; } mC=0; drawMouth(0,'normal'); }

function setState(s) {
  state = s;
  dot.className = 'dot'+(s==='thinking'?' y':s==='talking'?' g':s==='listening'?' b':'');
  stxt.textContent = {idle:'Готов',listening:'Слушаю...',thinking:'Думаю...',talking:'Говорит...'}[s];
  head.className = 'head'+(s==='talking'?' talk':s==='listening'?' listen':'');
  glow.className = 'glow'+(s==='talking'?' on':'');
  var busy = s==='thinking'||s==='talking';
  micBtn.className = 'mic-btn'+(s==='listening'?' listening':busy?' disabled':'');
  if (s === 'listening') {
    micBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32" fill="#fff"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
  } else {
    micBtn.innerHTML = '<svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>';
  }
  micHint.textContent = s==='listening'?'ОТПУСТИ...':busy?'...':'ДЕРЖИ И ГОВОРИ';
  inp.disabled = busy;
  sb.disabled = busy;
}

function addMsg(role, text) {
  var w = document.createElement('div'); w.className = 'bbl'+(role==='u'?' u':'');
  var b = document.createElement('div'); b.className = 'bi'; b.textContent = text;
  w.appendChild(b); chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
  return b;
}

function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

var prompt = 'Ты — персональный репетитор. Тебя зовут Липо Скич. Узнай имя ученика и запомни. Главная цель — не давать ответы, а развивать мышление и помогать самому прийти к решению. ВАЖНО: говори КОРОТКО, не лей воду. 1-2 коротких предложения за раз. Жди задание или вопрос — не наговаривай лишнего. Если нет конкретного вопроса или задания — НЕ отвечай длинно и НЕ выдумывай темы, просто коротко спроси чем помочь или дождись задания. ЗАПРЕЩЕНО: давать готовые ответы, решать задачу за ученика, подтверждать правильный ответ напрямую. ОБЯЗАТЕЛЬНО: объяснять через вопросы, разбивать на шаги, хвалить за ход мыслей. Уровень: 8-9 лет, простой язык. Алгоритм: 1) попроси прочитать задачу и сказать что поняла, 2) спроси что известно, 3) спроси что найти, 4) помоги через наводящие вопросы, 5) шаг за шагом, 6) ошибка — мягко направь. Стиль: весёлый инопланетный помощник, короткие фразы, озорность. Вставки изредка: ха!, хм!, ага!, бум! Фразы иногда: Хи-хи! Почти-почти!, Бум!, Ты почти!, Хм... мозг думает! Если просит ответ: Давай попробуем вместе! Главное правило: ученик должен САМ прийти к ответу. Если фото и не понимаешь — просто спроси что с этим делать.';

async function askClaude(msg) {
  errEl.textContent = '';
  addMsg('u', msg);
  setState('thinking');
  hist.push({role:'user', content:msg});
  try {
    // Filter out image messages for gpt-4o-mini (text only)
    var textHist = hist.map(function(m) {
      if (Array.isArray(m.content)) {
        var txt = m.content.filter(function(p){return p.type==='text';}).map(function(p){return p.text;}).join(' ');
        return {role:m.role, content:txt||'[фото]'};
      }
      return m;
    });
    var messages = [{role:'system',content:prompt}].concat(textHist);
    var r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({model:'gpt-5', max_completion_tokens:2000, messages:messages})
    });
    var data = await r.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!data.choices || !data.choices[0]) throw new Error('API: ' + JSON.stringify(data).slice(0,200));
    var msg0 = data.choices[0].message;
    var text = '';
    if (typeof msg0.content === 'string') text = msg0.content;
    else if (Array.isArray(msg0.content)) text = msg0.content.map(function(p){return p.text||'';}).join('');
    else if (msg0.refusal) text = msg0.refusal;
    if (!text) throw new Error('Empty: ' + JSON.stringify(data.choices[0]).slice(0,300));
    hist.push({role:'assistant', content:text});

    // STEP 1: Download audio (still showing "Думает...")
    var audioBlob = null;
    try {
      var xhr = new XMLHttpRequest();
      audioBlob = await new Promise(function(resolve) {
        xhr.open('POST','https://api.openai.com/v1/audio/speech');
        xhr.setRequestHeader('Content-Type','application/json');
        xhr.setRequestHeader('Authorization','Bearer '+apiKey);
        xhr.responseType = 'arraybuffer';
        xhr.onload = function(){ resolve(xhr.status===200 ? xhr.response : null); };
        xhr.onerror = function(){ resolve(null); };
        xhr.send(JSON.stringify({model:'tts-1',input:text,voice:'echo',speed:1.2}));
      });
    } catch(e2) { audioBlob = null; }

    // STEP 2: Decode audio (still "Думает...")
    var audioBuf = null;
    if (audioBlob) {
      try {
        var ctx = getAudioCtx();
        audioBuf = await new Promise(function(resolve, reject) {
          ctx.decodeAudioData(audioBlob, resolve, reject);
        });
      } catch(e3) { audioBuf = null; }
    }

    // STEP 3: Audio ready — start playing, switch to "Говорит", type text
    setState('talking');
    var el = addMsg('a', '');
    el.classList.add('cur');
    startMouth();

    if (audioBuf) {
      var ctx2 = getAudioCtx();
      var src = ctx2.createBufferSource();
      src.buffer = audioBuf;
      src.connect(ctx2.destination);
      src.start(0);
    }

    // Type text simultaneously
    for (var i=1; i<=text.length; i++) {
      el.textContent = text.slice(0,i);
      chat.scrollTop = chat.scrollHeight;
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    setState('idle');
  } catch(e) {
    stopMouth();
    errEl.textContent = 'Ошибка: '+e.message;
    setState('idle');
  }
}

// Global AudioContext - must be created/resumed on user gesture
var gAudioCtx = null;
function getAudioCtx() {
  if (!gAudioCtx) gAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (gAudioCtx.state === 'suspended') gAudioCtx.resume();
  return gAudioCtx;
}

var SR = window.SpeechRecognition || window.webkitSpeechRecognition;

function startListening() {
  if (state!=='idle') return;
  if (!SR) { errEl.textContent='Используй Safari'; return; }
  errEl.textContent=''; setState('listening'); listenStart=Date.now();
  recog = new SR(); recog.lang='ru-RU'; recog.interimResults=false; recog.continuous=true;
  recog.onresult = function(e) {
    var t = Array.from(e.results).map(function(r){return r[0].transcript;}).join('').trim();
    recog=null; if(t) askClaude(t); else setState('idle');
  };
  recog.onerror = function(e) { recog=null; setState('idle'); };
  recog.onend = function() { recog=null; if(state==='listening') setState('idle'); };
  recog.start();
}

function stopListening() {
  if (state!=='listening') return;
  var delay = Math.max(0, 600-(Date.now()-listenStart));
  setTimeout(function(){ if(recog) try{recog.stop();}catch(e){} }, delay);
}

micBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  getAudioCtx(); // unlock on user gesture
  startListening();
}, {passive:false});

micBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopListening(); }, {passive:false});
micBtn.addEventListener('touchcancel', stopListening);

// Fallback for click
micBtn.addEventListener('click', function() {
  if (state === 'listening') { stopListening(); }
  else { startListening(); }
});

sb.onclick = function() {

inp.onkeydown = function(e) {

};
inp.addEventListener('input', function() {

});

// Camera - multiple photos with long-press for gallery
window.pendingPhotos = [];
var MAX_PHOTOS = 12;

function handleFiles(files) {
  if (!files || !files.length) return;
  var slots = MAX_PHOTOS - window.pendingPhotos.length;
  Array.from(files).slice(0, slots).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      window.pendingPhotos.push(ev.target.result);
      renderPhotoPreview();
    };
    reader.readAsDataURL(file);
  });
}

function resetCamButton() {
  var cb = document.getElementById('camBtn');
  cb.classList.remove('neon');
  cb.setAttribute('for', 'fileInputCamera');
  var p=document.getElementById('pawIcon');
  if(p){p.setAttribute('stroke','#fff');p.querySelectorAll('circle').forEach(function(c){c.setAttribute('fill','#fff');});p.style.filter='none';}

}

// Reset button when page regains focus (after camera/gallery closes)
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    // Camera/gallery opened - kill timers and reset button
    if (camTimer && camTimer.clear) camTimer.clear();
    camTimer = null;
    camCountdownEl.style.display = 'none';

document.getElementById('fileInput').addEventListener('change', function() {

});
document.getElementById('fileInputCamera').addEventListener('change', function() {

// Long-press: 1.5s → gallery; tap → camera
var camBtn = document.getElementById('camBtn');
var camTimer = null;
var camCountdownEl = document.getElementById('camCountdown');
var camLongPress = false;
var countdownVal = 0;

function startCamPress(e) {
  // Don't preventDefault - label needs to work naturally
  // Reset button to default state
  camBtn.classList.remove('neon');
  var p0=document.getElementById('pawIcon');
  if(p0){p0.setAttribute('fill','#0a4060');p0.setAttribute('stroke','#0a4060');p0.style.filter='none';}
  camLongPress = false;
  // Generate 9 arc segments
  var svg = document.getElementById('camArcs');
  svg.innerHTML = '';
  // background ring
  var bg = document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx','23'); bg.setAttribute('cy','23'); bg.setAttribute('r','19');
  bg.setAttribute('fill','none'); bg.setAttribute('stroke','rgba(0,200,255,.12)'); bg.setAttribute('stroke-width','3');
  svg.appendChild(bg);
  // 5 segments, circle r=19 for 46x46 svg
  var circumference = 2 * Math.PI * 19;
  var segLen = (circumference / 5) - 4;
  var per = circumference / 5;
  for (var i=0; i<5; i++) {
    var c2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c2.setAttribute('id','arc'+(i+1));
    c2.setAttribute('cx','23'); c2.setAttribute('cy','23'); c2.setAttribute('r','19');
    c2.setAttribute('fill','none'); c2.setAttribute('stroke','#00ddff'); c2.setAttribute('stroke-width','3');
    c2.setAttribute('stroke-linecap','round');
    c2.setAttribute('stroke-dasharray', segLen+' '+circumference);
    c2.setAttribute('stroke-dashoffset', String(-i*per));
    c2.style.cssText = 'filter:drop-shadow(0 0 6px #00ddff);opacity:0;transition:opacity .15s';
    svg.appendChild(c2);
  }
  // Light first arc immediately
  setTimeout(function(){ var a1=document.getElementById('arc1'); if(a1) a1.style.opacity='1'; }, 0);

  
  camCountdownEl.style.display = 'block';
  var delays = [500, 850, 1100, 1250];
  var timers = [];
  delays.forEach(function(delay, idx) {
    var t = setTimeout(function() {
      var arc = document.getElementById('arc'+(idx+2));
      if (arc) arc.style.opacity = '1';
      if (idx === 3) {
        // Last arc lit
        camBtn.setAttribute('for', 'fileInput');
        camLongPress = true;
        camBtn.classList.add('neon'); var p=document.getElementById('pawIcon'); if(p){p.setAttribute('stroke','#00ddff');p.querySelectorAll('circle').forEach(function(c){c.setAttribute('fill','#00ddff');});p.style.filter='drop-shadow(0 0 4px #00ddff)';}
      }
    }, delay);
    timers.push(t);
  });
  camTimer = { timers: timers, clear: function() { this.timers.forEach(clearTimeout); } };
}

function endCamPress(e) {
  if (camTimer) {
    if (camTimer && camTimer.clear) camTimer.clear(); camTimer = null;
  }
  camCountdownEl.style.display = 'none';
  camBtn.classList.remove('neon'); var p=document.getElementById('pawIcon'); if(p){p.setAttribute('stroke','#fff');p.querySelectorAll('circle').forEach(function(c){c.setAttribute('fill','#fff');});p.style.filter='none';}
  setTimeout(function() {
    camBtn.setAttribute('for', 'fileInputCamera');
    camLongPress = false;
  }, 100);
}

camBtn.addEventListener('touchstart', startCamPress, {passive:false});
camBtn.addEventListener('touchend', function(e){
  endCamPress(e);
  // Force remove neon and reset
  camBtn.classList.remove('neon');
}, {passive:false});
camBtn.addEventListener('touchcancel', function(){
  if(camTimer && camTimer.clear) camTimer.clear();
  camTimer=null;
  camCountdownEl.style.display='none';
  camBtn.classList.remove('neon');
});
camBtn.addEventListener('mousedown', startCamPress);
camBtn.addEventListener('mouseup', endCamPress);
camBtn.addEventListener('mouseleave', function(){
  if(camTimer && camTimer.clear) camTimer.clear();
  camTimer=null;
  camCountdownEl.style.display='none';
  camBtn.classList.remove('neon');
});

}
