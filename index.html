<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Стич · Claude</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg-tone, #000);color:#2d2240;font-family:system-ui,sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%;text-size-adjust:100%;transition:background .45s ease}
#app{display:contents}
.top{position:fixed;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;background:transparent;z-index:5;padding-top:var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px));padding-bottom:4px;pointer-events:auto}
.below{position:fixed;left:0;right:0;top:calc(215px + var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px)));bottom:0;display:flex;flex-direction:column;z-index:4}
.title{padding-top:10px;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#ffffff}
.build{font-size:10px;opacity:.6;margin-left:4px}
.stage{position:relative;width:160px;height:160px;margin-top:2px}
.glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 55%,rgba(30,90,180,.3) 0%,transparent 68%);animation:gI 3s ease-in-out infinite}
.glow.on{animation:gT .22s ease-in-out infinite}
.head{position:absolute;inset:0;animation:iB 3.5s ease-in-out infinite;overflow:visible}
.head.talk{animation:tN .33s ease-in-out infinite}
.head.listen{animation:lT .6s ease-in-out infinite}
/* Механическая челюсть куклы — нижняя часть на петлях. transform-box:fill-box
   нужен чтобы transform-origin работал в SVG-системе координат. */
.head .jaw{transform-box:fill-box;transform-origin:50% 0%;animation:dollTalk 1.6s ease-in-out infinite}
@keyframes dollTalk{
  0%,100%{transform:translateY(0) scaleY(1)}
  18%{transform:translateY(1.5px) scaleY(1.7)}
  36%{transform:translateY(0) scaleY(1)}
  58%{transform:translateY(2px) scaleY(2.3)}
  78%{transform:translateY(.5px) scaleY(1.2)}
}
.head.talk .jaw{animation:dollTalkBurst .55s ease-out infinite}
@keyframes dollTalkBurst{
  0%,100%{transform:translateY(0) scaleY(1)}
  35%{transform:translateY(2.5px) scaleY(2.8)}
  70%{transform:translateY(1.5px) scaleY(1.6)}
}
/* Кукла — единый SVG fixed позади чата. Висит на верёвочке от потолка,
   тихо качается dangleDoll. Голова + шея + торс + шарниры плеч/бёдер. */
#doll{position:fixed;top:calc(var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px)) - 14px);left:50%;width:220px;height:540px;pointer-events:none;z-index:0;display:block;transform:translateX(-50%);transform-origin:50% 0}
/* Сами руки/ноги (path) ПОЗАДИ сообщений (z:1, ниже .below z:4). */
#dollLimbs{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
#dollLimbs .arm{stroke:#2a2620;stroke-width:15;stroke-linecap:round;stroke-linejoin:round;fill:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
#dollLimbs .leg{stroke:#1a1610;stroke-width:22;stroke-linecap:round;stroke-linejoin:round;fill:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
/* Кисти/стопы — ПЕРЕД сообщениями (z:5, выше .below). */
#dollHands{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:5}
#dollHands .hand,#dollHands .foot{filter:drop-shadow(0 2px 4px rgba(0,0,0,.55))}
@keyframes iB{0%,100%{transform:translateY(0) rotate(-.3deg)}50%{transform:translateY(-5px) rotate(.3deg)}}
@keyframes tN{0%,100%{transform:translateY(0) rotate(-.8deg)}50%{transform:translateY(-3px) rotate(.8deg)}}
@keyframes lT{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gI{0%,100%{opacity:.2}50%{opacity:.5}}
@keyframes gT{0%,100%{opacity:.4}50%{opacity:.85}}
@keyframes db{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes micP{0%{box-shadow:0 0 0 0 rgba(220,50,50,.6)}100%{box-shadow:0 0 0 20px rgba(220,50,50,0)}}
@keyframes saluteFall{0%{transform:translate(-50%,-50%);opacity:1;animation-timing-function:cubic-bezier(.05,.55,.4,1)}30%{transform:translate(calc(-50% + var(--peak-x,0)),calc(-50% + var(--peak-y,-260px)));opacity:1;animation-timing-function:cubic-bezier(.6,.04,.85,.55)}100%{transform:translate(calc(-50% + var(--end-x,0)),110vh);opacity:.85}}
@keyframes saluteSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.hold-ring{position:fixed;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.28);box-shadow:0 10px 30px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.32);pointer-events:none;z-index:50;transform:translate(-50%,-50%);opacity:0;transition:opacity .15s linear;will-change:opacity}
.hold-ring.visible{opacity:.85;animation:ringPop .22s cubic-bezier(.16,.7,.3,1)}
.hold-ring.busy{background:rgba(255,144,67,.18);border-color:rgba(255,160,90,.45)}
#voicePanel{position:fixed;top:44%;left:50%;display:flex;flex-direction:column;align-items:center;gap:12px;z-index:201;pointer-events:none;transform:translate(-50%,-50%) scale(.7);opacity:0;transition:transform .2s cubic-bezier(.16,.7,.3,1.1),opacity .2s ease}
#voicePanel.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#voicePanel .vp-count,#voicePanel .vp-name{background:rgba(255,255,255,.14);backdrop-filter:blur(10px) saturate(160%);-webkit-backdrop-filter:blur(10px) saturate(160%);border:1px solid rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.18)}
#voicePanel .vp-count{width:104px;height:104px;border-radius:50%;font-size:46px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
#voicePanel .vp-name{border-radius:50px;padding:10px 22px;font-size:15px;font-weight:600;line-height:1;letter-spacing:.5px;text-transform:lowercase}
#voiceCountdown.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.ring-cam{position:absolute;top:0;left:50%;width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.32);box-shadow:0 6px 18px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.32);transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;pointer-events:none;transition:background .15s,border-color .15s,box-shadow .15s,transform .15s}
.ring-cam.armed{background:rgba(0,221,255,.4);border-color:rgba(0,221,255,.95);box-shadow:0 6px 28px rgba(0,221,255,.7),inset 0 1px 0 rgba(255,255,255,.32);transform:translate(-50%,-50%) scale(1.18)}
.ring-cam.gallery{box-shadow:0 0 8px rgba(0,221,255,.7),0 0 22px rgba(0,221,255,.55),inset 0 1px 0 rgba(255,255,255,.32)}
.ring-cd{position:absolute;top:-81px;left:50%;transform:translateX(-50%);width:46px;height:46px;display:none;pointer-events:none;filter:brightness(1) !important;isolation:isolate}
.ring-cd.show{display:block}
.ring-cd .arcs{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-cd .icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.ring-cd .icon svg{position:absolute;filter:drop-shadow(0 0 4px #00ddff);transition:opacity .25s}
.ring-cd .cd-paw{opacity:0}
.ring-cd.long .cd-cam{opacity:0}
.ring-cd.long .cd-paw{opacity:1}
.hold-ring.busy .ring-cam,.hold-ring.busy .ring-cd{display:none}
@keyframes ringPop{from{transform:translate(-50%,-50%) scale(.55);opacity:0}}

.status{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 0 6px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#9aa0b0;opacity:.85}
#stxt{display:none}
.dot{width:32px;height:4px;border-radius:2px;background:#3a3c42;transition:background .25s,box-shadow .25s}
.dot.ok{background:#5be09b;box-shadow:0 0 8px rgba(91,224,155,.7)}
.dot.y{background:#ffd84d;box-shadow:0 0 8px rgba(255,216,77,.7);animation:db .5s infinite}
.dot.g{background:#5be09b;box-shadow:0 0 8px rgba(91,224,155,.7);animation:db 1s infinite}
.dot.b{background:#7c5cff;box-shadow:0 0 8px rgba(124,92,255,.7);animation:db .4s infinite}
.dot.r{background:#ff4757;box-shadow:0 0 8px rgba(255,71,87,.85);animation:db .5s infinite}
.chat{flex:1;min-height:0;overflow-y:auto;padding:4px 14px 12px;display:flex;flex-direction:column;gap:7px;touch-action:pan-y;-webkit-touch-callout:none}
.bbl{display:flex;animation:mIn .2s ease}
.bbl.u{justify-content:flex-end}
.bi{max-width:84%;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:15px;line-height:1.5;background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.04) 55%,rgba(0,0,0,.06) 100%),var(--asst-tint, rgba(28,28,30,.35));backdrop-filter:var(--asst-blur, blur(14px) saturate(160%));-webkit-backdrop-filter:var(--asst-blur, blur(14px) saturate(160%));border:1px solid rgba(255,255,255,.12);color:#e6e8eb;box-shadow:0 4px 14px rgba(0,0,0,.32),inset .5px .5px 0 rgba(255,255,255,.32);transition:background .35s ease}
.bbl.u .bi{background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.04) 55%,rgba(0,0,0,.06) 100%),var(--msg-tint, rgba(44,44,46,.35));backdrop-filter:var(--msg-blur, blur(14px) saturate(160%));-webkit-backdrop-filter:var(--msg-blur, blur(14px) saturate(160%));border:1px solid rgba(255,255,255,.12);color:#ffffff;border-radius:16px 16px 4px 16px;box-shadow:0 4px 14px rgba(0,0,0,.32),inset .5px .5px 0 rgba(255,255,255,.32);transition:background .35s ease}
.cur::after{content:‘▋’;color:#7c5cff;animation:cur .4s steps(1) infinite}
.err{flex-shrink:0;font-size:11px;color:#e84a5f;padding:0 14px;text-align:center}
.err:not(:empty){padding:2px 14px}
.bottom{flex-shrink:0;position:relative;padding:6px 12px calc(18px + env(safe-area-inset-bottom,0px));background:transparent;display:flex;flex-direction:column;gap:6px;align-items:center}
.mic-btn{width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,255,255,.22);font-size:24px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);box-shadow:0 6px 18px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.28);cursor:pointer;touch-action:none}
.mic-btn.disabled{opacity:.5}
.mic-btn:active{background:rgba(255,255,255,.05)}
#camBtn.neon{box-shadow:0 0 8px rgba(0,221,255,.7),0 0 20px rgba(0,221,255,.5),inset 0 1px 0 rgba(255,255,255,.28)!important}
.mic-hint{display:none}
.irow{display:flex;gap:6px;width:100%}
.inp{flex:1;background:transparent;border:none;color:#e6e8eb;font-size:15px;padding:7px 12px;-webkit-user-select:text;user-select:text}
.inp:focus{outline:none}
.inp::placeholder{color:#7d808a}
.inp:disabled{opacity:.5}
.sbtn{background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.22);border-radius:50%;color:#fff;font-size:15px;width:36px;height:36px;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.28)}
.sbtn:active{background:rgba(255,255,255,.05)}
.sbtn:disabled{background:#d8cce8;opacity:.5;box-shadow:none}
.img-msg{max-width:200px;border-radius:12px;margin-top:4px;display:block}
#tonePicker::-webkit-scrollbar,#btnTonePicker::-webkit-scrollbar,#msgTonePicker::-webkit-scrollbar,#asstTonePicker::-webkit-scrollbar{display:none}
#tonePicker > button,#btnTonePicker > button,#msgTonePicker > button,#asstTonePicker > button{flex-shrink:0}
</style>

</head>
<body>

<div id="app">
  <div class="top">
    <button id="settingsBtn" style="display:none;position:absolute;top:calc(56px + var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px)));right:12px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.22);box-shadow:0 6px 16px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.28);cursor:pointer;align-items:center;justify-content:center;padding:0;z-index:6;-webkit-tap-highlight-color:transparent">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
        <line x1="5" y1="7" x2="19" y2="7"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
        <line x1="5" y1="17" x2="19" y2="17"/>
      </svg>
    </button>
<div class="title">Стич · Claude <span class="build">v537</span></div>
    <div class="stage">
      <div class="glow" id="glow"></div>
      <!-- .head пустой — кукла целиком живёт в #doll (fixed). Контейнер
           оставлен для совместимости (setState ставит/снимает классы). -->
      <div class="head" id="head"></div>
    </div>
  </div>
  <div class="below">
  <div class="chat" id="chat"><div class="bbl"><div class="bi">Привет! Я Стич! Держи микрофон и говори!</div></div></div>
  <div class="err" id="err"></div>
  <div class="bottom">
    <div class="mic-hint" id="micHint">ДЕРЖИ И ГОВОРИ</div>
    <div class="status"><div class="dot" id="dot"></div><span id="stxt">Готов</span></div>
    <div id="composer" style="width:100%;background:transparent;border:none;border-radius:0;padding:0;display:flex;flex-direction:column;gap:8px;box-shadow:none">
      <div id="photoPreview" style="display:none;width:100%;align-items:flex-start;gap:12px">
        <div id="photoThumbs" style="display:flex;flex-wrap:wrap;gap:6px;flex:1;min-width:0"></div>
        <button onclick="cancelAllPhotos()" style="background:#fff;border:1px solid #c0c0c0;color:#222;width:24px;height:24px;border-radius:50%;font-size:14px;line-height:1;cursor:pointer;padding:0;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2)">✕</button>
      </div>
      <div style="display:flex;align-items:center;width:100%;gap:8px">
        <button class="mic-btn" id="micBtn" style="flex:1;min-width:0;height:54px;border-radius:27px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.02) 55%,rgba(0,0,0,.08) 100%),var(--btn-tint, transparent);backdrop-filter:none;-webkit-backdrop-filter:none;border:1px solid rgba(255,255,255,.06);box-shadow:0 4px 12px rgba(0,0,0,.28),inset .5px .5px 0 rgba(255,255,255,.32),inset -.5px -.5px 0 rgba(0,0,0,.1)">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8.5" y="2.5" width="7" height="13" rx="3.5"/>
            <path d="M19 11a7 7 0 0 1-14 0"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
          </svg>
        </button>
        <div style="position:relative;width:54px;height:54px;flex-shrink:0">
          <label id="camBtn" for="fileInputCamera" style="position:absolute;inset:0;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.02) 55%,rgba(0,0,0,.08) 100%),var(--btn-tint, transparent);backdrop-filter:none;-webkit-backdrop-filter:none;border:1px solid rgba(255,255,255,.06);box-shadow:0 4px 12px rgba(0,0,0,.28),inset .5px .5px 0 rgba(255,255,255,.32),inset -.5px -.5px 0 rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;z-index:2">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="4" width="16" height="16" rx="3.5"/>
              <circle cx="12" cy="12" r="4"/>
            </svg>
          </label>
          <label id="galLabel" for="fileInput" style="position:absolute;inset:0;width:54px;height:54px;border-radius:50%;background:transparent;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;z-index:5;pointer-events:none"></label>
          <div id="camCountdown" style="display:none;position:absolute;top:-58px;left:50%;transform:translateX(-50%);width:46px;height:46px;pointer-events:none;filter:brightness(1) !important;isolation:isolate;z-index:4">
            <svg id="camArcs" viewBox="0 0 46 46" width="46" height="46" style="position:absolute;inset:0;transform:rotate(-90deg)"></svg>
            <div id="camIcon" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
              <svg id="centerCam" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#00ddff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;filter:drop-shadow(0 0 4px #00ddff);transition:opacity .25s">
                <rect x="4" y="4" width="16" height="16" rx="3.5"/>
                <circle cx="12" cy="12" r="4"/>
              </svg>
              <svg id="centerPaw" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#00ddff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;filter:drop-shadow(0 0 4px #00ddff);opacity:0;transition:opacity .25s">
                <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
      <div class="irow" style="gap:8px;align-items:center;width:100%;min-height:36px;background:transparent;border:none;border-radius:0;padding:0;box-shadow:none">
        <textarea class="inp" id="inp" placeholder="Напечатай вопрос..." rows="1" style="flex:1;background:transparent!important;border:none!important;padding:0 0 0 4px;margin:0;resize:none;font-family:inherit;line-height:1.4;max-height:120px;overflow-y:auto;-webkit-appearance:none;appearance:none;border-radius:0;outline:none;box-shadow:none"></textarea>
        <button class="sbtn" id="sb" style="display:none;flex-shrink:0;margin-right:9px;opacity:0;transform:scale(.6);transform-origin:center;transition:opacity .22s ease,transform .22s cubic-bezier(.16,.7,.3,1.2);background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.02) 55%,rgba(0,0,0,.08) 100%),var(--btn-tint, transparent);backdrop-filter:none;-webkit-backdrop-filter:none;border:1px solid rgba(255,255,255,.06);box-shadow:0 4px 12px rgba(0,0,0,.28),inset .5px .5px 0 rgba(255,255,255,.32),inset -.5px -.5px 0 rgba(0,0,0,.1)">➤</button>
      </div>
    </div>
  </div>
  </div>
</div>

<div id="settingsPanel" style="display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;padding:0 13px">
  <div id="settingsBackdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(12px) saturate(140%);-webkit-backdrop-filter:blur(12px) saturate(140%);-webkit-mask-image:radial-gradient(ellipse 220px 260px at 50% 50%, transparent 0%, transparent 60%, #000 100%);mask-image:radial-gradient(ellipse 220px 260px at 50% 50%, transparent 0%, transparent 60%, #000 100%);transition:opacity .25s ease,background .25s ease"></div>
  <div id="settingsCard" style="position:relative;background:rgba(60,64,72,.85);backdrop-filter:blur(24px) saturate(170%);-webkit-backdrop-filter:blur(24px) saturate(170%);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:18px;width:100%;max-width:380px;color:#fff;box-shadow:0 14px 44px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.18);transition:background .25s ease,border-color .25s ease,box-shadow .25s ease">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff;opacity:.85">Настройки</div>
      <button id="settingsClose" style="background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;opacity:.7;padding:0;-webkit-tap-highlight-color:transparent">✕</button>

<script>
// Telegram WebApp: expand to full height at boot so the keyboard doesn't
// trigger a late expand jump. Layout adaptation to the keyboard is handled
// purely by viewport (interactive-widget=resizes-content) + 100dvh — no
// JS-side --kb math.
var tg = null;
try {
  if (window.Telegram && window.Telegram.WebApp) {
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if (typeof tg.disableVerticalSwipes === 'function') {
      try { tg.disableVerticalSwipes(); } catch(_) {}
    }
    if (typeof tg.requestFullscreen === 'function') {
      try { tg.requestFullscreen(); } catch(_) {}
    }
  }
} catch(_) {}

// Single short haptic pulse — used on every button press and on chat-tap
// hold-ring. Prefers Telegram's native impact (matches system feel) and
// falls back to navigator.vibrate for non-Telegram browsers.
function haptic(){
  try {
    if (tg && tg.HapticFeedback && typeof tg.HapticFeedback.impactOccurred === 'function') {
      tg.HapticFeedback.impactOccurred('light');
      return;
    }
  } catch(_) {}
  try { if (navigator.vibrate) navigator.vibrate(10); } catch(_) {}
}



var KEY_SK = 'sk';
var KEY_HIST = 'stitch_hist';
var KEY_VOICE = 'stitch_voice';
var HIST_LIMIT = 60; // keep last ~30 turns
var VOICES = ['alloy','echo','fable','onyx','nova','shimmer','ash','ballad','coral','sage','verse'];
var apiKey = localStorage.getItem(KEY_SK) || '';
var currentVoice = localStorage.getItem(KEY_VOICE) || 'sage';
function cycleVoice() {
  var i = VOICES.indexOf(currentVoice);
  currentVoice = VOICES[(i + 1) % VOICES.length];
  localStorage.setItem(KEY_VOICE, currentVoice);
  // Pre-fetch the sample. Если он успел до конца countdown — audio
  // стартует ровно по концу отсчёта. Если нет — countdown держит panel
  // открытым пока url не готов, и тогда сразу же play + close.
  var urlPromise = fetchPreviewUrl(currentVoice);
  showVoicePanel(currentVoice, 3, function(close) {
    urlPromise.then(function(url) {
      if (url) playPreviewUrl(url);
      close();
    });
  });
}
function fetchPreviewUrl(voice) {
  if (!apiKey) return Promise.resolve(null);
  return new Promise(function(resolve) {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://api.openai.com/v1/audio/speech');
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + apiKey);
      xhr.responseType = 'arraybuffer';
      xhr.onload = function() {
        if (xhr.status !== 200) { resolve(null); return; }
        var blob = new Blob([xhr.response], {type: 'audio/mpeg'});
        resolve(URL.createObjectURL(blob));
      };
      xhr.onerror = function(){ resolve(null); };
      xhr.send(JSON.stringify({
        model: 'gpt-4o-mini-tts',
        input: 'Привет! Я Стич, теперь буду говорить вот так.',
        voice: voice,
        speed: 1.2
      }));
    } catch(_) { resolve(null); }
  });
}
function playPreviewUrl(url) {
  pumpKeepalive();
  nudgeOutputToSpeaker();
  var audio = new Audio();
  audio.setAttribute('playsinline', '');
  audio.src = url;
  function endPreview() {
    try { URL.revokeObjectURL(url); } catch(_){}
    head.className = 'head';
    glow.className = 'glow';
    stopMouth();
    if (currentAudio === audio) currentAudio = null;
  }
  audio.onended = endPreview;
  audio.onerror = endPreview;
  // Trigger the talking animation while the sample plays.
  head.className = 'head talk';
  glow.className = 'glow on';
  startMouth();
  currentAudio = audio;
  audio.play().catch(endPreview);
}
// Один общий стеклянный popup: имя голоса сверху, цифра-отсчёт снизу.
// Сначала показывается с именем, потом тикает countdown в той же карточке,
// в конце скрывается. Заменяет два независимых элемента (toast+countdown).
function showVoicePanel(name, steps, onDone) {
  var el = document.getElementById('voicePanel');
  if (!el) {
    el = document.createElement('div');
    el.id = 'voicePanel';
    el.innerHTML = '<div class="vp-count"></div><div class="vp-name"></div>';
    document.body.appendChild(el);
  }
  var nameEl = el.querySelector('.vp-name');
  var countEl = el.querySelector('.vp-count');
  nameEl.textContent = name;
  countEl.textContent = String(steps);
  void el.offsetHeight;
  el.classList.add('show');
  var i = steps;
  var closed = false;
  function close(){
    if (closed) return; closed = true;
    el.classList.remove('show');
    setTimeout(function(){ try { el.remove(); } catch(_){} }, 220);
  }
  function tick() {
    i--;
    if (i <= 0) {
      countEl.textContent = '';
      // panel остаётся открытым; close вызовет caller, когда url готов.
      onDone && onDone(close);
      return;
    }
    countEl.textContent = String(i);
    setTimeout(tick, 700);
  }
  setTimeout(tick, 700);
}

// Burst of colored confetti when Stitch confirms a correct answer ("Бум!"),
// styled like Telegram's quiz salute — particles burst upward, reach a
// peak, then gently fall past the bottom with continuous rotation.
function celebrate() {
  var colors = ['#ff5577','#ff9043','#ffd84d','#5be09b','#7c5cff','#00b8d4','#ff7eb6','#ffffff'];
  var n = 70;
  for (var i = 0; i < n; i++) {
    var color = colors[Math.floor(Math.random()*colors.length)];
    var size = 6 + Math.random()*7;
    // Random burst direction biased upward
    var ang = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 1.7;
    var burstDist = 110 + Math.random() * 240;
    var peakX = Math.cos(ang) * burstDist;
    var peakY = Math.sin(ang) * burstDist; // negative = up
    // Drift sideways while falling
    var endX = peakX * 1.5 + (Math.random()-0.5) * 140;
    var fallDur = 2.6 + Math.random() * 1.4;     // 2.6 – 4.0 s
    var spinDur = 0.8 + Math.random() * 1.4;     // 0.8 – 2.2 s
    var spinDir = Math.random() > 0.5 ? 'normal' : 'reverse';
    var outer = document.createElement('div');
    outer.style.cssText = 'position:fixed;left:50%;top:55%;pointer-events:none;z-index:1000;will-change:transform,opacity;animation:saluteFall '+fallDur+'s linear forwards;--peak-x:'+peakX+'px;--peak-y:'+peakY+'px;--end-x:'+endX+'px';
    var inner = document.createElement('div');
    inner.style.cssText = 'width:'+size+'px;height:'+(size*1.6)+'px;background:'+color+';border-radius:2px;will-change:transform;animation:saluteSpin '+spinDur+'s linear infinite '+spinDir;
    outer.appendChild(inner);
    document.body.appendChild(outer);
    (function(node, ms){ setTimeout(function(){ try{ node.remove(); }catch(_){} }, ms); })(outer, fallDur*1000+300);
  }
}
function maybeCelebrate(text) {
  if (!text || !/^\s*Бум/i.test(text)) return;
  celebrate();
  // Light haptic — Telegram's HapticFeedback if available, else
  // navigator.vibrate as a fallback.
  try {
    if (tg && tg.HapticFeedback && typeof tg.HapticFeedback.impactOccurred === 'function') {
      tg.HapticFeedback.impactOccurred('heavy');
    } else if (navigator.vibrate) {
      navigator.vibrate(120);
    }
  } catch(_) {}
}

var prompt = 'Ты — персональный репетитор. ПРАВИЛО ПРО ИМЯ: прежде чем спрашивать "как тебя зовут?" — внимательно просмотри историю этого диалога. Если ученик уже называл своё имя ранее (даже несколько сообщений назад) — НЕ переспрашивай, используй его. Спрашивай имя только ОДИН раз, в самом первом своём сообщении в новом диалоге, и больше никогда. Если в истории не нашёл имя и это уже не первое сообщение — просто продолжай помогать, не спрашивай заново. Не представляйся первым — не называй своё имя, не говори кто ты, не описывай себя по своей инициативе. ИСКЛЮЧЕНИЕ: если ученик САМ спросит "как тебя зовут?", "кто ты?" или похожее — ответь коротко: тебя зовут Липо Стич, ты инопланетный помощник-репетитор. Главная цель — не давать ответы, а развивать мышление и помогать самому прийти к решению. ВАЖНО: говори КОРОТКО, не лей воду. 1-2 коротких предложения за раз. Жди задание или вопрос — не наговаривай лишнего. Если нет конкретного вопроса или задания — НЕ отвечай длинно и НЕ выдумывай темы, просто коротко спроси чем помочь. ЗАПРЕЩЕНО: давать готовые ответы, решать задачу за ученика, представляться без вопроса. ОБЯЗАТЕЛЬНО: объяснять через вопросы, разбивать на шаги, хвалить за ход мыслей. СТИЛЬ: общайся как обычный ChatGPT-репетитор — спокойно, ясно, по-человечески. НЕ называй ученика "зверёк", "малыш" и подобными словечками. НЕ вставляй "хи-хи", "бум", "ха", "ага" в каждый ответ. Просто понятные фразы простым языком для 8-9 лет. ИСКЛЮЧЕНИЕ: КОГДА РЕБЁНОК САМ НАЗВАЛ ВЕРНЫЙ ОТВЕТ — обязательно начни ответ со слова "Бум!" и подтверди (например: "Бум! Точно так!", "Бум! Ты угадал!", "Бум! Молодец, верно!"). Если ответ неверный — не говори "Бум", мягко направь наводящим вопросом без лишних междометий. Алгоритм: 1) попроси прочитать задачу и сказать что поняла, 2) спроси что известно, 3) спроси что найти, 4) помоги через наводящие вопросы, 5) шаг за шагом, 6) ошибка — мягко направь, верный ответ — Бум-подтверждение. ОБЪЯСНЕНИЕ ЧЕРЕЗ ПРИМЕРЫ: если ученик не понимает суть задачи или правила — объясни через несколько разных примеров из детского мира (яблоки, конфеты, игрушки, машинки, котята, дни рождения, мультяшные герои, школьные ситуации). Если первый пример не зашёл — попробуй второй из другой области. Один и тот же приём показывай на 2-3 разных историях, чтобы ребёнок увидел общую идею. Если просит ответ: предложи разобрать вместе. Главное правило: ученик должен САМ прийти к ответу, а ты подтвердить через "Бум!". Если фото и не понимаешь — просто спроси что с этим делать.';

async function askClaude(msg) {
  errEl.textContent = '';
  addMsg('u', msg);
  if (!apiKey) {
    addMsg('a', 'Сначала отправь мне твой OpenAI API ключ (начинается с sk-) — я его запомню.');
    setState('idle');
    return;
  }
  setState('thinking');
  hist.push({role:'user', content:msg});
  saveHist();
  try {
    // Voice path — collapse any image content to a text placeholder
    var textHist = hist.map(function(m) {
      if (Array.isArray(m.content)) {
        var txt = m.content.filter(function(p){return p.type==='text';}).map(function(p){return p.text;}).join(' ');
        return {role:m.role, content:txt||'[фото]'};
      }
      return m;
    });
    var messages = [{role:'system',content:prompt}].concat(textHist);
    typingCancel = false;
    currentAbort = new AbortController();
    var r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body: JSON.stringify({model:'gpt-5', max_completion_tokens:800, messages:messages}),
      signal: currentAbort.signal
    });
    var data = await r.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!data.choices || !data.choices[0]) throw new Error('API: ' + JSON.stringify(data).slice(0,200));
    var msg0 = data.choices[0].message;
    var text = '';
    if (typeof msg0.content === 'string') text = msg0.content;
    else if (Array.isArray(msg0.content)) text = msg0.content.map(function(p){return p.text||'';}).join('');
    else if (msg0.refusal) text = msg0.refusal;
    if (!text) throw new Error('Empty: ' + JSON.stringify(data.choices[0]).slice(0,300));
    hist.push({role:'assistant', content:text});
    saveHist();

    // STEP 1: Download audio (still showing "Думает...")
    var audioBlob = null;
    try {
      var ttsXhr = new XMLHttpRequest();
      currentAbort = { abort: function(){ try { ttsXhr.abort(); } catch(_){} } };
      audioBlob = await new Promise(function(resolve) {
        ttsXhr.open('POST','https://api.openai.com/v1/audio/speech');
        ttsXhr.setRequestHeader('Content-Type','application/json');
        ttsXhr.setRequestHeader('Authorization','Bearer '+apiKey);
        ttsXhr.responseType = 'arraybuffer';
        ttsXhr.onload = function(){
          if (ttsXhr.status === 200) { resolve(ttsXhr.response); return; }
          try {
            var msg = new TextDecoder().decode(new Uint8Array(ttsXhr.response));
            errEl.textContent = 'TTS ' + ttsXhr.status + ': ' + msg.slice(0, 180);
          } catch(_) { errEl.textContent = 'TTS HTTP ' + ttsXhr.status; }
          resolve(null);
        };
        ttsXhr.onerror = function(){ resolve(null); };
        ttsXhr.onabort = function(){ resolve(null); };
        ttsXhr.send(JSON.stringify({model:'gpt-4o-mini-tts',input:text,voice:currentVoice,speed:1.2}));
      });
    } catch(e2) { audioBlob = null; }
    currentAbort = null;
    if (typingCancel) return;

    // STEP 3: switch to "Говорит", start audio (HTML Audio works on iOS WebView), type text
    setState('talking');
    var el = addMsg('a', '');
    el.classList.add('cur');
    startMouth();
    maybeCelebrate(text);

    if (audioBlob) {
      pumpKeepalive();
      nudgeOutputToSpeaker();
      var blob2 = new Blob([audioBlob], {type:'audio/mpeg'});
      var url = URL.createObjectURL(blob2);
      var audio = new Audio(url);
      currentAudio = audio;
      audio.onended = function(){ URL.revokeObjectURL(url); audio.src=''; audio.load(); if(currentAudio===audio) currentAudio=null; };
      audio.onerror = function(){ URL.revokeObjectURL(url); if(currentAudio===audio) currentAudio=null; };
      audio.play().catch(function(err){ errEl.textContent = 'Звук: '+(err&&err.message||err); });
    }

    // Type text simultaneously
    for (var i=1; i<=text.length; i++) {
      if (typingCancel) break;
      el.textContent = text.slice(0,i);
      autoScrollChat();
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();

// Long-press: 1.5s → gallery; tap → camera
var camBtn = document.getElementById('camBtn');
var camTimer = null;
var camCountdownEl = document.getElementById('camCountdown');
var camLongPress = false;
var wasLongPress = false;
var camAborted = false;
var countdownVal = 0;

function startCamPress(e) {
  // Clear any leftover timers from previous press
  if (camTimer && camTimer.clear) camTimer.clear();
  camTimer = null;
  // Local reset — only the .neon class controls the long-press glow.
  // The button's glass background/shadow are inline in HTML and must not
  // be overwritten here (otherwise they "stick" after release).
  camBtn.classList.remove('neon');
  camBtn.setAttribute('for', 'fileInputCamera');
  document.getElementById('galLabel').setAttribute('for', 'fileInput');
  var ccS = document.getElementById('centerCam');
  var cpS = document.getElementById('centerPaw');
  if (ccS) ccS.style.opacity = '1';
  if (cpS) cpS.style.opacity = '0';
  camLongPress = false;
  wasLongPress = false;
  camAborted = false;
  // Generate arc segments
  var svg = document.getElementById('camArcs');
  svg.innerHTML = '';
  // background ring
  var bg = document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx','23'); bg.setAttribute('cy','23'); bg.setAttribute('r','19');
  bg.setAttribute('fill','none'); bg.setAttribute('stroke','rgba(0,200,255,.12)'); bg.setAttribute('stroke-width','3');
  svg.appendChild(bg);
  // 5 segments around circle - slow start, fast end
  var circumference = 2 * Math.PI * 19;
  var segLen = (circumference / 5) - 4;
  var per = circumference / 5;
  for (var i=0; i<5; i++) {
    var c2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c2.setAttribute('id','arc'+(i+1));
    c2.setAttribute('cx','23'); c2.setAttribute('cy','23'); c2.setAttribute('r','19');
    c2.setAttribute('fill','none'); c2.setAttribute('stroke','#00ddff'); c2.setAttribute('stroke-width','3');
    c2.setAttribute('stroke-linecap','round');
    c2.setAttribute('stroke-dasharray', segLen+' '+circumference);
    c2.setAttribute('stroke-dashoffset', String(-i*per));
    c2.style.cssText = 'filter:drop-shadow(0 0 6px #00ddff);opacity:0;transition:opacity .15s';
    svg.appendChild(c2);
  }
  window._circ = circumference;
  // Reset center icons
  var cc = document.getElementById('centerCam');
  var cp = document.getElementById('centerPaw');
  if (cc) cc.style.opacity = '1';
  if (cp) cp.style.opacity = '0';

  camCountdownEl.style.display = 'block';

  // Timing: slow start, accelerating. Total 1.25s
  // arc1 immediate, then 400, 700, 900, 1050, 1250(done)
  var delays = [400, 700, 900, 1050];
  var timers = [];
  // Light arc1 immediately
  setTimeout(function(){ var a1=document.getElementById('arc1'); if(a1) a1.style.opacity='1'; }, 0);
  delays.forEach(function(d, idx) {
    timers.push(setTimeout(function() {
      var a = document.getElementById('arc'+(idx+2));
      if (a) a.style.opacity = '1';
    }, d));
  });
  // After all 5 lit - mark long press complete + light lines + enable gallery overlay
  timers.push(setTimeout(function() {
    camLongPress = true;
    camBtn.classList.add('neon');
    document.getElementById('galLabel').style.pointerEvents = 'auto';
    var cc = document.getElementById('centerCam');
    var cp = document.getElementById('centerPaw');
    if (cc) cc.style.opacity = '0';
    if (cp) cp.style.opacity = '1';
  }, 1250));
  camTimer = { timers: timers, clear: function() { this.timers.forEach(clearTimeout); } };
}

function endCamPress(e) {
  if (camTimer && camTimer.clear) camTimer.clear();
  camTimer = null;
  setTimeout(function() {
    camCountdownEl.style.display = 'none';
    camBtn.classList.remove('neon');
    document.getElementById('galLabel').style.pointerEvents = 'none';
    var ccE = document.getElementById('centerCam');
    var cpE = document.getElementById('centerPaw');
    if (ccE) ccE.style.opacity = '1';
    if (cpE) cpE.style.opacity = '0';
    camLongPress = false;
  }, 100);
}

camBtn.addEventListener('touchstart', startCamPress, {passive:false});
camBtn.addEventListener('touchend', function(e){
  if (camAborted) {
    // Палец уехал с кнопки — блокируем нативный label-click, чтобы не
    // открылась камера/галерея. preventDefault на touchend гасит
    // touch→click sequence в iOS Safari/Telegram WebView.
    e.preventDefault();
  }
  endCamPress(e);
  resetLines();
}, {passive:false});
camBtn.addEventListener('touchcancel', function(e){
  if (!camAborted) {
    camAborted = true;
    camBtn.removeAttribute('for');
    document.getElementById('galLabel').removeAttribute('for');
  }
  endCamPress(e);
  resetLines();
}, {passive:true});
// Slide-to-cancel: палец во время удержания вышел за пределы кнопки
// (с люфтом 12px) — отменяем long-press countdown, скидываем визуал
// в исходное и снимаем `for` с label, чтобы touchend не открыл
// камеру/галерею. startCamPress восстановит `for` при следующем нажатии.
camBtn.addEventListener('touchmove', function(e){
  if (camAborted) return;
  if (!camTimer && !camLongPress) return;
  var t = e.touches && e.touches[0]; if (!t) return;
  var r = camBtn.getBoundingClientRect();
  var slack = 12;
  var inside = t.clientX >= r.left - slack && t.clientX <= r.right + slack
            && t.clientY >= r.top - slack && t.clientY <= r.bottom + slack;
  if (!inside) {
    camAborted = true;
    endCamPress(e);
    camBtn.removeAttribute('for');
    document.getElementById('galLabel').removeAttribute('for');
  }
}, {passive:true});
// Gallery overlay - same handlers so finger release works
var galLabel = document.getElementById('galLabel');
galLabel.addEventListener('touchend', function(e){
  if (camAborted) e.preventDefault();
  endCamPress(e);
  resetLines();
}, {passive:false});
function resetLines() {
  camBtn.classList.remove('neon');
}

function renderPhotoPreview() {
  var thumbs = document.getElementById('photoThumbs');
  thumbs.innerHTML = '';
  var cb = document.getElementById('camBtn');
  // Always reset to default — leave the inline glass background/shadow
  // alone, only drop the long-press glow class.
  cb.classList.remove('neon');
  if (window.pendingPhotos.length >= MAX_PHOTOS) {
    cb.style.opacity = '0.4';
    cb.style.pointerEvents = 'none';
  } else {
    cb.style.opacity = '';
    cb.style.pointerEvents = '';
  }
  window.pendingPhotos.forEach(function(p, i) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;width:54px;height:54px;flex-shrink:0';
    var img = document.createElement('img');
    img.src = p;
    img.style.cssText = 'width:100%;height:100%;border-radius:8px;object-fit:cover';
    var del = document.createElement('button');
    del.textContent = '×';
    del.style.cssText = 'position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#fff;color:#222;border:1px solid #c0c0c0;font-size:14px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2)';
    del.onclick = function() { window.pendingPhotos.splice(i,1); renderPhotoPreview(); };
    wrap.appendChild(img);
    wrap.appendChild(del);
    thumbs.appendChild(wrap);
  });
  document.getElementById('photoPreview').style.display = window.pendingPhotos.length ? 'flex' : 'none';
  if (typeof syncSendVisibility === 'function') syncSendVisibility();
}

function cancelAllPhotos() {
  window.pendingPhotos = [];
  renderPhotoPreview();
}

async function askWithImages(photos, userText) {
  errEl.textContent = '';
  if (!apiKey) {
    addMsg('a', 'Сначала отправь мне твой OpenAI API ключ (начинается с sk-) — я его запомню.');
    setState('idle');
    return;
  }
  setState('thinking');
  var imgText = userText && userText.trim() ? userText : 'Посмотри на фото и помоги разобраться!';
  var content = photos.map(function(p) {
    return {type:'image_url', image_url:{url:p, detail:'low'}};
  });
  content.push({type:'text', text:imgText});
  hist.push({role:'user', content:content});
  saveHist();
  try {
    typingCancel = false;
    currentAbort = new AbortController();
    var r = await fetch('https://api.openai.com/v1/chat/completions', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'gpt-5', max_completion_tokens:800, messages:[{role:'system',content:prompt}].concat(hist)}),
      signal: currentAbort.signal
    });
    var data = await r.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    if (!data.choices || !data.choices[0]) throw new Error('API: ' + JSON.stringify(data).slice(0,200));
    var msg0 = data.choices[0].message;
    var text = '';
    if (typeof msg0.content === 'string') text = msg0.content;
    else if (Array.isArray(msg0.content)) text = msg0.content.map(function(p){return p.text||'';}).join('');
    else if (msg0.refusal) text = msg0.refusal;
    if (!text) throw new Error('Empty: ' + JSON.stringify(data.choices[0]).slice(0,300));
    hist.push({role:'assistant', content:text});
    saveHist();

    var audioBlob = null;
    try {
      var ttsXhr2 = new XMLHttpRequest();
      currentAbort = { abort: function(){ try { ttsXhr2.abort(); } catch(_){} } };
      audioBlob = await new Promise(function(resolve) {
        ttsXhr2.open('POST','https://api.openai.com/v1/audio/speech');
        ttsXhr2.setRequestHeader('Content-Type','application/json');
        ttsXhr2.setRequestHeader('Authorization','Bearer '+apiKey);
        ttsXhr2.responseType = 'arraybuffer';
        ttsXhr2.onload = function(){
          if (ttsXhr2.status === 200) { resolve(ttsXhr2.response); return; }
          try {
            var msg = new TextDecoder().decode(new Uint8Array(ttsXhr2.response));
            errEl.textContent = 'TTS ' + ttsXhr2.status + ': ' + msg.slice(0, 180);
          } catch(_) { errEl.textContent = 'TTS HTTP ' + ttsXhr2.status; }
          resolve(null);
        };
        ttsXhr2.onerror = function(){ resolve(null); };
        ttsXhr2.onabort = function(){ resolve(null); };
        ttsXhr2.send(JSON.stringify({model:'gpt-4o-mini-tts',input:text,voice:currentVoice,speed:1.2}));
      });
    } catch(e2) {}
    currentAbort = null;
    if (typingCancel) return;

    setState('talking');
    var el = addMsg('a','');
    el.classList.add('cur');
    startMouth();
    maybeCelebrate(text);
    if (audioBlob) {
      pumpKeepalive();
      nudgeOutputToSpeaker();
      var blob2 = new Blob([audioBlob],{type:'audio/mpeg'});
      var url = URL.createObjectURL(blob2);
      var audio = new Audio(url);
      currentAudio = audio;
      audio.onended = function(){ URL.revokeObjectURL(url); audio.src=''; audio.load(); if(currentAudio===audio) currentAudio=null; };
      audio.onerror = function(){ if(currentAudio===audio) currentAudio=null; };
      audio.play().catch(function(){});
    }
    for (var i=1;i<=text.length;i++) {
      if (typingCancel) break;
      el.textContent=text.slice(0,i);
      autoScrollChat();
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    if (typingCancel) return;
    setState('idle');
  } catch(e) {
    stopMouth();
    if (e && e.name !== 'AbortError') errEl.textContent='Ошибка: '+e.message;
    setState('idle');
  }
}

// ── Кукла-марионетка ──
// #doll — единый fixed-SVG позади чата (голова + верёвочка + шея + торс +
// шарниры). Качается dangleDoll целиком, как висящая на нитке. Шарниры
// (плечи + бёдра) внутри #doll → screen-coord двигается с rotate, поэтому
// конечности сглаживаются low-pass фильтром в tick() (без подёргиваний).
// Конечности — отдельный full-screen overlay #dollLimbs поверх чата.
(function(){
  // 1) Кукла целиком.
  var doll = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  doll.id = 'doll';
  doll.setAttribute('viewBox', '0 0 220 540');
  doll.setAttribute('preserveAspectRatio', 'xMidYMin meet');
  doll.style.overflow = 'visible';
  doll.innerHTML =
    '<defs>'+
      '<radialGradient id="d-skin" cx="40%" cy="30%" r="75%">'+
        '<stop offset="0%" stop-color="#f4e8d8"/>'+
        '<stop offset="55%" stop-color="#c8b0a0"/>'+
        '<stop offset="100%" stop-color="#3a2818"/>'+
      '</radialGradient>'+
      '<radialGradient id="d-cloth" cx="50%" cy="30%" r="80%">'+
        '<stop offset="0%" stop-color="#605a52"/>'+
        '<stop offset="60%" stop-color="#2a2620"/>'+
        '<stop offset="100%" stop-color="#0a0806"/>'+
      '</radialGradient>'+
      '<filter id="d-soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.5"/></filter>'+
    '</defs>'+
    // Верёвочка от потолка до головы
    '<line x1="110" y1="-200" x2="110" y2="50" stroke="#8a7a60" stroke-width="1.5"/>'+
    '<circle cx="110" cy="50" r="3" fill="#5a4a30"/>'+
    // Шея — рисуется ДО головы (за ней, перекрывается головой сверху)
    '<rect x="102" y="170" width="16" height="40" fill="url(#d-skin)" stroke="#2a1808" stroke-width="1"/>'+
    // Голова — почти круглая, чуть вытянута вверх
    '<ellipse cx="110" cy="120" rx="60" ry="64" fill="url(#d-skin)" stroke="#2a1808" stroke-width="1.5"/>'+
    // Глаза
    '<ellipse cx="94" cy="112" rx="8" ry="11" fill="#020202"/>'+
    '<ellipse cx="126" cy="112" rx="8" ry="11" fill="#020202"/>'+
    '<circle cx="92" cy="108" r="1.6" fill="#90a0b0" opacity=".6"/>'+
    '<circle cx="124" cy="108" r="1.6" fill="#90a0b0" opacity=".6"/>'+
    '<ellipse cx="94" cy="126" rx="8" ry="2.6" fill="rgba(40,20,30,.5)" filter="url(#d-soft)"/>'+
    '<ellipse cx="126" cy="126" rx="8" ry="2.6" fill="rgba(40,20,30,.5)" filter="url(#d-soft)"/>'+
    // Брови
    '<path d="M82 92 L 102 88" stroke="#3a2010" stroke-width="1.6" stroke-linecap="round"/>'+
    '<path d="M118 88 L 138 92" stroke="#3a2010" stroke-width="1.6" stroke-linecap="round"/>'+
    // Носик
    '<path d="M110 138 L 106 152 L 114 152" stroke="#6a4030" stroke-width="1.2" fill="none" stroke-linecap="round"/>'+
    // Рот
    '<g id="MC">'+
      '<path d="M88 162 Q98 172 110 174 Q122 172 132 162" stroke="#3a1810" stroke-width="2.2" fill="none" stroke-linecap="round"/>'+
      '<circle cx="84" cy="164" r="1.8" fill="#a04030" opacity=".35"/>'+
      '<circle cx="136" cy="164" r="1.8" fill="#a04030" opacity=".35"/>'+
    '</g>'+
    '<g id="MO" style="display:none">'+
      '<path id="MS" fill="#0a0408"/>'+
      '<path id="MT" fill="#fff8ec"/>'+
      '<ellipse id="TG" fill="#c03858" opacity=".85"/>'+
      '<path id="TOP" stroke="#3a1810" stroke-width="2.2" fill="none" stroke-linecap="round"/>'+
      '<path id="BOT" stroke="#3a1810" stroke-width="1.8" fill="none" stroke-linecap="round"/>'+
    '</g>'+
    // Торс
    '<path d="M68 208 L 152 208 Q 168 290, 162 460 L 58 460 Q 52 290, 68 208 Z" fill="url(#d-cloth)" stroke="rgba(180,170,150,.16)" stroke-width="1.2"/>'+
    '<circle cx="110" cy="234" r="2.4" fill="#a89878" stroke="#1a1408" stroke-width=".7"/>'+
    '<circle cx="110" cy="270" r="2.4" fill="#a89878" stroke="#1a1408" stroke-width=".7"/>'+
    '<circle cx="110" cy="306" r="2.4" fill="#a89878" stroke="#1a1408" stroke-width=".7"/>'+
    '<circle cx="110" cy="342" r="2.4" fill="#a89878" stroke="#1a1408" stroke-width=".7"/>'+
    '<circle cx="110" cy="378" r="2.4" fill="#a89878" stroke="#1a1408" stroke-width=".7"/>'+
    '<circle cx="110" cy="414" r="2.4" fill="#a89878" stroke="#1a1408" stroke-width=".7"/>'+
    // Шарниры — на самых гранях торса (центр конечности = край тела,
    // половина руки/ноги под одеждой, половина наружу).
    '<circle id="shoulder-l" cx="68" cy="226" r="5" fill="#1a1408" stroke="#5a4a30" stroke-width="1"/>'+
    '<circle id="shoulder-r" cx="152" cy="226" r="5" fill="#1a1408" stroke="#5a4a30" stroke-width="1"/>'+
    '<circle id="hip-l" cx="84" cy="454" r="5" fill="#1a1408" stroke="#5a4a30" stroke-width="1"/>'+
    '<circle id="hip-r" cx="136" cy="454" r="5" fill="#1a1408" stroke="#5a4a30" stroke-width="1"/>';
  document.body.insertBefore(doll, document.body.firstChild);

  // top позиционируется через CSS (env(safe-area-inset-top) + 14px) —
  // отступ под notch/dynamic island. Позиция стабильна, JS не нужен.

  // 2) Руки/ноги (path) — позади сообщений (z:1).
  var overlay = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  overlay.id = 'dollLimbs';
  overlay.innerHTML =
    '<path id="arm-l" class="arm"/>'+
    '<path id="arm-r" class="arm"/>'+
    '<path id="leg-l" class="leg"/>'+
    '<path id="leg-r" class="leg"/>';
  document.body.appendChild(overlay);

  // 3) Кисти/стопы (ellipse) — поверх сообщений (z:5).
  var hands = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  hands.id = 'dollHands';
  hands.innerHTML =
    '<defs><radialGradient id="dl-skin" cx="40%" cy="30%" r="75%">'+
      '<stop offset="0%" stop-color="#f4e8d8"/>'+
      '<stop offset="55%" stop-color="#c8b0a0"/>'+
      '<stop offset="100%" stop-color="#3a2818"/>'+
    '</radialGradient></defs>'+
    '<ellipse id="hand-l" rx="12" ry="6" fill="url(#dl-skin)" stroke="#2a1808" stroke-width="1" class="hand"/>'+
    '<ellipse id="hand-r" rx="12" ry="6" fill="url(#dl-skin)" stroke="#2a1808" stroke-width="1" class="hand"/>'+
    '<ellipse id="foot-l" rx="14" ry="9" fill="#181410" stroke="#3a3028" stroke-width="1" class="foot"/>'+
    '<ellipse id="foot-r" rx="14" ry="9" fill="#181410" stroke="#3a3028" stroke-width="1" class="foot"/>';
  document.body.appendChild(hands);

  // L1/L2 — длины верхнего/нижнего сегмента в screen-px. Локоть/колено
  // вычисляется через 2-bone IK так, чтобы оба сегмента сохраняли длину.
  var LIMBS = [
    {pathId:'arm-l', handId:'hand-l', shoulderId:'shoulder-l', isLeg:false, sideSign:-1, L1:125, L2:125},
    {pathId:'arm-r', handId:'hand-r', shoulderId:'shoulder-r', isLeg:false, sideSign: 1, L1:125, L2:125},
    {pathId:'leg-l', handId:'foot-l', shoulderId:'hip-l',     isLeg:true,  sideSign:-1, L1:110, L2:110},
    {pathId:'leg-r', handId:'foot-r', shoulderId:'hip-r',     isLeg:true,  sideSign: 1, L1:110, L2:110}
  ];
  LIMBS.forEach(function(L){
    L.bubble = null; L.cur = null;
    L.startX = 0; L.startY = 0; L.goalX = 0; L.goalY = 0;
    L.t0 = 0; L.dur = 600;
    L.pathEl = overlay.querySelector('#'+L.pathId);
    L.handEl = hands.querySelector('#'+L.handId);
  });
  // Пулы по сторонам. Рука встречается дважды в пуле (arm, arm, leg) —
  // 2/3 шансов что новое сообщение возьмёт именно руку. Нога подбирает
  // только каждое третье сообщение, и то если её зона позволит.
  var POOL_ASST = [LIMBS[0], LIMBS[0], LIMBS[2]]; // arm-l, arm-l, leg-l
  var POOL_USER = [LIMBS[1], LIMBS[1], LIMBS[3]]; // arm-r, arm-r, leg-r
  var attachOrderL = 0, attachOrderR = 0;

  function shoulderPoint(svgId){
    var c = document.getElementById(svgId);
    if (!c) return {x:0,y:0};
    var r = c.getBoundingClientRect();
    return {x:Math.round(r.left + r.width/2), y:Math.round(r.top + r.height/2)};
  }
  // Конечность садится на сам bubble — на отступе 24px от ближнего края.
  // Зоны без пересечения (середина экрана = граница рука/нога):
  //   - руки: headTop <= y <= midY (верхняя половина, но не выше головы);
  //   - ноги: midY <= y <= micTop (нижняя половина, но не ниже mic-btn).
  // Если bubble за пределами — null → конечность висит свободно.
  function bubblePoint(bubble, L){
    if (!bubble) return null;
    var bi = bubble.querySelector('.bi') || bubble;
    var r = bi.getBoundingClientRect();
    var y = Math.round(r.top - 6);
    var midY = window.innerHeight / 2;
    if (!L.isLeg) {
      // Руки хватают только bubble, чей верх не ВЫШЕ уровня плеч.
      var sh = shoulderPoint(L.shoulderId);
      if (y < sh.y || y > midY) return null;
    } else {
      var mic = document.getElementById('micBtn');
      var micTop = mic ? mic.getBoundingClientRect().top : window.innerHeight;
      if (y < midY || y > micTop) return null;
    }
    // Рука — на полочке bubble в 24px от ближнего края.
    // Нога — точно на углу bubble (противоположный край).
    var x;
    if (!L.isLeg) {
      x = L.sideSign < 0 ? Math.round(r.left + 24) : Math.round(r.right - 24);
    } else {
      x = L.sideSign < 0 ? Math.round(r.right) : Math.round(r.left);
      y = Math.round(r.top);
    }
    // Проверка досягаемости: если точка дальше L1+L2 от плеча/бедра — null.
    var sh = shoulderPoint(L.shoulderId);
    var dist = Math.hypot(x - sh.x, y - sh.y);
    if (dist > L.L1 + L.L2) return null;
    return {x:x, y:y};
  }
  // Свободно висящая конечность — строго вниз от плеча (без боковой
  // развёрнутости), чтобы рисовалась прямой линией, а не дугой. Длина рук
  // подобрана так, чтобы кисть оказывалась чуть ниже пояса.
  function dangleGoal(L){
    var s = shoulderPoint(L.shoulderId);
    return {x: s.x, y: s.y + (L.isLeg ? 220 : 250)};
  }
  // 2-bone IK: считает позицию локтя/колена так, чтобы upper-сегмент длиной
  // L1 от шарнира S и lower-сегмент длиной L2 до цели T соединялись в точке
  // joint. bendSign: -1 — joint смещается влево от прямой S→T, +1 — вправо.
  // Для рук/ног bendSign выбирает сторону естественного сгиба наружу.
  function twoBoneJoint(S, T, L1, L2, bendSign){
    var dx = T.x - S.x, dy = T.y - S.y;
    var d = Math.hypot(dx, dy) || 0.001;
    if (d >= L1 + L2 - 0.5) {
      var k = L1 / (L1 + L2);
      return {x: S.x + dx*k, y: S.y + dy*k};
    }
    var a = (L1*L1 - L2*L2 + d*d) / (2*d);
    var hSq = L1*L1 - a*a;
    var h = hSq > 0 ? Math.sqrt(hSq) : 0;
    var ux = dx / d, uy = dy / d;
    var px = -uy * bendSign, py = ux * bendSign;
    return {x: S.x + ux*a + px*h, y: S.y + uy*a + py*h};
  }
  function easeOut(t){ return 1 - Math.pow(1 - t, 3); }

  // Каждое НОВОЕ сообщение цепляется одной конечностью по очереди из своего
  // пула. Затем заполняем все свободные конечности подходящими старыми
  // сообщениями — конечности не висят зря, если есть за что хвататься.
  window.dollAttach = function(){
    var bubbles = document.querySelectorAll('#chat .bbl');
    var last = bubbles[bubbles.length - 1];
    if (last) {
      var alreadyAttached = false;
      for (var i = 0; i < LIMBS.length; i++) if (LIMBS[i].bubble === last) { alreadyAttached = true; break; }
      if (!alreadyAttached) {
        var isUser = last.classList && last.classList.contains('u');
        var pool = isUser ? POOL_USER : POOL_ASST;
        var counter = isUser ? attachOrderR : attachOrderL;
        for (var k = 0; k < pool.length; k++) {
          var idx = (counter + k) % pool.length;
          var L = pool[idx];
          if (bubblePoint(last, L)) {
            L.bubble = last;
            if (isUser) attachOrderR = idx + 1; else attachOrderL = idx + 1;
            break;
          }
        }
      }
    }
    fillFreeLimbs();
  };

  // Отвязываем конечности от bubble, которые ушли за пределы viewport
  // ИЛИ стали недосягаемы (bubblePoint вернул null). После — пытаемся
  // заполнить свободные конечности видимыми сообщениями.
  function pruneInvisibleAndFill(){
    var changed = false;
    LIMBS.forEach(function(L){
      if (!L.bubble) return;
      var bi = L.bubble.querySelector('.bi') || L.bubble;
      var r = bi.getBoundingClientRect();
      if (r.bottom < 0 || r.top > window.innerHeight || !bubblePoint(L.bubble, L)) {
        L.bubble = null;
        changed = true;
      }
    });
    if (changed) fillFreeLimbs();
  }

  // Заполняем все свободные конечности подходящими сообщениями. Идём по
  // bubbles от свежих к старым, для каждого ищем первую свободную конечность
  // подходящей стороны+зоны и привязываем.
  function fillFreeLimbs(){
    var taken = [];
    LIMBS.forEach(function(L){ if (L.bubble) taken.push(L.bubble); });
    var free = LIMBS.filter(function(L){ return !L.bubble; });
    if (!free.length) return;
    var bubbles = Array.prototype.slice.call(document.querySelectorAll('#chat .bbl')).reverse();
    for (var i = 0; i < bubbles.length && free.length; i++) {
      var b = bubbles[i];
      if (taken.indexOf(b) !== -1) continue;
      var isUser = b.classList && b.classList.contains('u');
      for (var j = 0; j < free.length; j++) {
        var L = free[j];
        var rightSide = L.sideSign > 0;
        if (isUser !== rightSide) continue;
        if (!bubblePoint(b, L)) continue;
        L.bubble = b;
        taken.push(b);
        free.splice(j, 1);
        break;
      }
    }
  }

  // Low-pass smoothing — плавность. 0.08 даёт неспешное перецепление —
  // конечность плавно отпускает старое сообщение и переходит на новое
  // (~1.2s до полного догона цели).
  var SMOOTH = 0.08;
  function tick(){
    LIMBS.forEach(function(L){
      if (L.bubble && !document.body.contains(L.bubble)) L.bubble = null;
      var bp = L.bubble ? bubblePoint(L.bubble, L) : null;
      var attached = !!bp;
      var goal = bp || dangleGoal(L);
      if (!L.cur) L.cur = {x:goal.x, y:goal.y};
      // Smoothing всегда: конечность плавно догоняет goal — и когда
      // приклеивается к bubble, и когда отвязывается обратно к dangle.
      L.cur.x += (goal.x - L.cur.x) * SMOOTH;
      L.cur.y += (goal.y - L.cur.y) * SMOOTH;
      var s = shoulderPoint(L.shoulderId);
      // Ограничение длины: кисть/стопа не дальше L1+L2 от плеча/бедра.
      // Если goal был дальше — конечность вытягивается до максимума и
      // дальше не уходит, не растягивается.
      var maxD = L.L1 + L.L2;
      var ddx = L.cur.x - s.x, ddy = L.cur.y - s.y;
      var dd = Math.hypot(ddx, ddy);
      if (dd > maxD) {
        L.cur.x = s.x + ddx / dd * maxD;
        L.cur.y = s.y + ddy / dd * maxD;
      }
      var d;
      if (attached) {
        var j = twoBoneJoint(s, L.cur, L.L1, L.L2, L.sideSign);
        d = 'M '+s.x+' '+s.y+' Q '+j.x+' '+j.y+' '+L.cur.x+' '+L.cur.y;
      } else {
        d = 'M '+s.x+' '+s.y+' L '+L.cur.x+' '+L.cur.y;
      }
      L.pathEl.setAttribute('d', d);
      L.handEl.setAttribute('cx', L.cur.x);
      L.handEl.setAttribute('cy', L.cur.y);
    });
    requestAnimationFrame(tick);
  }

  window.addEventListener('load', function(){
    window.dollAttach();
    requestAnimationFrame(tick);
  });

  var chatEl = document.getElementById('chat');
  if (chatEl) {
    chatEl.addEventListener('scroll', pruneInvisibleAndFill, {passive:true});
  }
  // Периодическая страховка — на случай когда чат двигают не скроллом
  // (resize keyboard, layout shift). 250ms достаточно неспешно.
  setInterval(pruneInvisibleAndFill, 250);
  if (chatEl && 'MutationObserver' in window) {
    new MutationObserver(function(muts){
      var hasBbl = false;
      muts.forEach(function(m){
        Array.prototype.forEach.call(m.addedNodes, function(n){
          if (n.nodeType === 1 && n.classList && n.classList.contains('bbl')) hasBbl = true;
        });
        Array.prototype.forEach.call(m.removedNodes, function(n){
          if (n.nodeType === 1 && n.classList && n.classList.contains('bbl')) hasBbl = true;
        });
      });
      if (hasBbl) requestAnimationFrame(function(){ window.dollAttach(); });
    }).observe(chatEl, {childList:true});
  }
})();
</script>

</body>
</html>
