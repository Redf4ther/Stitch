<script>
// Telegram WebApp script нужен только когда мы реально в Telegram WebView —
// иначе он регистрирует глобальные хэндлеры и на iOS Safari (standalone PWA)
// иногда вызывает ложные срабатывания (открытие крипто-бота при тапе на UI).
(function(){
  var inTelegram = false;
  try {
    if (window.TelegramWebviewProxy || window.TelegramWebview) inTelegram = true;
    if (/Telegram/i.test(navigator.userAgent)) inTelegram = true;
  } catch(_) {}
  if (inTelegram) {
    var s = document.createElement('script');
    s.src = 'https://telegram.org/js/telegram-web-app.js';
    s.async = false;
    document.head.appendChild(s);
  }
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:var(--bg-tone, #000);color:#2d2240;font-family:system-ui,sans-serif;overscroll-behavior:none;-webkit-text-size-adjust:100%;text-size-adjust:100%;transition:background .45s ease}
#app{display:contents}
.top{position:fixed;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;background:transparent;z-index:5;padding-top:var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px));padding-bottom:4px;pointer-events:auto;transform:translateY(var(--vv-top, 0px))}
.below{position:fixed;left:0;right:0;top:calc(215px + var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px)));bottom:0;display:flex;flex-direction:column;z-index:4;transform:translateY(var(--vv-top, 0px))}
/* PWA standalone: layout НЕ сдвигаем — .top, .below, #doll сидят на тех же
   Y что и в Telegram. Топ-бар pwa-chrome floats поверх на z:10 в чистой зоне
   safe-area-top — кнопки видны на своём фоне, остальное прозрачно (видно
   верёвочку куклы). Bottom-блок чуть приближаем к home-indicator (было +18px
   поверх safe-area, теперь +6px) — мик/камера/инпут сидят ниже. */
/* Telegram Mini App кладёт WebView НАД home-indicator, поэтому safe-area-bottom
   там 0 и нижний padding получается 18px. В iOS PWA WebView — весь экран,
   safe-area-bottom = ~34px и общий нижний отступ становится 52px. Компенсируем:
   педаль safe-area минус 16px (но не меньше 14px). На iPhone X+ это даёт ~18px,
   как в Telegram; на устройствах без home-indicator — 14px. */
body.pwa-standalone .bottom{padding-bottom:30px;padding-top:0;position:fixed;left:0;right:0;bottom:var(--kb-h, 0px);background:var(--bg-tone, #000)}
body.pwa-standalone .below{transform:none}
body.pwa-standalone .below{padding-bottom:130px}
/* Компактный режим при клавиатуре: куклу уменьшаем и поджимаем к верху,
   чтобы она целиком влезала в видимую область над клавиатурой.
   Bottom-блок чуть приподнимаем поверх iOS-аксессуара (кнопки ^ v Done). */
/* Кукла и конечности больше НЕ реагируют на клавиатуру (v726) —
   остаются на месте сверху экрана. Раньше тут был compact-mode (scale .5)
   и translateY(--vv-top), но это давало видимое подпрыгивание. */
body.kb-open.pwa-standalone .bottom{bottom:calc(var(--kb-h, 0px) + 0px);padding-bottom:6px}
body.kb-open.pwa-standalone .below{padding-bottom:110px}
body.kb-open .chat{opacity:.35;pointer-events:none}
/* iOS standalone PWA при появлении клавиатуры scroll'ит весь page вверх
   чтобы инпут попал в visualViewport. Это уносит position:fixed элементы
   (doll, dollLimbs, dollHands) за пределы экрана. Скрываем их пока
   клавиатура открыта — нет дрожаний, нет улетающих частей. */
body.pwa-standalone .mic-hint{display:none}
body.pwa-standalone .status{display:none}
.pwa-chrome{position:fixed;top:0;left:0;right:0;height:calc(44px + env(safe-area-inset-top, 0px));padding-top:env(safe-area-inset-top, 0px);background:transparent;display:none;align-items:center;justify-content:space-between;padding-left:8px;padding-right:8px;z-index:10;pointer-events:none}
body.pwa-standalone .pwa-chrome{display:flex}
/* Иконки X / ⋯ оформлены в тот же «стеклянный» стиль что и mic-btn:
   blur+saturate, тонкая внутренняя/внешняя тень, лёгкий gradient-блик. */
.pwa-chrome button{pointer-events:auto;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.02) 55%,rgba(0,0,0,.08) 100%),rgba(255,255,255,.10);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.22);box-shadow:0 6px 18px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.28)}
.pwa-chrome button:active{background:linear-gradient(135deg,rgba(255,255,255,.10) 0%,rgba(255,255,255,.02) 55%,rgba(0,0,0,.18) 100%),rgba(255,255,255,.05)}
.pwa-menu{position:fixed;top:calc(50px + env(safe-area-inset-top,0px));right:8px;display:none;flex-direction:column;gap:8px;z-index:11;min-width:200px}
.pwa-menu.open{display:flex}
/* Каждый пункт меню — отдельная стеклянная плитка в том же стиле что и
   кнопки чрома; чтобы фон между пунктами оставался прозрачным и blur
   накладывался на сами плитки. */
.pwa-menu .item{display:flex;align-items:center;justify-content:flex-start;gap:10px;width:100%;text-align:left;padding:12px 16px;font-size:15px;font-weight:500;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.02) 55%,rgba(0,0,0,.08) 100%),rgba(255,255,255,.10);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.22);box-shadow:0 6px 18px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.28)}
.pwa-menu .item:active{background:linear-gradient(135deg,rgba(255,255,255,.10) 0%,rgba(255,255,255,.02) 55%,rgba(0,0,0,.18) 100%),rgba(255,255,255,.05)}
.title{padding-top:10px;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#ffffff}
.build{font-size:10px;opacity:.6;margin-left:4px}
.stage{position:relative;width:160px;height:160px;margin-top:2px}
.glow{display:none}
.head{position:absolute;inset:0;animation:iB 3.5s ease-in-out infinite;overflow:visible}
.head.talk{animation:tN .33s ease-in-out infinite}
.head.listen{animation:lT .6s ease-in-out infinite}
/* Механическая челюсть куклы — нижняя часть на петлях. transform-box:fill-box
   нужен чтобы transform-origin работал в SVG-системе координат. */
.head .jaw{transform-box:fill-box;transform-origin:50% 0%;animation:dollTalk 1.6s ease-in-out infinite}
@keyframes dollTalk{
  0%,100%{transform:translateY(0) scaleY(1)}
  18%{transform:translateY(1.5px) scaleY(1.7)}
  36%{transform:translateY(0) scaleY(1)}
  58%{transform:translateY(2px) scaleY(2.3)}
  78%{transform:translateY(.5px) scaleY(1.2)}
}
.head.talk .jaw{animation:dollTalkBurst .55s ease-out infinite}
@keyframes dollTalkBurst{
  0%,100%{transform:translateY(0) scaleY(1)}
  35%{transform:translateY(2.5px) scaleY(2.8)}
  70%{transform:translateY(1.5px) scaleY(1.6)}
}
#dollHead{transform-box:fill-box;transform-origin:50% 100%}
/* Кукла — единый SVG fixed позади чата. Висит на верёвочке от потолка,
   тихо качается dangleDoll. Голова + шея + торс + шарниры плеч/бёдер. */
/* transform-origin приподнят на 200px выше верха элемента — там, где верёвочка
   крепится к потолку (viewBox y=-200). Кукла качается как маятник. */
#doll{position:fixed;top:calc(var(--tg-content-safe-area-inset-top, env(safe-area-inset-top, 0px)) - 14px);left:50%;width:220px;height:540px;pointer-events:none;z-index:0;display:block;transform:translateX(-50%);transform-origin:50% -200px}
@keyframes swayDoll {
  0%   { transform: translateX(-50%) rotate(0deg); }
  25%  { transform: translateX(-50%) rotate(0.35deg); }
  55%  { transform: translateX(-50%) rotate(-0.25deg); }
  80%  { transform: translateX(-50%) rotate(0.12deg); }
  100% { transform: translateX(-50%) rotate(0deg); }
}
#doll.sway { animation: swayDoll 2.4s ease-out; }
/* Руки/ноги (path) ПОВЕРХ тела куклы (z:1, #doll z:0) — конечности
   соединяются поверх тела, без visual gap. Шарниры-кружочки скрыты. */
#dollLimbs{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
#dollLimbs .arm{stroke:#2a2620;stroke-width:14;stroke-linecap:round;stroke-linejoin:round;fill:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
#dollLimbs .leg{stroke:#1a1610;stroke-width:22;stroke-linecap:round;stroke-linejoin:round;fill:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
/* Тонкий тканевый блик вдоль рукавов/штанов. */
#dollLimbs .arm-hl{stroke:rgba(255,255,255,.10);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}
#dollLimbs .leg-hl{stroke:rgba(255,255,255,.08);stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}
/* Кисти/стопы — ПЕРЕД сообщениями (z:5, выше .below). */
/* Кисти/стопы СЗАДИ сообщений (z:1, тот же что #dollLimbs) — рука/нога
   садится на верх bubble и нижняя часть кисти прячется за облачком,
   создавая эффект «держит сверху». В отвязанном виде свисает за чатом. */
#dollHands{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
#dollHands .hand,#dollHands .foot{filter:drop-shadow(0 2px 4px rgba(0,0,0,.55))}
@keyframes iB{0%,100%{transform:translateY(0) rotate(-.3deg)}50%{transform:translateY(-5px) rotate(.3deg)}}
@keyframes tN{0%,100%{transform:translateY(0) rotate(-.8deg)}50%{transform:translateY(-3px) rotate(.8deg)}}
@keyframes lT{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gI{0%,100%{opacity:.2}50%{opacity:.5}}
@keyframes gT{0%,100%{opacity:.4}50%{opacity:.85}}
@keyframes db{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes micP{0%{box-shadow:0 0 0 0 rgba(220,50,50,.6)}100%{box-shadow:0 0 0 20px rgba(220,50,50,0)}}
@keyframes saluteFall{0%{transform:translate(-50%,-50%);opacity:1;animation-timing-function:cubic-bezier(.05,.55,.4,1)}30%{transform:translate(calc(-50% + var(--peak-x,0)),calc(-50% + var(--peak-y,-260px)));opacity:1;animation-timing-function:cubic-bezier(.6,.04,.85,.55)}100%{transform:translate(calc(-50% + var(--end-x,0)),110vh);opacity:.85}}
@keyframes saluteSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.hold-ring{position:fixed;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.12);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.28);box-shadow:0 10px 30px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.32);pointer-events:none;z-index:50;transform:translate(-50%,-50%);opacity:0;transition:opacity .15s linear;will-change:opacity}
.hold-ring.visible{opacity:.85;animation:ringPop .22s cubic-bezier(.16,.7,.3,1)}
.hold-ring.busy{background:rgba(255,144,67,.18);border-color:rgba(255,160,90,.45)}
#voicePanel{position:fixed;top:44%;left:50%;display:flex;flex-direction:column;align-items:center;gap:12px;z-index:201;pointer-events:none;transform:translate(-50%,-50%) scale(.7);opacity:0;transition:transform .2s cubic-bezier(.16,.7,.3,1.1),opacity .2s ease}
#voicePanel.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#voicePanel .vp-count,#voicePanel .vp-name{background:rgba(255,255,255,.14);backdrop-filter:blur(10px) saturate(160%);-webkit-backdrop-filter:blur(10px) saturate(160%);border:1px solid rgba(255,255,255,.18);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.18)}
#voicePanel .vp-count{width:104px;height:104px;border-radius:50%;font-size:46px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
#voicePanel .vp-name{border-radius:50px;padding:10px 22px;font-size:15px;font-weight:600;line-height:1;letter-spacing:.5px;text-transform:lowercase}
#voiceCountdown.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.ring-cam{position:absolute;top:0;left:50%;width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.32);box-shadow:0 6px 18px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.32);transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;pointer-events:none;transition:background .15s,border-color .15s,box-shadow .15s,transform .15s}
.ring-cam.armed{background:rgba(0,221,255,.4);border-color:rgba(0,221,255,.95);box-shadow:0 6px 28px rgba(0,221,255,.7),inset 0 1px 0 rgba(255,255,255,.32);transform:translate(-50%,-50%) scale(1.18)}
.ring-cam.gallery{box-shadow:0 0 8px rgba(0,221,255,.7),0 0 22px rgba(0,221,255,.55),inset 0 1px 0 rgba(255,255,255,.32)}
.ring-cd{position:absolute;top:-81px;left:50%;transform:translateX(-50%);width:46px;height:46px;display:none;pointer-events:none;filter:brightness(1) !important;isolation:isolate}
.ring-cd.show{display:block}
.ring-cd .arcs{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-cd .icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.ring-cd .icon svg{position:absolute;filter:drop-shadow(0 0 4px #00ddff);transition:opacity .25s}
.ring-cd .cd-paw{opacity:0}
.ring-cd.long .cd-cam{opacity:0}
.ring-cd.long .cd-paw{opacity:1}
.hold-ring.busy .ring-cam,.hold-ring.busy .ring-cd{display:none}
@keyframes ringPop{from{transform:translate(-50%,-50%) scale(.55);opacity:0}}

.status{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 0 6px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#9aa0b0;opacity:.85}
#stxt{display:none}
.dot{width:64px;height:4px;border-radius:2px;background:#3a3c42;transition:background .25s,box-shadow .25s}
.dot.ok{background:#5be09b;box-shadow:0 0 8px rgba(91,224,155,.7)}
.dot.y{background:#ffd84d;box-shadow:0 0 8px rgba(255,216,77,.7);animation:db .5s infinite}
.dot.g{background:#5be09b;box-shadow:0 0 8px rgba(91,224,155,.7);animation:db 1s infinite}
.dot.b{background:#7c5cff;box-shadow:0 0 8px rgba(124,92,255,.7);animation:db .4s infinite}
.dot.r{background:#ff4757;box-shadow:0 0 8px rgba(255,71,87,.85);animation:db .5s infinite}
.chat{flex:1;min-height:0;overflow-y:auto;padding:4px 14px 12px;display:flex;flex-direction:column;gap:7px;touch-action:pan-y;-webkit-touch-callout:none;transition:opacity .25s ease}
.bbl{display:flex;animation:mIn .2s ease}
.bbl.u{justify-content:flex-end}
/* Слой «краски» поверх стеклянной подложки .bi. Canvas с z-index:-1 рисуется
   ПОЗАДИ текста, но ПЕРЕД .bi's background (правило стека CSS-Z2.1).
   isolation:isolate делает .bi контекстом, чтобы negative-z не утёк за пределы.
   Когда canvas активен — на .bbl выставляется per-bubble override --msg-tint:
   transparent, чтобы .bi через CSS-фон оставалось «стеклом», и весь цвет шёл
   только от canvas; стирание canvas → возвращается стекло. */
.bi{position:relative;isolation:isolate}
.bi > canvas.paint{position:absolute;left:0;top:0;width:100%;height:100%;border-radius:inherit;pointer-events:none;z-index:-1}
.bi{max-width:84%;border-radius:16px 16px 16px 4px;padding:9px 13px;font-size:15px;line-height:1.5;background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.04) 55%,rgba(0,0,0,.06) 100%),var(--asst-tint, rgba(28,28,30,.35));backdrop-filter:var(--asst-blur, blur(14px) saturate(160%));-webkit-backdrop-filter:var(--asst-blur, blur(14px) saturate(160%));border:1px solid rgba(255,255,255,.12);color:#e6e8eb;box-shadow:0 4px 14px rgba(0,0,0,.32),inset .5px .5px 0 rgba(255,255,255,.32);transition:background .35s ease}
.bbl.u .bi{background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.04) 55%,rgba(0,0,0,.06) 100%),var(--msg-tint, rgba(44,44,46,.35));backdrop-filter:var(--msg-blur, blur(14px) saturate(160%));-webkit-backdrop-filter:var(--msg-blur, blur(14px) saturate(160%));border:1px solid rgba(255,255,255,.12);color:#ffffff;border-radius:16px 16px 4px 16px;box-shadow:0 4px 14px rgba(0,0,0,.32),inset .5px .5px 0 rgba(255,255,255,.32);transition:background .35s ease}
.cur::after{content:‘▋’;color:#7c5cff;animation:cur .4s steps(1) infinite}
.err{flex-shrink:0;font-size:11px;color:#e84a5f;padding:0 14px;text-align:center}
.err:not(:empty){padding:2px 14px}
.bottom{flex-shrink:0;position:relative;padding:6px 12px calc(18px + env(safe-area-inset-bottom,0px));background:transparent;display:flex;flex-direction:column;gap:6px;align-items:center}
.mic-btn{width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,255,255,.22);font-size:24px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);box-shadow:0 6px 18px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.28);cursor:pointer;touch-action:none}
.mic-btn.disabled{opacity:.5}
.mic-btn:active{background:rgba(255,255,255,.05)}
#camBtn.neon{box-shadow:0 0 8px rgba(0,221,255,.7),0 0 20px rgba(0,221,255,.5),inset 0 1px 0 rgba(255,255,255,.28)!important}
.mic-hint{display:none}
.irow{display:flex;gap:6px;width:100%}
.inp{flex:1;background:transparent;border:none;color:#e6e8eb;font-size:15px;padding:7px 12px;-webkit-user-select:text;user-select:text}
.inp:focus{outline:none}
.inp::placeholder{color:#7d808a}
.inp:disabled{opacity:.5}
.sbtn{background:rgba(255,255,255,.1);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.22);border-radius:50%;color:#fff;font-size:15px;width:36px;height:36px;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.28)}
.sbtn:active{background:rgba(255,255,255,.05)}
.sbtn:disabled{background:#d8cce8;opacity:.5;box-shadow:none}
.img-msg{max-width:200px;border-radius:12px;margin-top:4px;display:block}
#tonePicker::-webkit-scrollbar,#btnTonePicker::-webkit-scrollbar,#msgTonePicker::-webkit-scrollbar,#asstTonePicker::-webkit-scrollbar,#clothTonePicker::-webkit-scrollbar{display:none}
#tonePicker > button,#btnTonePicker > button,#msgTonePicker > button,#asstTonePicker > button,#clothTonePicker > button{flex-shrink:0}
</style>

</head>

<script>(function(){try{if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone){document.body.classList.add('pwa-standalone');}}catch(_){}})();</script>

<div class="pwa-chrome" id="pwaChrome">
  <span></span>

<script>
// Inline init цвета одежды и переключателя тест-кнопок — выполняется СРАЗУ
// после рендера settings panel, не зависит от других IIFE.
(function(){
  var TONES_CL = [
    {n:'Бурый', c:'default'},
    {n:'Красный', c:'#c41030'}, {n:'Алый', c:'#dc2030'}, {n:'Кирпич', c:'#a04030'},
    {n:'Манго', c:'#f4862c'}, {n:'Янтарь', c:'#e8a830'}, {n:'Солнце', c:'#f4c020'},
    {n:'Лимон', c:'#d4d020'}, {n:'Лайм', c:'#7ac84a'}, {n:'Изумруд', c:'#1ec88a'},
    {n:'Бирюза', c:'#1ec0c8'}, {n:'Небо', c:'#4ab8e0'},
    {n:'Океан', c:'#3080c8'}, {n:'Кобальт', c:'#3060c0'}, {n:'Сапфир', c:'#2848a0'},
    {n:'Индиго', c:'#5a3aa8'}, {n:'Лаванда', c:'#8060c8'},
    {n:'Орхидея', c:'#c050b0'}, {n:'Фуксия', c:'#d04098'}, {n:'Малина', c:'#c83870'},
    {n:'Роза', c:'#e060a0'}, {n:'Коралл', c:'#f0708a'},
    {n:'Шоколад', c:'#A2845E'},
    {n:'Графит', c:'#3a3a4a'}, {n:'Уголь', c:'#1c1c1e'}
  ];
  var clothPicker = document.getElementById('clothTonePicker');
  if (!clothPicker) return;
  var CLOTH_KEY = 'stitch_cloth_tint';
  // По умолчанию — первый цвет из палитры. Если в localStorage чего-то
  // нет в актуальном списке (старая версия), тоже первый.
  var validTones = TONES_CL.map(function(t){ return t.c; });
  var savedCloth = localStorage.getItem(CLOTH_KEY);
  if (validTones.indexOf(savedCloth) === -1) savedCloth = TONES_CL[0].c;
  function applyTorso(c){
    var t = document.getElementById('dollTorso');
    if (t) t.setAttribute('fill', c === 'default' ? 'url(#d-cloth)' : c);
  }
  // Применить и сейчас, и после load (#dollTorso создаётся позже).
  applyTorso(savedCloth);
  window.addEventListener('load', function(){ applyTorso(savedCloth); });
  function refreshRings(active){
    Array.prototype.forEach.call(clothPicker.children, function(b){
      var on = b.dataset.tone === active;
      b.style.boxShadow = on
        ? '0 0 0 2px rgba(255,255,255,.95), inset 0 1px 1px rgba(255,255,255,.4), inset 0 -2px 4px rgba(0,0,0,.4)'
        : 'inset 0 1px 1px rgba(255,255,255,.35), inset 0 -2px 4px rgba(0,0,0,.45)';
    });
  }
  TONES_CL.forEach(function(t){
    var b = document.createElement('button');
    b.dataset.tone = t.c;
    b.title = t.n;
    var bg = (t.c === 'default')
      ? 'radial-gradient(circle at 30% 25%, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 45%), #5a4a38'
      : 'radial-gradient(circle at 30% 25%, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 45%), '+t.c;
    b.style.cssText = 'width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent;background:'+bg+';transition:transform .15s;flex-shrink:0';
    b.addEventListener('click', function(){
      try { if (typeof haptic === 'function') haptic(); } catch(_){}
      applyTorso(t.c);
      savedCloth = t.c;
      localStorage.setItem(CLOTH_KEY, t.c);
      refreshRings(t.c);
    });
    clothPicker.appendChild(b);
  });
  refreshRings(savedCloth);

  // Переключатель стиля куклы.
  var dsp = document.getElementById('dollStylePicker');
  if (dsp) {
    function refreshDollStyle(){
      var cur = localStorage.getItem('stitch_doll_style') || 'cute';
      Array.prototype.forEach.call(dsp.children, function(b){
        var on = b.dataset.style === cur;
        b.style.background = on ? 'rgba(255,255,255,.20)' : 'rgba(255,255,255,.08)';
        b.style.borderColor = on ? 'rgba(255,255,255,.45)' : 'rgba(255,255,255,.18)';
      });
    }
    refreshDollStyle();
    Array.prototype.forEach.call(dsp.children, function(b){
      b.addEventListener('click', function(){
        try { if (typeof haptic === 'function') haptic(); } catch(_){}
        if (typeof window.setDollStyle === 'function') window.setDollStyle(b.dataset.style);
        refreshDollStyle();
      });
    });
  }

  // (Тест-кнопки переключатель вешается во второй IIFE рядом с другими
  // настройками — здесь дубль НЕ нужен, иначе два listener'а кликают по очереди
  // и тогглят state дважды → визуально ничего не меняется.)
})();
</script>

<script>
// Telegram WebApp: expand to full height at boot so the keyboard doesn't
// trigger a late expand jump. Layout adaptation to the keyboard is handled
// purely by viewport (interactive-widget=resizes-content) + 100dvh — no
// JS-side --kb math.
var tg = null;
try {
  if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if (typeof tg.disableVerticalSwipes === 'function') {
      try { tg.disableVerticalSwipes(); } catch(_) {}
    }
    if (typeof tg.requestFullscreen === 'function') {
      try { tg.requestFullscreen(); } catch(_) {}
    }
  }
} catch(_) {}

// ── PWA / API base ──
// Frontend works in two modes:
//   1) Telegram Mini App — initData is signed and sent in X-Telegram-Init-Data
//   2) Standalone PWA (Safari Add-to-Home or any browser) — bearer token from
//      the /pwa command persisted in localStorage; talks to the public funnel
//      hostname directly.
window.API_BASE = 'https://redfather-pc.tail405973.ts.net';
var KEY_PWA_TOKEN = 'stitch_pwa_token';
(function captureToken(){
  try {
    var qs = new URLSearchParams(location.search);
    var t = qs.get('t');
    if (t && /^[A-Za-z0-9_\-]{20,}$/.test(t)) {
      localStorage.setItem(KEY_PWA_TOKEN, t);
      qs.delete('t');
      var clean = location.pathname + (qs.toString() ? ('?' + qs.toString()) : '') + location.hash;
      history.replaceState(null, '', clean);
    }
  } catch(_) {}
})();
window.isPWA = !tg;
// Анонимная PWA-регистрация: если запустились без токена (нет ?t=… в URL и
// в localStorage пусто) — фетчим /api/pwa-init, бэк создаёт нового юзера с
// триалом и возвращает токен. Дальше всё как обычно через apiHeaders().
(function autoPwaRegister(){
  if (!window.isPWA) return;
  try {
    if (localStorage.getItem(KEY_PWA_TOKEN)) return; // уже есть
  } catch(_) { return; }
  fetch(window.API_BASE + '/api/pwa-init', { method: 'POST' })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d && d.token) {
        try { localStorage.setItem(KEY_PWA_TOKEN, d.token); } catch(_){}
      }
    })
    .catch(function(){});
})();
if (window.isPWA) {
  document.body.classList.add('pwa-standalone');
  // Хром поверх контента: левый X — пытается закрыть окно (в standalone PWA
  // обычно ничего не делает, но кнопка есть для симметрии с Telegram chrome).
  // Правый ⋯ — открывает меню с Обновить / Очистить кэш / Выйти.
  document.addEventListener('DOMContentLoaded', function(){
    var menu = document.getElementById('pwaMenu');
    var btnMenu = document.getElementById('pwaMenuBtn');
    var btnSettings = document.getElementById('pwaSettings');
    var btnReload = document.getElementById('pwaReload');
    var btnClearCache = document.getElementById('pwaClearCache');
    var btnTopup = document.getElementById('pwaTopup');
    function closeMenu(){ if (menu) menu.classList.remove('open'); }
    if (btnMenu) btnMenu.addEventListener('click', function(e){
      e.stopPropagation();
      if (menu) menu.classList.toggle('open');
    });
    if (btnSettings) btnSettings.addEventListener('click', function(){
      closeMenu();
      // Открывает settings-panel — тот же что по тапу на голову.
      var head = document.getElementById('head');
      if (head) head.click();
    });
    if (btnTopup) btnTopup.addEventListener('click', function(){
      closeMenu();
      if (typeof window.dollFreezeLimbs === 'function') window.dollFreezeLimbs();
      var tok = window.pwaToken();
      if (!tok) {
        alert('Сначала нужно получить токен — обнови страницу');
        return;
      }
      // Открываем твоего бота с deep-link на topup-флоу.
      var botUrl = 'https://t.me/Stich_talk_bot?start=topup_' + encodeURIComponent(tok);
      location.href = botUrl;
    });
    if (btnReload) btnReload.addEventListener('click', function(){
      closeMenu();
      location.reload();
    });
    if (btnClearCache) btnClearCache.addEventListener('click', async function(){
      closeMenu();
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var i = 0; i < regs.length; i++) await regs[i].unregister();
        }
        if (window.caches && caches.keys) {
          var keys = await caches.keys();
          await Promise.all(keys.map(function(k){ return caches.delete(k); }));
        }
      } catch(_) {}
      location.reload();
    });
    document.addEventListener('click', function(e){
      if (menu && menu.classList.contains('open')) {
        if (!menu.contains(e.target) && e.target !== btnMenu) closeMenu();
      }
    });
    // Топап-баннер: «Продлить» открывает бота с deep-link, «×» прячет.
    var banner = document.getElementById('topupBanner');
    var bGo = document.getElementById('topupBannerGo');
    var bClose = document.getElementById('topupBannerClose');
    if (bGo) bGo.addEventListener('click', function(){
      if (typeof window.dollFreezeLimbs === 'function') window.dollFreezeLimbs();
      var tok = window.pwaToken();
      var url = 'https://t.me/Stich_talk_bot' + (tok ? ('?start=topup_' + encodeURIComponent(tok)) : '');
      location.href = url;
    });
    if (bClose) bClose.addEventListener('click', function(){
      if (banner) banner.style.display = 'none';
    });
  });
}
window.pwaToken = function(){ try { return localStorage.getItem(KEY_PWA_TOKEN) || ''; } catch(_) { return ''; } };
// Показывает баннер «лимит исчерпан / триал кончился» с кнопкой «Продлить»
// которая откроет бота с deep-link. Вызывается из stApi при 403/limit.
window.showTopupBanner = function(reason){
  var b = document.getElementById('topupBanner');
  if (!b) return;
  var t = document.getElementById('topupBannerText');
  if (t && reason) t.textContent = reason;
  b.style.display = 'block';
};
window.apiHeaders = function(extra){
  var h = Object.assign({}, extra || {});
  if (tg && tg.initData) {
    h['X-Telegram-Init-Data'] = tg.initData;
  } else {
    var tok = window.pwaToken();
    if (tok) h['Authorization'] = 'Bearer ' + tok;
  }
  return h;
};

window.hasApiAuth = function(){
  return !!(tg && tg.initData) || !!window.pwaToken();
};

// Backend API client. Все вызовы идут на window.API_BASE; авторизация
// подставляется через apiHeaders (initData для Mini App, Bearer для PWA).
// Возвращают то, что ожидает callsite, чтобы старая логика типизации
// сообщений не ломалась.
window.stApi = (function(){
  function url(path){ return window.API_BASE + path; }
  async function chat(messages, signal){
    var r = await fetch(url('/api/chat'), {
      method: 'POST',
      headers: window.apiHeaders({'Content-Type':'application/json'}),
      body: JSON.stringify({messages: messages}),
      signal: signal,
    });
    var data = await r.json();
    if (r.status === 403 && data && data.code === 'limit') {
      if (typeof window.showTopupBanner === 'function') window.showTopupBanner(data.error);
      throw new Error(data.error || 'Лимит исчерпан');
    }
    if (!r.ok || data.error) throw new Error(data.error || ('HTTP '+r.status));
    return String(data.text || '');
  }
  // Возвращает {promise, abort, xhr}. promise → ArrayBuffer | null.
  function tts(text, voice, speed){
    var xhr = new XMLHttpRequest();
    var promise = new Promise(function(resolve){
      try {
        xhr.open('POST', url('/api/tts'));
        var h = window.apiHeaders({'Content-Type':'application/json'});
        Object.keys(h).forEach(function(k){ xhr.setRequestHeader(k, h[k]); });
        xhr.responseType = 'arraybuffer';
        xhr.onload = function(){
          if (xhr.status === 200) { resolve(xhr.response); return; }
          resolve(null);
        };
        xhr.onerror = function(){ resolve(null); };
        xhr.onabort = function(){ resolve(null); };
        var body = {text: text};
        if (voice) body.voice = voice;
        if (speed != null) body.speed = speed;
        xhr.send(JSON.stringify(body));
      } catch(_) { resolve(null); }
    });
    return {promise: promise, xhr: xhr, abort: function(){ try { xhr.abort(); } catch(_){} }};
  }
  // Yandex STT принимает либо oggopus (с правильным Ogg-контейнером — не
  // webm-контейнер от MediaRecorder), либо lpcm (raw 16-bit PCM). Декодируем
  // запись через Web Audio API, ресемплим в 16кГц моно, отдаём как audio.pcm —
  // Yandex это переваривает без ffmpeg на сервере.
  async function blobToLpcm16k(blob) {
    var arrBuf = await blob.arrayBuffer();
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) throw new Error('Web Audio не поддерживается этим браузером');
    var tmpCtx = new AC();
    var audioBuf = await new Promise(function(resolve, reject) {
      try {
        var p = tmpCtx.decodeAudioData(arrBuf, resolve, reject);
        if (p && p.then) p.then(resolve, reject);
      } catch(e) { reject(e); }
    });
    try { tmpCtx.close(); } catch(_) {}
    var targetRate = 16000;
    var off = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(
      1, Math.ceil(audioBuf.duration * targetRate), targetRate
    );
    var src = off.createBufferSource();
    src.buffer = audioBuf;
    src.connect(off.destination);
    src.start(0);
    var rendered = await off.startRendering();
    var samples = rendered.getChannelData(0);
    var pcm = new ArrayBuffer(samples.length * 2);
    var view = new DataView(pcm);
    for (var i = 0; i < samples.length; i++) {
      var s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }
    return new Blob([pcm], {type: 'audio/pcm'});
  }
  async function transcribe(blob, ext, signal){
    var sendBlob = blob;
    var sendName = 'audio.' + (ext || 'webm');
    try {
      sendBlob = await blobToLpcm16k(blob);
      sendName = 'audio.pcm';
    } catch(e) {
      // Если decodeAudioData не справился — отправляем как есть, бэк попробует.
    }
    var fd = new FormData();
    fd.append('file', sendBlob, sendName);
    var r = await fetch(url('/api/transcribe'), {
      method: 'POST',
      headers: window.apiHeaders(),
      body: fd,
      signal: signal,
    });
    var data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || ('HTTP '+r.status));
    return String(data.text || '');
  }
  return {chat: chat, tts: tts, transcribe: transcribe};
})();

// ─── Стирание краски с сообщений ────────────────────────────────────
// Когда тон сообщений — сплошной цвет (не transparent / не glossy),
// поверх .bi накладывается canvas, залитый этим цветом. Руки и ноги
// куклы при движении «стирают» краску (destination-out) — открывая
// прозрачное стекло. Canvas сидит за текстом (z:-1), но перед фоном.
window.stPaint = (function(){
  var KEY_USER = 'stitch_msg_tint';
  var KEY_ASST = 'stitch_asst_tint';
  function tintFor(bubble){
    var isUser = bubble.classList.contains('u');
    var c;
    try { c = localStorage.getItem(isUser ? KEY_USER : KEY_ASST); } catch(_) { c = null; }
    if (!c) c = 'transparent';
    if (c === 'transparent' || c === 'glossy') return null;
    return c;
  }
  function ensure(bubble){
    if (!bubble || !bubble.classList || !bubble.classList.contains('bbl')) return;
    var bi = bubble.querySelector('.bi');
    if (!bi) return;
    var color = tintFor(bubble);
    var canvas = bi.querySelector('canvas.paint');
    if (!color) {
      if (canvas) canvas.remove();
      bubble.style.removeProperty('--msg-tint');
      bubble.style.removeProperty('--asst-tint');
      bubble.style.removeProperty('--msg-blur');
      bubble.style.removeProperty('--asst-blur');
      return;
    }
    // Стекло под краской — обнуляем тон И размытие через per-bubble override.
    // Без blur выходит «глянцевое» стекло (gradient-highlight без mate-эффекта)
    // — то что пользователь хотел видеть в стёртых участках.
    if (bubble.classList.contains('u')) {
      bubble.style.setProperty('--msg-tint', 'transparent');
      bubble.style.setProperty('--msg-blur', 'none');
    } else {
      bubble.style.setProperty('--asst-tint', 'transparent');
      bubble.style.setProperty('--asst-blur', 'none');
    }
    var r = bi.getBoundingClientRect();
    if (r.width < 1 || r.height < 1) {
      // .bi ещё не разлэйаутилось — попробуем чуть позже
      requestAnimationFrame(function(){ ensure(bubble); });
      return;
    }
    var dpr = Math.max(1, window.devicePixelRatio || 1);
    var w = Math.round(r.width), h = Math.round(r.height);
    if (!canvas) {
      canvas = document.createElement('canvas');
      canvas.className = 'paint';
      bi.appendChild(canvas);
    }
    var needsRepaint = (canvas._w !== w || canvas._h !== h || canvas._color !== color);
    if (needsRepaint) {
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      var ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, w, h);
      canvas._w = w; canvas._h = h; canvas._color = color;
    }
    // Следим за изменениями текста и пересоздаём canvas под новый размер.
    // Нужно для typewriter-эффекта в ассистентских ответах: bi растёт буква
    // за буквой, ensure() перевыпускается на каждое изменение, canvas всегда
    // совпадает с финальным размером bubble.
    if (!bubble._paintObserver && window.MutationObserver) {
      bubble._paintObserver = new MutationObserver(function(){
        ensure(bubble);
      });
      bubble._paintObserver.observe(bi, {childList:true, characterData:true, subtree:true});
    }
  }
  // Координаты в экранных пикселях. Стираем мягким destination-out кружком.
  function erase(bubble, sx, sy, radius){
    if (!bubble) return;
    var bi = bubble.querySelector('.bi');
    if (!bi) return;
    var canvas = bi.querySelector('canvas.paint');
    if (!canvas) return;
    var r = bi.getBoundingClientRect();
    var x = sx - r.left, y = sy - r.top;
    var pad = radius + 4;
    if (x < -pad || y < -pad || x > r.width + pad || y > r.height + pad) return;
    var ctx = canvas.getContext('2d');
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    // Жёсткое стирание в центре под размер кисти/стопы, мягкая антиалис-кайма.
    var grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(0.85, 'rgba(0,0,0,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  function refreshAll(){
    document.querySelectorAll('#chat .bbl').forEach(ensure);
  }
  // Цепляемся на window resize/orientationchange — canvas мог оказаться не
  // того размера. Пересоздаём краску, потери стираний — приемлемо.
  window.addEventListener('orientationchange', refreshAll);
  return {ensure: ensure, erase: erase, refreshAll: refreshAll};
})();

// Single short haptic pulse — used on every button press and on chat-tap
// hold-ring. Prefers Telegram's native impact (matches system feel) and
// falls back to navigator.vibrate for non-Telegram browsers.
function haptic(){
  try {
    if (tg && tg.HapticFeedback && typeof tg.HapticFeedback.impactOccurred === 'function') {
      tg.HapticFeedback.impactOccurred('light');
      return;
    }
  } catch(_) {}
  try { if (navigator.vibrate) navigator.vibrate(10); } catch(_) {}
}



// ── Локальный лог ошибок ────────────────────────────────────────────
// Ловим все ошибки и складываем в window.__stichErrors. Видны в Errors-
// плашке снизу и в любой dev-консоли. В сеть не шлём (нет секретов в репо).
window.__stichErrors = [];
function reportErr(prefix, msg) {
  var v = (document.querySelector('.build')||{}).textContent || '';
  var s = '⚠️ Стич ' + v + '\n' + prefix + ':\n' + String(msg).slice(0, 3500);
  window.__stichErrors.push(s);
  try { console.error(s); } catch(_){}
  // Виден в errEl до следующего setState.
  try { if (typeof errEl !== 'undefined' && errEl) errEl.textContent = prefix + ': ' + String(msg).slice(0, 220); } catch(_){}
}
window.addEventListener('error', function(e){
  reportErr('JS error @ ' + (e.filename||'?') + ':' + (e.lineno||'?'),
            (e.error && e.error.stack) || e.message);
});
window.addEventListener('unhandledrejection', function(e){
  var r = e.reason;
  reportErr('Promise rejection', (r && (r.stack || r.message || JSON.stringify(r))) || String(r));
});

var KEY_SK = 'sk';
var KEY_HIST = 'stitch_hist';
var KEY_VOICE = 'stitch_voice';
var HIST_LIMIT = 60; // keep last ~30 turns
// Yandex SpeechKit голоса (раньше тут были OpenAI alloy/echo/…).
// jane:friendly — тёплый детский режим, остальное — обычные голоса.
var VOICES = ['jane','alena','omazh','oksana','dasha','marina','ermil','zahar','filipp','madi','lera','masha'];
var apiKey = localStorage.getItem(KEY_SK) || '';
var currentVoice = localStorage.getItem(KEY_VOICE);
// Миграция: если был сохранён OpenAI-голос — заменим на дефолт zahar.
if (!currentVoice || VOICES.indexOf(currentVoice) === -1) {
  currentVoice = 'zahar';
  try { localStorage.setItem(KEY_VOICE, currentVoice); } catch(_) {}
}
function cycleVoice() {
  var i = VOICES.indexOf(currentVoice);
  currentVoice = VOICES[(i + 1) % VOICES.length];
  localStorage.setItem(KEY_VOICE, currentVoice);
  // Pre-fetch the sample. Если он успел до конца countdown — audio
  // стартует ровно по концу отсчёта. Если нет — countdown держит panel
  // открытым пока url не готов, и тогда сразу же play + close.
  var urlPromise = fetchPreviewUrl(currentVoice);
  showVoicePanel(currentVoice, 3, function(close) {
    urlPromise.then(function(url) {
      if (url) playPreviewUrl(url);
      close();
    });
  });

function fetchPreviewUrl(voice) {
  if (!window.hasApiAuth()) return Promise.resolve(null);
  var h = window.stApi.tts('Привет! Я Стич, теперь буду говорить вот так.', voice, 1.2);
  return h.promise.then(function(audio){
    if (!audio) return null;
    var blob = new Blob([audio], {type: 'audio/mpeg'});
    return URL.createObjectURL(blob);
  });
}
function playPreviewUrl(url) {
  pumpKeepalive();
  nudgeOutputToSpeaker();
  var audio = new Audio();
  audio.setAttribute('playsinline', '');
  audio.src = url;
  function endPreview() {
    try { URL.revokeObjectURL(url); } catch(_){}
    head.className = 'head';
    glow.className = 'glow';
    stopMouth();
    if (currentAudio === audio) currentAudio = null;
  }
  audio.onended = endPreview;
  audio.onerror = endPreview;
  // Trigger the talking animation while the sample plays.
  head.className = 'head talk';
  glow.className = 'glow on';
  startMouth();
  currentAudio = audio;
  audio.play().catch(endPreview);
}
// Один общий стеклянный popup: имя голоса сверху, цифра-отсчёт снизу.
// Сначала показывается с именем, потом тикает countdown в той же карточке,
// в конце скрывается. Заменяет два независимых элемента (toast+countdown).
function showVoicePanel(name, steps, onDone) {
  var el = document.getElementById('voicePanel');
  if (!el) {
    el = document.createElement('div');
    el.id = 'voicePanel';
    el.innerHTML = '<div class="vp-count"></div><div class="vp-name"></div>';
    document.body.appendChild(el);
  }
  var nameEl = el.querySelector('.vp-name');
  var countEl = el.querySelector('.vp-count');
  nameEl.textContent = name;
  countEl.textContent = String(steps);
  void el.offsetHeight;
  el.classList.add('show');
  var i = steps;
  var closed = false;
  function close(){
    if (closed) return; closed = true;
    el.classList.remove('show');
    setTimeout(function(){ try { el.remove(); } catch(_){} }, 220);
  }
  function tick() {
    i--;
    if (i <= 0) {
      countEl.textContent = '';
      // panel остаётся открытым; close вызовет caller, когда url готов.
      onDone && onDone(close);
      return;
    }
    countEl.textContent = String(i);
    setTimeout(tick, 700);
  }
  setTimeout(tick, 700);
}

// If no key yet, replace the welcome bubble with a request to send one in
// chat. The user pastes/types an sk-... message and saveKeyFromMessage
// picks it up.
function ensureKeyPrompt() {
  if (apiKey || window.hasApiAuth()) return;
  // В PWA-режиме токен прилетает асинхронно из /api/pwa-init — не пугаем
  // юзера sk-промптом; дефолтное приветствие остаётся как есть.
  if (window.isPWA) return;
  var firstBubble = document.querySelector('.chat .bbl .bi');
  if (firstBubble) firstBubble.textContent = 'Привет! Я Стич! Чтобы я ожил — отправь мне твой OpenAI API ключ (он начинается с sk-).';
}
function saveKeyFromMessage(text) {
  var m = String(text || '').trim();
  if (/^sk-[A-Za-z0-9_\-]{10,}$/.test(m)) {
    apiKey = m;
    localStorage.setItem(KEY_SK, m);
    return true;
  }
  // PWA-токен может прийти как просто строка ИЛИ как ссылка из /pwa с ?t=…
  var pwaCandidate = m;
  var urlMatch = m.match(/[?&]t=([A-Za-z0-9_\-]{20,})/);
  if (urlMatch) pwaCandidate = urlMatch[1];
  if (/^[A-Za-z0-9_\-]{30,}$/.test(pwaCandidate)) {
    try {
      localStorage.setItem(KEY_PWA_TOKEN, pwaCandidate);
      return true;
    } catch(_) { return false; }
  }
  return false;
}

// Burst of colored confetti when Stitch confirms a correct answer ("Бум!"),
// styled like Telegram's quiz salute — particles burst upward, reach a
// peak, then gently fall past the bottom with continuous rotation.
function celebrate() {
  var colors = ['#ff5577','#ff9043','#ffd84d','#5be09b','#7c5cff','#00b8d4','#ff7eb6','#ffffff'];
  var n = 70;
  for (var i = 0; i < n; i++) {
    var color = colors[Math.floor(Math.random()*colors.length)];
    var size = 6 + Math.random()*7;
    // Random burst direction biased upward
    var ang = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 1.7;
    var burstDist = 110 + Math.random() * 240;
    var peakX = Math.cos(ang) * burstDist;
    var peakY = Math.sin(ang) * burstDist; // negative = up
    // Drift sideways while falling
    var endX = peakX * 1.5 + (Math.random()-0.5) * 140;
    var fallDur = 2.6 + Math.random() * 1.4;     // 2.6 – 4.0 s
    var spinDur = 0.8 + Math.random() * 1.4;     // 0.8 – 2.2 s
    var spinDir = Math.random() > 0.5 ? 'normal' : 'reverse';
    var outer = document.createElement('div');
    outer.style.cssText = 'position:fixed;left:50%;top:55%;pointer-events:none;z-index:1000;will-change:transform,opacity;animation:saluteFall '+fallDur+'s linear forwards;--peak-x:'+peakX+'px;--peak-y:'+peakY+'px;--end-x:'+endX+'px';
    var inner = document.createElement('div');
    inner.style.cssText = 'width:'+size+'px;height:'+(size*1.6)+'px;background:'+color+';border-radius:2px;will-change:transform;animation:saluteSpin '+spinDur+'s linear infinite '+spinDir;
    outer.appendChild(inner);
    document.body.appendChild(outer);
    (function(node, ms){ setTimeout(function(){ try{ node.remove(); }catch(_){} }, ms); })(outer, fallDur*1000+300);
  }
}
function maybeCelebrate(text) {
  if (!text || !/^\s*Бум/i.test(text)) return;
  celebrate();
  // Light haptic — Telegram's HapticFeedback if available, else
  // navigator.vibrate as a fallback.
  try {
    if (tg && tg.HapticFeedback && typeof tg.HapticFeedback.impactOccurred === 'function') {
      tg.HapticFeedback.impactOccurred('heavy');
    } else if (navigator.vibrate) {
      navigator.vibrate(120);
    }
  } catch(_) {}
}

async function askClaude(msg) {
  errEl.textContent = '';
  addMsg('u', msg);
  if (!apiKey && !window.hasApiAuth()) {
    addMsg('a', 'Сначала отправь мне твой OpenAI API ключ (начинается с sk-) — я его запомню.');
    setState('idle');
    return;
  }
  setState('thinking');
  hist.push({role:'user', content:msg});
  saveHist();
  try {
    // Voice path — collapse any image content to a text placeholder
    var textHist = hist.map(function(m) {
      if (Array.isArray(m.content)) {
        var txt = m.content.filter(function(p){return p.type==='text';}).map(function(p){return p.text;}).join(' ');
        return {role:m.role, content:txt||'[фото]'};
      }
      return m;
    });
    var messages = [{role:'system',content:prompt}].concat(textHist);
    typingCancel = false;
    currentAbort = new AbortController();
    var text = '';
    try {
      text = await window.stApi.chat(messages, currentAbort.signal);
    } catch(e1) { throw e1; }
    if (!text) text = 'Хм, я задумался… попробуй спросить ещё раз!';
    hist.push({role:'assistant', content:text});
    saveHist();

    // STEP 1: Download audio (still showing "Думает...")
    var audioBlob = null;
    try {
      var ttsH = window.stApi.tts(text, currentVoice, 1.2);
      currentAbort = { abort: ttsH.abort };
      audioBlob = await ttsH.promise;
    } catch(e2) { audioBlob = null; }
    currentAbort = null;
    if (typingCancel) return;

    // STEP 3: switch to "Говорит", start audio (HTML Audio works on iOS WebView), type text
    setState('talking');
    var el = addMsg('a', '');
    el.classList.add('cur');
    startMouth();
    maybeCelebrate(text);

    if (audioBlob) {
      pumpKeepalive();
      nudgeOutputToSpeaker();
      var blob2 = new Blob([audioBlob], {type:'audio/mpeg'});
      var url = URL.createObjectURL(blob2);
      var audio = getSharedAudio();
      if (currentAudio && currentAudio !== audio) {
        try { currentAudio.pause(); } catch(_){}
      }
      currentAudio = audio;
      // Освобождаем прежний blob-URL если был.
      if (audio._lastUrl) try { URL.revokeObjectURL(audio._lastUrl); } catch(_){}
      audio._lastUrl = url;
      audio.src = url;
      audio.onended = function(){ if(currentAudio===audio) currentAudio=null; };
      audio.onerror = function(){ if(currentAudio===audio) currentAudio=null; };
      audio.play().catch(function(err){ errEl.textContent = 'Звук: '+(err&&err.message||err); });
    }

    // Type text simultaneously
    for (var i=1; i<=text.length; i++) {
      if (typingCancel) break;
      el.textContent = text.slice(0,i);
      autoScrollChat();
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    // После typing-эффекта bubble имеет финальный размер — пересоздаём
    // paint-canvas под него (раньше был натянут на пустой .bi и оказывался
    // 0px → бабл выглядел прозрачным).
    if (window.stPaint) window.stPaint.ensure(el.parentElement);
    if (typingCancel) return;
    setState('idle');
  } catch(e) {
    stopMouth();
    if (e && e.name !== 'AbortError') {
      errEl.textContent = 'Ошибка: '+e.message;
      reportErr('askClaude', (e.stack || e.message));
    }
    setState('idle');
  }
}

// Global AudioContext - must be created/resumed on user gesture
var gAudioCtx = null;
function getAudioCtx() {
  if (!gAudioCtx) gAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (gAudioCtx.state === 'suspended') gAudioCtx.resume();
  ensureLoudOutput();
  return gAudioCtx;
}

// After SpeechRecognition runs, iOS keeps the audio session in PlayAndRecord
// mode and routes playback through the quiet earpiece speaker. The fix that
// reliably reroutes back to the loud speaker on iOS WKWebView is to play
// a short HTML <audio> file with playsinline — this resets the session
// category to Playback. AudioContext alone wasn't enough.
var silentWavUrl = null;
function getSilentWavUrl() {
  if (silentWavUrl) return silentWavUrl;
  try {
    var sampleRate = 8000;
    var samples = Math.floor(sampleRate * 0.25); // 250ms silence
    var buffer = new ArrayBuffer(44 + samples * 2);
    var view = new DataView(buffer);
    view.setUint32(0, 0x52494646, false);              // "RIFF"
    view.setUint32(4, 36 + samples * 2, true);
    view.setUint32(8, 0x57415645, false);              // "WAVE"
    view.setUint32(12, 0x666d7420, false);             // "fmt "
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);                       // PCM
    view.setUint16(22, 1, true);                       // mono
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    view.setUint32(36, 0x64617461, false);             // "data"
    view.setUint32(40, samples * 2, true);
    silentWavUrl = URL.createObjectURL(new Blob([buffer], {type:'audio/wav'}));
  } catch(_) { silentWavUrl = null; }
  return silentWavUrl;
}
function nudgeOutputToSpeaker() {
  // Web Audio nudge — first line of defense, also unlocks the context.
  try {
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    var buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.05), ctx.sampleRate);
    var src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
    src.stop(ctx.currentTime + 0.05);
  } catch(_) {}
}

// Persistent silent loop. Once started on a user gesture, it keeps the
// iOS audio session pinned to the Playback category for the rest of the
// session, so even after SpeechRecognition the next TTS routes through
// the loud bottom speaker instead of the quiet earpiece.
var bgKeepalive = null;
function ensureLoudOutput() {
  if (bgKeepalive) {
    if (bgKeepalive.paused) {
      try { bgKeepalive.play().catch(function(){}); } catch(_){}
    }
    return;
  }
  try {
    var url = getSilentWavUrl();
    if (!url) return;
    bgKeepalive = new Audio();
    bgKeepalive.setAttribute('playsinline', '');
    bgKeepalive.loop = true;
    bgKeepalive.volume = 1.0; // silent content, full vol so iOS counts it as playback
    bgKeepalive.src = url;
    bgKeepalive.play().catch(function(){});
  } catch(_) {}
}
// Force iOS to flip the audio session back to Playback by stopping the
// keepalive, seeking to the start and playing it again. After getUserMedia,

    c2.setAttribute('stroke-linecap','round');
    c2.setAttribute('stroke-dasharray', segLen+' '+circumference);
    c2.setAttribute('stroke-dashoffset', String(-i*per));
    c2.style.cssText = 'filter:drop-shadow(0 0 6px #00ddff);opacity:0;transition:opacity .15s';
    svg.appendChild(c2);
  }
  window._circ = circumference;
  // Reset center icons
  var cc = document.getElementById('centerCam');
  var cp = document.getElementById('centerPaw');
  if (cc) cc.style.opacity = '1';
  if (cp) cp.style.opacity = '0';

  camCountdownEl.style.display = 'block';

  // Timing: slow start, accelerating. Total 1.25s
  // arc1 immediate, then 400, 700, 900, 1050, 1250(done)
  var delays = [400, 700, 900, 1050];
  var timers = [];
  // Light arc1 immediately
  setTimeout(function(){ var a1=document.getElementById('arc1'); if(a1) a1.style.opacity='1'; }, 0);
  delays.forEach(function(d, idx) {
    timers.push(setTimeout(function() {
      var a = document.getElementById('arc'+(idx+2));
      if (a) a.style.opacity = '1';
    }, d));
  });
  // After all 5 lit - mark long press complete + light lines + enable gallery overlay
  timers.push(setTimeout(function() {
    camLongPress = true;
    camBtn.classList.add('neon');
    document.getElementById('galLabel').style.pointerEvents = 'auto';
    var cc = document.getElementById('centerCam');
    var cp = document.getElementById('centerPaw');
    if (cc) cc.style.opacity = '0';
    if (cp) cp.style.opacity = '1';
  }, 1250));
  camTimer = { timers: timers, clear: function() { this.timers.forEach(clearTimeout); } };
}

function endCamPress(e) {
  if (camTimer && camTimer.clear) camTimer.clear();
  camTimer = null;
  setTimeout(function() {
    camCountdownEl.style.display = 'none';
    camBtn.classList.remove('neon');
    document.getElementById('galLabel').style.pointerEvents = 'none';
    var ccE = document.getElementById('centerCam');
    var cpE = document.getElementById('centerPaw');
    if (ccE) ccE.style.opacity = '1';
    if (cpE) cpE.style.opacity = '0';
    camLongPress = false;
  }, 100);
}

camBtn.addEventListener('touchstart', startCamPress, {passive:false});
camBtn.addEventListener('touchend', function(e){
  if (camAborted) {
    // Палец уехал с кнопки — блокируем нативный label-click, чтобы не
    // открылась камера/галерея. preventDefault на touchend гасит
    // touch→click sequence в iOS Safari/Telegram WebView.
    e.preventDefault();
  }
  endCamPress(e);
  resetLines();
}, {passive:false});
camBtn.addEventListener('touchcancel', function(e){
  if (!camAborted) {
    camAborted = true;
    camBtn.removeAttribute('for');
    document.getElementById('galLabel').removeAttribute('for');
  }
  endCamPress(e);
  resetLines();
}, {passive:true});
// Slide-to-cancel: палец во время удержания вышел за пределы кнопки
// (с люфтом 12px) — отменяем long-press countdown, скидываем визуал
// в исходное и снимаем `for` с label, чтобы touchend не открыл
// камеру/галерею. startCamPress восстановит `for` при следующем нажатии.
camBtn.addEventListener('touchmove', function(e){
  if (camAborted) return;
  if (!camTimer && !camLongPress) return;
  var t = e.touches && e.touches[0]; if (!t) return;
  var r = camBtn.getBoundingClientRect();
  var slack = 12;
  var inside = t.clientX >= r.left - slack && t.clientX <= r.right + slack
            && t.clientY >= r.top - slack && t.clientY <= r.bottom + slack;
  if (!inside) {
    camAborted = true;
    endCamPress(e);
    camBtn.removeAttribute('for');
    document.getElementById('galLabel').removeAttribute('for');
  }
}, {passive:true});
// Gallery overlay - same handlers so finger release works
var galLabel = document.getElementById('galLabel');
galLabel.addEventListener('touchend', function(e){
  if (camAborted) e.preventDefault();
  endCamPress(e);
  resetLines();
}, {passive:false});
function resetLines() {
  camBtn.classList.remove('neon');
}

function renderPhotoPreview() {
  var thumbs = document.getElementById('photoThumbs');
  thumbs.innerHTML = '';
  var cb = document.getElementById('camBtn');
  // Always reset to default — leave the inline glass background/shadow
  // alone, only drop the long-press glow class.
  cb.classList.remove('neon');
  if (window.pendingPhotos.length >= MAX_PHOTOS) {
    cb.style.opacity = '0.4';
    cb.style.pointerEvents = 'none';
  } else {
    cb.style.opacity = '';
    cb.style.pointerEvents = '';
  }
  window.pendingPhotos.forEach(function(p, i) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;width:54px;height:54px;flex-shrink:0';
    var img = document.createElement('img');
    img.src = p;
    img.style.cssText = 'width:100%;height:100%;border-radius:8px;object-fit:cover';

function cancelAllPhotos() {

}

async function askWithImages(photos, userText) {
  errEl.textContent = '';
  if (!apiKey && !window.hasApiAuth()) {
    addMsg('a', 'Сначала отправь мне твой OpenAI API ключ (начинается с sk-) — я его запомню.');
    setState('idle');
    return;
  }
  setState('thinking');
  var imgText = userText && userText.trim() ? userText : 'Посмотри на фото и помоги разобраться!';
  var content = photos.map(function(p) {
    return {type:'image_url', image_url:{url:p, detail:'low'}};
  });
  content.push({type:'text', text:imgText});
  hist.push({role:'user', content:content});
  saveHist();
  try {
    typingCancel = false;
    currentAbort = new AbortController();
    var text = '';
    try {
      text = await window.stApi.chat([{role:'system',content:prompt}].concat(hist), currentAbort.signal);
    } catch(e1) { throw e1; }
    if (!text) text = 'Хм, я задумался… попробуй спросить ещё раз!';
    hist.push({role:'assistant', content:text});
    saveHist();

    var audioBlob = null;
    try {
      var ttsH2 = window.stApi.tts(text, currentVoice, 1.2);
      currentAbort = { abort: ttsH2.abort };
      audioBlob = await ttsH2.promise;
    } catch(e2) {}
    currentAbort = null;
    if (typingCancel) return;

    setState('talking');
    var el = addMsg('a','');
    el.classList.add('cur');
    startMouth();
    maybeCelebrate(text);
    if (audioBlob) {
      pumpKeepalive();
      nudgeOutputToSpeaker();
      var blob2 = new Blob([audioBlob],{type:'audio/mpeg'});
      var url = URL.createObjectURL(blob2);
      var audio = getSharedAudio();
      if (currentAudio && currentAudio !== audio) {
        try { currentAudio.pause(); } catch(_){}
      }
      currentAudio = audio;
      if (audio._lastUrl) try { URL.revokeObjectURL(audio._lastUrl); } catch(_){}
      audio._lastUrl = url;
      audio.src = url;
      audio.onended = function(){ if(currentAudio===audio) currentAudio=null; };
      audio.onerror = function(){ if(currentAudio===audio) currentAudio=null; };
      audio.play().catch(function(){});
    }
    for (var i=1;i<=text.length;i++) {
      if (typingCancel) break;
      el.textContent=text.slice(0,i);
      autoScrollChat();
      await sleep(55);
    }
    el.classList.remove('cur');
    stopMouth();
    if (window.stPaint) window.stPaint.ensure(el.parentElement);
    if (typingCancel) return;
    setState('idle');
  } catch(e) {
    stopMouth();
    if (e && e.name !== 'AbortError') {
      errEl.textContent='Ошибка: '+e.message;
      reportErr('askWithImages', (e.stack || e.message));
    }
    setState('idle');
  }
}

  // ── Анимация радужек: глаза смотрят в одно из преднаписанных направлений
  // (центр, лево, право, вверх, вниз и диагонали). Оба глаза двигаются
  // синхронно. Раз в 15с–2мин (рандомно) выбирается новая позиция.
  (function animateIris(){
    var POS = [
      {x:  0,   y:  0},     // центр
      {x: -2.5, y:  0},     // лево
      {x:  2.5, y:  0},     // право
      {x:  0,   y: -1.5},   // вверх
      {x:  0,   y:  1.2},   // вниз
      {x: -2,   y: -1},     // верх-лево
      {x:  2,   y: -1},     // верх-право
      {x: -2,   y:  1},     // низ-лево
      {x:  2,   y:  1}      // низ-право
    ];
    var cur = {x: 0, y: 0};
    var tgt = {x: 0, y: 0};
    var t0 = 0, dur = 0, hold = 0;
    function pickNext(){
      // не сидеть на одной и той же позиции дважды подряд
      var next; do { next = POS[Math.floor(Math.random() * POS.length)]; }
      while (Math.abs(next.x - tgt.x) < 0.1 && Math.abs(next.y - tgt.y) < 0.1);
      cur.x = tgt.x; cur.y = tgt.y;
      tgt.x = next.x; tgt.y = next.y;
      t0 = performance.now();
      dur = 350 + Math.random() * 500;                  // 0.35-0.85с движение
      hold = 2000 + Math.random() * (30000 - 2000);     // 2-30с пауза
    }
    pickNext();
    function applyTransform(dx, dy){
      ['pupil-l','pupil-r'].forEach(function(id){
        var el = doll.querySelector('#'+id);
        if (el) el.setAttribute('transform', 'translate('+dx.toFixed(2)+' '+dy.toFixed(2)+')');
      });
    }
    function tick(){
      if (!document.hidden) {
        // При записи голоса ИЛИ когда юзер тащит конечность — взгляд прямо
        // в камеру (центр), без блуждания.
        if (window.dollListenPose || window.dollDragging) {
          applyTransform(0, 0);
          // Сбрасываем cur/tgt чтобы после отпускания не было резкого скачка.
          cur.x = 0; cur.y = 0; tgt.x = 0; tgt.y = 0;
          t0 = performance.now();
        } else {
          var now = performance.now();
          var t = Math.min(1, (now - t0) / dur);
          var ease = 1 - Math.pow(1 - t, 3);
          var dx = cur.x + (tgt.x - cur.x) * ease;
          var dy = cur.y + (tgt.y - cur.y) * ease;
          applyTransform(dx, dy);
          if (t >= 1 && (now - t0) > dur + hold) pickNext();
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
