  // L1/L2 — длины верхнего/нижнего сегмента в screen-px.
  var LIMBS = [
    // Руки укоротили (досягают до пояса), ноги — короче и слегка сжаты в коленях.
    {pathId:'arm-l', handId:'hand-l', shoulderId:'shoulder-l', isLeg:false, sideSign:-1, L1:75, L2:70},
    {pathId:'arm-r', handId:'hand-r', shoulderId:'shoulder-r', isLeg:false, sideSign: 1, L1:75, L2:70},
    {pathId:'leg-l', handId:'foot-l', shoulderId:'hip-l',     isLeg:true,  sideSign:-1, L1:100, L2:95},
    {pathId:'leg-r', handId:'foot-r', shoulderId:'hip-r',     isLeg:true,  sideSign: 1, L1:100, L2:95}
  ];
  LIMBS.forEach(function(L){
    L.bubble = null; L.cur = null;
    L.startX = 0; L.startY = 0; L.goalX = 0; L.goalY = 0;
    L.t0 = 0; L.dur = 600;
    L.pathEl = overlay.querySelector('#'+L.pathId);
    L.handEl = hands.querySelector('#'+L.handId);
    L.hlEl   = overlay.querySelector('#'+L.pathId+'-hl');
    L.jointEl = overlay.querySelector('#joint-'+(L.isLeg?'leg':'arm')+'-'+(L.sideSign<0?'l':'r'));
    L.dragGoal = null; // target point set by finger drag
  });
  // Пулы по сторонам. Рука встречается дважды в пуле (arm, arm, leg) —
  // 2/3 шансов что новое сообщение возьмёт именно руку. Нога подбирает
  // только каждое третье сообщение, и то если её зона позволит.
  var POOL_ASST = [LIMBS[0], LIMBS[0], LIMBS[2]]; // arm-l, arm-l, leg-l
  var POOL_USER = [LIMBS[1], LIMBS[1], LIMBS[3]]; // arm-r, arm-r, leg-r
  var attachOrderL = 0, attachOrderR = 0;

  function shoulderPoint(svgId){
    var c = document.getElementById(svgId);
    if (!c) return {x:0,y:0};
    var r = c.getBoundingClientRect();
    return {x:Math.round(r.left + r.width/2), y:Math.round(r.top + r.height/2)};
  }
  // Конечность садится на сам bubble — на отступе 24px от ближнего края.
  // Зоны без пересечения (середина экрана = граница рука/нога):
  //   - руки: headTop <= y <= midY (верхняя половина, но не выше головы);
  //   - ноги: midY <= y <= micTop (нижняя половина, но не ниже mic-btn).
  // Если bubble за пределами — null → конечность висит свободно.
  function bubblePoint(bubble, L){
    if (!bubble) return null;
    var bi = bubble.querySelector('.bi') || bubble;
    var r = bi.getBoundingClientRect();
    var y = Math.round(r.top - 6);
    var midY = window.innerHeight / 2;
    if (!L.isLeg) {
      // Руки хватают только bubble, чей верх не ВЫШЕ уровня плеч.
      var sh = shoulderPoint(L.shoulderId);
      if (y < sh.y || y > midY) return null;
    } else {
      var mic = document.getElementById('micBtn');
      var micTop = mic ? mic.getBoundingClientRect().top : window.innerHeight;
      if (y < midY || y > micTop) return null;
    }
    // Берём точку привязки внутри bubble — позиция выбрана при attach'е
    // (L.relOff: доли 0..1 от ширины/высоты bi-блока), благодаря чему точка
    // едет вместе с bubble во время typewriter'а и скролла. Если relOff не
    // выбран — рука ставится на ближний край, нога — на верхнюю кромку.
    var x, y;
    if (L.relOff) {
      x = Math.round(r.left + r.width * L.relOff.rx);
      y = Math.round(r.top + r.height * L.relOff.ry);
    } else if (!L.isLeg) {
      x = L.sideSign < 0 ? Math.round(r.left + 24) : Math.round(r.right - 24);
      y = Math.round(r.top - 6);
    } else {
      x = L.sideSign < 0 ? Math.round(r.right - 12) : Math.round(r.left + 12);
      y = Math.round(r.top);
    }
    var sh = shoulderPoint(L.shoulderId);
    var dist = Math.hypot(x - sh.x, y - sh.y);
    if (dist > (L.L1 + L.L2) * 0.82) return null;
    return {x:x, y:y};
  }
  // Точка привязки — ЛЮБАЯ точка bubble (в т.ч. чуть выше верхнего края),
  // куда конечность достаёт. Для рук дополнительно: точка не должна быть
  // на противоположной стороне корпуса (рука не тянется через тело).
  function pickRandomOff(bubble, L){
    var bi = bubble.querySelector('.bi') || bubble;
    var r = bi.getBoundingClientRect();
    var sh = shoulderPoint(L.shoulderId);
    var maxR = (L.L1 + L.L2) * 0.82;
    var bodyMidX = window.innerWidth / 2;
    var BODY_SLACK = 30;
    for (var i = 0; i < 15; i++) {
      var rx = 0.05 + Math.random() * 0.90;
      var ry = -0.10 + Math.random() * 0.95;
      var px = r.left + r.width * rx;
      var py = r.top + r.height * ry;
      if (Math.hypot(px - sh.x, py - sh.y) > maxR) continue;
      if (!L.isLeg) {
        if (L.sideSign < 0 && px > bodyMidX + BODY_SLACK) continue;
        if (L.sideSign > 0 && px < bodyMidX - BODY_SLACK) continue;
      }
      return {rx: rx, ry: ry};
    }
    return null;
  }
  // Свободно висящая конечность — строго вниз от плеча (без боковой
  // развёрнутости), чтобы рисовалась прямой линией, а не дугой. Длина рук
  // подобрана так, чтобы кисть оказывалась чуть ниже пояса.
  function dangleGoal(L){
    var s = shoulderPoint(L.shoulderId);
    var totalLen = L.L1 + L.L2;
    if (L.isLeg) {
      return {x: s.x, y: s.y + totalLen};
    }
    // Руки — почти полностью прямые, лёгкий боковой отвод чтобы IK не
    // получал degenerate-случай (1px вместо 2px).
    return {x: s.x + L.sideSign * 1, y: s.y + totalLen * 0.995};
  }
  // 2-bone IK: считает позицию локтя/колена так, чтобы upper-сегмент длиной
  // L1 от шарнира S и lower-сегмент длиной L2 до цели T соединялись в точке
  // joint. bendSign: -1 — joint смещается влево от прямой S→T, +1 — вправо.
  // Для рук/ног bendSign выбирает сторону естественного сгиба наружу.
  function twoBoneJoint(S, T, L1, L2, bendSign){
    var dx = T.x - S.x, dy = T.y - S.y;
    var d = Math.hypot(dx, dy) || 0.001;
    if (d >= L1 + L2 - 0.5) {
      var k = L1 / (L1 + L2);
      return {x: S.x + dx*k, y: S.y + dy*k};
    }
    var a = (L1*L1 - L2*L2 + d*d) / (2*d);
    var hSq = L1*L1 - a*a;
    var h = hSq > 0 ? Math.sqrt(hSq) : 0;
    var ux = dx / d, uy = dy / d;
    var px = -uy * bendSign, py = ux * bendSign;
    var jx = S.x + ux*a + px*h;
    var jy = S.y + uy*a + py*h;
    // Анти-выгиб: локоть/колено никогда не уходит выше плеча/бедра — иначе
    // сустав визуально «вывернут назад». Минимальный сдвиг вниз от шарнира.
    if (jy < S.y + 6) jy = S.y + 6;
    return {x: jx, y: jy};
  }
  function easeOut(t){ return 1 - Math.pow(1 - t, 3); }

  // Каждое НОВОЕ сообщение цепляется одной конечностью по очереди из своего
  // пула. Затем заполняем все свободные конечности подходящими старыми
  // сообщениями — конечности не висят зря, если есть за что хвататься.
  function bindLimb(L, b){ L.bubble = b; L.relOff = pickRandomOff(b, L); }
  function unbindLimb(L){ L.bubble = null; L.relOff = null; }

  // Лёгкое покачивание куклы на верёвочке при перестановке конечности.
  // Через toggle класса .sway — animationend снимает класс, чтобы можно
  // было сразу поставить заново на следующем перемещении.
  // Качание тела заменено rag-doll-физикой ниже в tick(). triggerSway()
  // даёт маленький случайный импульс bodyAngVel — кукла слегка качнётся,
  // springback вернёт её на место с естественным затуханием.
  function triggerSway(){
    bodyAngVel += (Math.random() - 0.5) * 0.18;
  }

  // ── Единый таймер всех перемещений конечностей ─────────────────────
  // Каждые STEP_MIN-STEP_MAX мс делается ОДНО действие из приоритетного
  // списка: 1) привязать любую свободную конечность к подходящему bubble;
  // 2) если свободных нет — переставить случайную привязанную в новую точку
  // (или с шансом 35% переехать на другое сообщение). Только одно
  // движение за раз.
  var STEP_MIN = 3000, STEP_MAX = 5000;
  var limbTimer = null;
  function scheduleNextLimbStep(){
    if (limbTimer) clearTimeout(limbTimer);
    var d = STEP_MIN + Math.random() * (STEP_MAX - STEP_MIN);
    limbTimer = setTimeout(function tick(){
      limbTimer = null;
      if (window._scrollLocked || window._kbdShown) { scheduleNextLimbStep(); return; }
      if (doOneLimbAction()) triggerSway();
      // Безусловно ставим следующий шаг — таймер не должен останавливаться.
      var d2 = STEP_MIN + Math.random() * (STEP_MAX - STEP_MIN);
      limbTimer = setTimeout(tick, d2);
    }, d);
  }
  function bubblesForSide(side){
    return Array.prototype.slice.call(document.querySelectorAll('#chat .bbl')).filter(function(b){
      var bi = b.querySelector('.bi') || b;
      var r = bi.getBoundingClientRect();
      if (r.bottom < 0 || r.top > window.innerHeight) return false;
      var bIsUser = b.classList && b.classList.contains('u');
      return bIsUser === side;
    });
  }
  function isBubblePainted(b){
    var bi = b.querySelector('.bi');
    return !!(bi && bi.querySelector('canvas.paint'));
  }
  function doOneLimbAction(){
    // Приоритет 1: привязать свободную конечность (руки раньше ног). Среди
    // bubble'ов сначала смотрим ПОКРАШЕННЫЕ (где есть paint-canvas — то есть
    // тон сообщений выбран не «Чистый»/«Глянец»). Если таких нет — любой.
    var free = LIMBS.filter(function(L){ return !L.bubble; })
                    .sort(function(a, b){ return (a.isLeg?1:0) - (b.isLeg?1:0); });
    for (var i = 0; i < free.length; i++) {
      var L = free[i];
      var rightSide = L.sideSign > 0;
      var all = bubblesForSide(rightSide).reverse();
      var painted = all.filter(isBubblePainted);
      var bubbles = painted.length ? painted.concat(all.filter(function(b){ return !isBubblePainted(b); }))
                                   : all;
      for (var j = 0; j < bubbles.length; j++) {
        var b = bubbles[j];
        if (LIMBS.some(function(o){ return o.bubble === b; })) continue;
        var off = pickRandomOff(b, L);
        if (!off) continue;
        L.bubble = b; L.relOff = off;
        return true;
      }
    }
    // Приоритет 2: re-pick случайной привязанной конечности.
    var attached = LIMBS.filter(function(L){ return L.bubble; });
    if (!attached.length) return false;
    // Перебираем привязанных в случайном порядке, пытаемся реально сменить
    // позицию (≠ текущей). Если ни одна не сдвинется — пропускаем шаг.
    var shuffled = attached.slice().sort(function(){ return Math.random() - 0.5; });
    for (var ai = 0; ai < shuffled.length; ai++) {
      var L2 = shuffled[ai];
      // Чем больше видимых сообщений — тем чаще переезжаем на другое (а не
      // выбираем новую точку на том же).
      var visN = bubblesForSide(L2.sideSign > 0).length;
      var moveChance = Math.min(0.70, 0.30 + visN * 0.10);
      if (Math.random() < moveChance) {
        var rightSide2 = L2.sideSign > 0;
        var others = bubblesForSide(rightSide2).filter(function(b){
          if (b === L2.bubble) return false;
          return !LIMBS.some(function(o){ return o !== L2 && o.bubble === b; });
        });
        if (others.length) {
          // Покрашенные имеют приоритет.
          var paintedOthers = others.filter(isBubblePainted);
          var pool = paintedOthers.length ? paintedOthers : others;
          var pick = pool[Math.floor(Math.random() * pool.length)];
          var noff = pickRandomOff(pick, L2);
          if (noff) { L2.bubble = pick; L2.relOff = noff; return true; }
        }
      }
      // Внутри того же bubble — обязательно другая точка.
      var newOff = pickDifferentOff(L2.bubble, L2, L2.relOff);
      if (newOff) { L2.relOff = newOff; return true; }
    }
    return false;
  }
  // Подбираем такую точку, которая ощутимо отличается от текущей. Раньше
  // мерили в нормализованных координатах (0.18 = 18% bubble) — на маленьких
  // сообщениях это давало 10-15px сдвиг, кукла раскачивалась но визуально
  // ничего не происходило. Теперь меряем абсолютные экранные пиксели:
  // минимум 30px реального движения кисти.
  function pickDifferentOff(b, L, current){
    var bi = b.querySelector('.bi') || b;
    var br = bi.getBoundingClientRect();
    // Минимум сдвига = размер кисти/стопы (диаметр), чтобы перестановка была
    // визуально заметна и явно отличалась от прежней точки. Hand rx=14 → 28,
    // foot rx=18 → 36.
    var minMove = L.isLeg ? 36 : 28;
    for (var a = 0; a < 8; a++) {
      var off = pickRandomOff(b, L);
      if (!off) return null;
      if (!current) return off;
      var dxScreen = (off.rx - current.rx) * br.width;
      var dyScreen = (off.ry - current.ry) * br.height;
      if (Math.hypot(dxScreen, dyScreen) > minMove) return off;
    }
    return null;
  }

  window.dollAttach = function(){
    // Новое сообщение — единый таймер подцепит на следующем шаге.
    scheduleNextLimbStep();
  };
  function pruneInvisibleAndFill(){
    if (window._scrollLocked) return;
    LIMBS.forEach(function(L){
      if (!L.bubble) return;
      var bi = L.bubble.querySelector('.bi') || L.bubble;
      var r = bi.getBoundingClientRect();
      if (r.bottom < 0 || r.top > window.innerHeight || !bubblePoint(L.bubble, L)) {
        unbindLimb(L);
      }
    });
  }
  function clearAttachQueue(){
    if (limbTimer) { clearTimeout(limbTimer); limbTimer = null; }
  }
  function fillFreeLimbs(){
    scheduleNextLimbStep();
  }

  // Замораживаем все конечности на их текущей экранной позиции и не привязываем
  // ни к чему пока интерфейс «дрыгается» (фокус на инпут, появление клавиатуры,
  // скролл чата, resize). Через 3 секунды затишья — размораживаем и запускаем
  // обычный scheduleNextLimbStep, который рассаживает руки/ноги по одной.
  var freezeTimer = null;
  window.dollFreezeLimbs = function(){ freezeLimbs(); };
  function freezeLimbs(){
    LIMBS.forEach(function(L){
      L.bubble = null;
      if (L.cur) {
        L.frozen = {x: L.cur.x, y: L.cur.y};
        // Сохраняем текущее положение плеча тоже — это позволит tick'у
        // отрисовать конечность от ФИКСИРОВАННОЙ точки плеча, не следуя за
        // куклой если iOS сдвигает её при появлении клавиатуры.
        var s = shoulderPoint(L.shoulderId);
        if (s.x || s.y) L.frozenShoulder = {x: s.x, y: s.y};
      }
    });
    clearAttachQueue();
    window._scrollLocked = true; // совместимость со старыми гардами
    if (freezeTimer) clearTimeout(freezeTimer);
    freezeTimer = setTimeout(function(){
      // Если инпут всё ещё в фокусе — не размораживаем, перепродлеваем.
      var inpEl = document.getElementById('inp');
      if (inpEl && document.activeElement === inpEl) {
        freezeLimbs();
        return;
      }
      LIMBS.forEach(function(L){ L.frozen = null; L.frozenShoulder = null; });
      window._scrollLocked = false;
      window._kbdShown = false;
      fillFreeLimbs();
    }, 3000);
  }

  // ── Rag-doll body physics + drag ──
  var bodyAngle = 0, bodyAngVel = 0;
  var draggingPointers = {};

  function findLimbAt(x, y){
    var HIT = 36;
    var best = null, bestD = HIT;
    for (var i = 0; i < LIMBS.length; i++) {
      var L = LIMBS[i];
      if (!L.cur) continue;
      var d = Math.hypot(L.cur.x - x, L.cur.y - y);
      if (d < bestD) { best = L; bestD = d; }
    }
    return best;
  }
  var mouthCloseTimer = null;
  document.addEventListener('pointerdown', function(e){
    // Не перехватываем tap'ы по интерактивным UI-элементам (кнопки, инпут,
    // чром, меню, settingsPanel). Чат и bubble-ы НЕ исключаем — конечности
    // куклы (#dollLimbs pointer-events:none) визуально часто лежат поверх
    // чата, и клик на лимб приходит на e.target=bubble. Если бы я исключал
    // #chat, drag бы не работал в большинстве экрана.
    var t = e.target;
    if (t && t.closest && (
      t.closest('button') || t.closest('input') || t.closest('textarea') ||
      t.closest('a') || t.closest('label') || t.closest('#composer') ||
      t.closest('.pwa-chrome') || t.closest('.pwa-menu') ||
      t.closest('#settingsPanel')
    )) return;
    var L = findLimbAt(e.clientX, e.clientY);
    if (!L) return;
    draggingPointers[e.pointerId] = L;
    L.dragGoal = {x: e.clientX, y: e.clientY};
    L.cur = {x: e.clientX, y: e.clientY};
    window.dollDragging = true;
    // Открываем рот когда кого-то схватили, и закрываем через 2 секунды
    // автоматом даже если всё ещё держим.
    try { if (typeof drawMouth === 'function') drawMouth(0.55); } catch(_) {}
    if (mouthCloseTimer) clearTimeout(mouthCloseTimer);
    mouthCloseTimer = setTimeout(function(){
      try { if (typeof drawMouth === 'function') drawMouth(0); } catch(_) {}
      mouthCloseTimer = null;
    }, 2000);
  }, true);
  document.addEventListener('pointermove', function(e){
    var L = draggingPointers[e.pointerId];
    if (!L) return;
    L.dragGoal = {x: e.clientX, y: e.clientY};
  }, true);
  function releasePointer(e){
    var L = draggingPointers[e.pointerId];
    if (!L) return;
    L.dragGoal = null;
    delete draggingPointers[e.pointerId];
    // Если ни одна конечность больше не тянется — закрываем рот сразу
    // и отменяем 5-секундный таймер автозакрытия.
    var anyLeft = false;
    for (var k in draggingPointers) { anyLeft = true; break; }
    if (!anyLeft) {
      window.dollDragging = false;
      if (mouthCloseTimer) { clearTimeout(mouthCloseTimer); mouthCloseTimer = null; }
      try { if (typeof drawMouth === 'function') drawMouth(0); } catch(_) {}
    }
  }
  document.addEventListener('pointerup', releasePointer, true);
  document.addEventListener('pointercancel', releasePointer, true);

  function applyBodyPhysics(){
    // Считаем крутящий момент от каждой подёрнутой конечности.
    // Лево/право от плеча/бедра → положительный/отрицательный момент.
    var torque = 0;
    for (var pid in draggingPointers) {
      var L = draggingPointers[pid];
      if (!L || !L.dragGoal) continue;
      var s = shoulderPoint(L.shoulderId);
      // CSS rotate(+θ) crank counterclockwise the bottom-of-pivot point в screen-
      // coords (Y вниз): точка ниже пивота сдвигается влево при положительном θ.
      // Чтобы тело тянулось ЗА пальцем, торк должен быть с обратным знаком —
      // палец справа → отрицательный θ → тело идёт вправо.
      torque -= (L.dragGoal.x - s.x) * 0.00012;
    }
    var restore = -bodyAngle * 0.012;
    var damp = -bodyAngVel * 0.06;
    bodyAngVel += torque + restore + damp;
    bodyAngle += bodyAngVel;
    if (bodyAngle > 28) { bodyAngle = 28; if (bodyAngVel > 0) bodyAngVel = 0; }
    if (bodyAngle < -28) { bodyAngle = -28; if (bodyAngVel < 0) bodyAngVel = 0; }
    // Контр-сдвиг по visualViewport.offsetTop — компенсирует iOS-скролл
    // на keyboard, чтобы кукла оставалась на экране.
    var vvTop = (window.visualViewport && window.visualViewport.offsetTop) || 0;
    if (doll) doll.style.transform = 'translateX(-50%) translateY(' + vvTop.toFixed(1) + 'px) rotate(' + bodyAngle.toFixed(3) + 'deg)';
  }

  function tick(){
    var now = performance.now();
    applyBodyPhysics();
    // Обновляем позиции шариков-шарниров на плечах/бёдрах. Пока какая-то
    // конечность заморожена — НЕ двигаем шарики (иначе они «подлетают»
    // вместе с body когда iOS поднимает doll при появлении клавиатуры,
    // а связанная с ним рука остаётся внизу).
    var anyFrozen = LIMBS.some(function(L){ return L.frozen; });
    if (!anyFrozen) {
      ['shoulder-l','shoulder-r','hip-l','hip-r'].forEach(function(id){
        var p = shoulderPoint(id);
        var el = overlay.querySelector('#joint-'+id);
        if (el && p.x) el.setAttribute('transform', 'translate('+p.x+' '+p.y+')');
      });
    }
    LIMBS.forEach(function(L){
      if (L.bubble && !document.body.contains(L.bubble)) L.bubble = null;
      // Если кукла ещё не разлэйаутилась (shoulderPoint=0,0), ждём — иначе
      // конечности «упадут» из (0,0) в правильную позицию при первом рендере.
      var preS = shoulderPoint(L.shoulderId);
      if (!preS.x && !preS.y) return;
      // Поза «рука к уху» при записи голоса: правая рука куклы (sideSign>0)
      // идёт РЯДОМ с правым ухом — не на ухо и не позади, а вплотную сбоку.
      // Смещаем точку на ~16px наружу и слегка вниз от центра уха, чтобы
      // кисть лежала рядом, не перекрывая ухо.
      var posed = null;
      if (window.dollListenPose && !L.isLeg && L.sideSign > 0) {
        var ear = shoulderPoint('ear-r');
        if (ear.x || ear.y) {
          posed = {x: ear.x + 22, y: ear.y - 2};
          L.bubble = null;
          L.frozen = null;  // listen-pose сильнее любой заморозки
        }
      }
      // Если юзер тащит эту конечность пальцем — dragGoal сильнее всего
      // остального. Координаты в экранных px, клампим к радиусу L1+L2 от плеча.
      var dragged = null;
      if (L.dragGoal) {
        L.bubble = null;
        L.frozen = null;
        dragged = L.dragGoal;
      }
      // Если конечность «заморожена» (UI дрыгается — клавиатура/скролл/фокус)
      // — держим её на сохранённой позиции, не реагируем на движение чата.
      var bp = dragged || posed || (!L.frozen && L.bubble ? bubblePoint(L.bubble, L) : null);
      var attached = !!bp && !dragged;
      var goal = bp || (L.frozen ? L.frozen : dangleGoal(L));
      if (!L.cur) L.cur = {x:goal.x, y:goal.y};
      if (!L.trans) L.trans = {sx:L.cur.x, sy:L.cur.y, gx:goal.x, gy:goal.y, t0:now, dur:1};
      // Защита от bent-limb на первых рендерах / layout-shift: если конечность
      // в свободном висении (нет bubble/drag/posed/frozen) и кисть оказалась
      // НЕЕСТЕСТВЕННО близко к плечу (<70% L1+L2) — это значит что shoulder
      // только что переехал и L.cur застрял в старой позиции. Snap к dangle.
      if (!L.bubble && !L.dragGoal && !posed && !L.frozen) {
        var distSh = Math.hypot(L.cur.x - preS.x, L.cur.y - preS.y);
        if (distSh < (L.L1 + L.L2) * 0.7) {
          L.cur.x = goal.x; L.cur.y = goal.y;
          L.trans.sx = goal.x; L.trans.sy = goal.y; L.trans.gx = goal.x; L.trans.gy = goal.y;
        }
      }
      if (dragged) {
        // Прямое управление пальцем — без сглаживающего перехода.
        L.cur.x = goal.x; L.cur.y = goal.y;
        L.trans.sx = goal.x; L.trans.sy = goal.y; L.trans.gx = goal.x; L.trans.gy = goal.y; L.trans.t0 = now;
      } else {
        var goalShift = Math.hypot(goal.x - L.trans.gx, goal.y - L.trans.gy);
        if (goalShift > 4) {
          var dist = Math.hypot(goal.x - L.cur.x, goal.y - L.cur.y);
          L.trans = {
            sx: L.cur.x, sy: L.cur.y,
            gx: goal.x,  gy: goal.y,
            t0: now,
            dur: Math.min(1800, Math.max(700, 500 + dist * 3.5))
          };
        } else {
          L.trans.gx = goal.x; L.trans.gy = goal.y;
        }
        var t = Math.min(1, (now - L.trans.t0) / L.trans.dur);
        // Сглаженная sine-кривая ease-in-out (плавнее cubic).
        var e = 0.5 - 0.5 * Math.cos(Math.PI * t);
        L.cur.x = L.trans.sx + (L.trans.gx - L.trans.sx) * e;
        L.cur.y = L.trans.sy + (L.trans.gy - L.trans.sy) * e;
      }
      // При заморозке тоже используем сохранённую позицию плеча — чтобы
      // конечность не «следовала» за куклой если iOS её сдвинул при появлении
      // клавиатуры. preS уже посчитан выше с актуальной позицией.
      var s = (L.frozen && L.frozenShoulder) ? L.frozenShoulder : shoulderPoint(L.shoulderId);
      // Ограничение длины. Привязанной — до 92% макс., чтобы локоть/колено
      // оставались чуть согнутыми, но без сильного изгиба. Висящей — полная.
      var maxD = attached ? (L.L1 + L.L2) * 0.82 : (L.L1 + L.L2);
      var ddx = L.cur.x - s.x, ddy = L.cur.y - s.y;
      var dd = Math.hypot(ddx, ddy);
      if (dd > maxD) {
        L.cur.x = s.x + ddx / dd * maxD;
        L.cur.y = s.y + ddy / dd * maxD;
      }
      // Анатомическое сгибание: два прямых отрезка от плеча к локтю и от
      // локтя к кисти. Локоть/колено вычисляется через 2-bone IK по L1/L2.
      // bendSign — противоположен sideSign в SVG-coords (Y вниз): чтобы
      // локоть/колено уходило НАРУЖУ.
      // Когда рука поднята выше плеча (любая ситуация, не только listen-pose)
      // — инвертируем bendSign, иначе локоть-перекидывается через S-T линию
      // в момент пересечения и выглядит как телепорт. Так локоть остаётся
      // НАРУЖУ непрерывно.
      var bend = -L.sideSign;
      if (!L.isLeg && L.cur.y < s.y) bend = L.sideSign;
      var j = twoBoneJoint(s, L.cur, L.L1, L.L2, bend);
      var d = 'M '+s.x+' '+s.y+' L '+j.x+' '+j.y+' L '+L.cur.x+' '+L.cur.y;
      L.pathEl.setAttribute('d', d);
      if (L.hlEl) {
        var hx = L.sideSign * -2;
        L.hlEl.setAttribute('d',
          'M '+(s.x+hx)+' '+(s.y+2)+' L '+(j.x+hx)+' '+(j.y+2)+' L '+(L.cur.x+hx)+' '+(L.cur.y+2));
      }
      if (L.jointEl) {
        L.jointEl.setAttribute('transform', 'translate('+j.x+' '+j.y+')');
      }
      L.handEl.setAttribute('cx', L.cur.x);
      L.handEl.setAttribute('cy', L.cur.y);
      // Телефон в правой руке. Появляется СРАЗУ при нажатии мика
      // (window.phoneShown=true в pointerdown). После отпускания phoneShown
      // сбрасывается → phoneFadeOut=true — держит телефон видимым ПОКА рука
      // едет вниз. Когда рука достигла dangle — phoneFadeOut уходит. При drag
      // или natural-attach телефон НЕ показывается (никаких флагов нет).
      if (!L.isLeg && L.sideSign > 0) {
        var phone = document.getElementById('phone-r');
        if (phone) {
          var dg = dangleGoal(L);
          // Fadeout заканчивается когда: рука достигла dangle ИЛИ её перехватил
          // bubble/drag — в обоих случаях анимация спуска прерывается, телефон
          // должен исчезнуть сразу.
          if (window.phoneFadeOut && (
            (dg.y - L.cur.y <= 20) || L.bubble || L.dragGoal
          )) window.phoneFadeOut = false;
          var phoneVisible = window.phoneShown || window.phoneFadeOut;
          if (phoneVisible) {
            phone.style.display = '';
            phone.setAttribute('transform',
              'translate(' + L.cur.x.toFixed(1) + ' ' + L.cur.y.toFixed(1) + ') rotate(8)');
            var screen = phone.querySelector('.phone-screen');
            if (screen) screen.setAttribute('fill', window.phoneShown ? '#ecfff0' : '#0e2a14');
          } else {
            phone.style.display = 'none';
          }
        }
      }
      // Стираем краску: либо когда конечность ПРИВЯЗАНА к bubble (обычная
      // анимация по сообщениям), либо когда юзер сам тащит её пальцем — тогда
      // стираем любое сообщение под кистью/стопой (drag-режим).
      if (window.stPaint) {
        var radius = L.isLeg ? 18 : 14;
        if (dragged) {
          var bbls2 = document.querySelectorAll('#chat .bbl');
          for (var bi3 = 0; bi3 < bbls2.length; bi3++) {
            window.stPaint.erase(bbls2[bi3], L.cur.x, L.cur.y, radius);
          }
        } else if (L.bubble && attached) {
          window.stPaint.erase(L.bubble, L.cur.x, L.cur.y, radius);
        }
      }
    });
    requestAnimationFrame(tick);
  }

  window.addEventListener('load', function(){
    window.dollAttach();
    requestAnimationFrame(tick);
  });

  var chatEl = document.getElementById('chat');
  if (chatEl) {
    chatEl.addEventListener('scroll', function(){ freezeLimbs(); }, {passive:true});
  }
  // Периодическая страховка — на случай когда чат двигают не скроллом
  // (resize keyboard, layout shift). 250ms достаточно неспешно.
  setInterval(function(){ if (!window._scrollLocked) pruneInvisibleAndFill(); }, 250);

  // Любая дрыгающая UI-активность — фокус на инпут, ввод текста, появление/
  // скрытие клавиатуры — замораживает конечности в их текущей позиции, чтобы
  // они не пытались следовать за съезжающими bubbles. Через 3с затишья —
  // обычная анимация по очереди.
  // iOS PWA standalone scroll'ит page при focus на input — это уносит
  // position:fixed элементы (включая doll и лимбы) за верх экрана. Чтобы
  // кукла оставалась на месте, КОНТР-смещаем её и слои лимбов через
  // transform: translateY(offsetTop) с visualViewport. Поскольку #doll уже
  // имеет transform (translateX -50%, rotate ragdoll-angle) — корректируем
  // в applyBodyPhysics. Для #dollLimbs/#dollHands устанавливаем здесь
  // напрямую через CSS-переменную --vv-top.
  // Грейс-период для visualViewport — на iOS PWA standalone первые ~1.5 сек
  // после cold start visualViewport нестабилен (splash transition, URL bar
  // hide/show), и любой ранний resize/scroll даёт ложное определение
  // «клавиатура открыта», что заставляет composer прыгать вверх-вниз.
  // Игнорируем все события до тех пор, пока viewport не стабилизируется.
  var __vvReady = false;
  setTimeout(function(){ __vvReady = true; }, 1500);

  function syncVisualViewportTop(){
    if (!__vvReady) return;
    var top = (window.visualViewport && window.visualViewport.offsetTop) || 0;
    document.documentElement.style.setProperty('--vv-top', top + 'px');
  }
  function applyKbState(){
    if (!__vvReady) return;
    // Жёсткая защита от ложных срабатываний: клавиатура iOS появляется
    // ТОЛЬКО при focus на textarea/input. Если ничего не сфокусировано,
    // visualViewport.height < innerHeight — это URL bar / system UI / PWA
    // splash transition, НЕ клавиатура. Игнорируем.
    var ae = document.activeElement;
    var focused = ae && (ae.tagName === 'TEXTAREA' || ae.tagName === 'INPUT');
    if (!focused) {
      document.documentElement.style.setProperty('--kb-h', '0px');
      document.body.classList.remove('kb-open');
      syncVisualViewportTop();
      return;
    }
    var kb = (window.visualViewport ? Math.max(0, window.innerHeight - window.visualViewport.height) : 0);
    var open = kb > 100;
    document.documentElement.style.setProperty('--kb-h', (open ? kb : 0) + 'px');
    document.body.classList.toggle('kb-open', open);
    syncVisualViewportTop();
  }
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', applyKbState);
    window.visualViewport.addEventListener('scroll', syncVisualViewportTop);
  }
  syncVisualViewportTop();
  var inpForKb = document.getElementById('inp');
  if (inpForKb) {
    inpForKb.addEventListener('blur', function(){
      // Сбрасываем флаги при закрытии клавиатуры — иногда iOS не fires
      // visualViewport.resize.
      document.documentElement.style.setProperty('--kb-h', '0px');
      document.body.classList.remove('kb-open');
      syncVisualViewportTop();
      fillFreeLimbs();
    });
    inpForKb.addEventListener('focus', function(){
      LIMBS.forEach(function(L){ L.bubble = null; L.frozen = null; L.frozenShoulder = null; });
      clearAttachQueue();
    });
  }
  if (chatEl && 'MutationObserver' in window) {
    new MutationObserver(function(muts){
      var hasBbl = false;
      muts.forEach(function(m){
        Array.prototype.forEach.call(m.addedNodes, function(n){
          if (n.nodeType === 1 && n.classList && n.classList.contains('bbl')) hasBbl = true;
        });
        Array.prototype.forEach.call(m.removedNodes, function(n){
          if (n.nodeType === 1 && n.classList && n.classList.contains('bbl')) hasBbl = true;
        });
      });
      if (hasBbl) requestAnimationFrame(function(){ window.dollAttach(); });
    }).observe(chatEl, {childList:true});
  }
})();
</script>

<script>
(function(){
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') return;
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
})();
</script>

<!-- DEBUG OVERLAY v2 (v736) — расширенные метрики -->
<div id="dbgOverlay" style="position:fixed;top:env(safe-area-inset-top, 0px);left:0;z-index:9999;background:rgba(0,0,0,.8);color:#0f0;font:10px/1.25 monospace;padding:4px 6px;pointer-events:none;white-space:pre;border-bottom-right-radius:8px"></div>
<script>
(function(){
  var dbg = document.getElementById('dbgOverlay');
  if (!dbg) return;
  function snap(){
    var bot = document.querySelector('.bottom');
    var rectB = bot ? bot.getBoundingClientRect() : null;
    var s = getComputedStyle(document.documentElement);
    var vv = window.visualViewport;
    var sh = window.screen ? window.screen.height : 0;
    var sah = window.screen ? window.screen.availHeight : 0;
    var ih = window.innerHeight;
    dbg.textContent = [
      'iH:' + ih + ' vv.h:' + (vv?Math.round(vv.height):'?'),
      'screen.h:' + sh + ' avail:' + sah,
      'diff(s-i):' + (sh-ih),
      'matchMedia:' + window.matchMedia('(display-mode: standalone)').matches,
      'nav.standalone:' + !!window.navigator.standalone,
      'URL:' + (location.search||'(no query)'),
      'body:' + (document.body.className||'(none)'),
      rectB ? '.bot top:' + Math.round(rectB.top) + ' bot:' + Math.round(rectB.bottom) : '.bot: none',
      'doc.h:' + document.documentElement.clientHeight,
    ].join('\n');
  }
  setInterval(snap, 200);
  snap();
})();
</script>
